const g3_b3 = [
 {t:"Semana 1: Las Tarjetas Gigantes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la lógica y estructura de una presentación digital vs. un documento de texto.</p><p><strong>📖 Explicación detallada:</strong><br>Google Docs es como un rollo de papel higiénico: va de arriba hacia abajo sin fin, ideal para leer de cerca. Google Slides (Presentaciones) funciona de forma diferente: es como un montón de tarjetas didácticas grandes, llamadas 'Diapositivas'.<br><br>Cada diapositiva ocupa toda la pantalla a la vez. Están diseñadas para proyectarse en la pared o en la televisión frente a una audiencia. Por esta razón, el diseño visual es mucho más importante que la cantidad de texto. Si intentas escribir toda tu tarea en una sola diapositiva, las letras quedarán diminutas, el público se aburrirá y nadie podrá leerlo desde lejos. Slides nos obliga a resumir nuestras ideas.</p>", 
  a1:{t:"Exploración de la Interfaz", d:"Abre Google Slides y crea una presentación nueva. Fíjate en cómo la pantalla se divide en dos: tu área de trabajo en grande al centro y un panel de miniaturas en la izquierda."}, 
  a2:{t:"Concepto de Orientación", d:"Observa que la hoja es horizontal (acostada) y no vertical como en Docs. Gira tu dispositivo y comprueba cuál es la mejor forma de ver la pantalla completa."}, 
  v:"que es google slides explicacion"},
 {t:"Semana 2: Títulos y Cajas de Texto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Manejar contenedores invisibles para insertar texto en cualquier posición de la pantalla.</p><p><strong>📖 Explicación detallada:</strong><br>La principal diferencia técnica al escribir en Slides es que no puedes hacer clic en cualquier parte blanca y empezar a escribir. Slides usa un sistema de 'Cajas de Texto' (Text Boxes).<br><br>Estas cajas son rectángulos invisibles que atrapan las palabras. La gran ventaja es que puedes agarrar una caja de texto y moverla libremente por toda la diapositiva, colocándola en la esquina superior, en el centro o abajo, sin que afecte a otras imágenes. La primera diapositiva que aparece siempre tiene dos cajas listas: una muy grande para el 'Título' de tu exposición, y una pequeña debajo para el 'Subtítulo', donde usualmente escribimos nuestro nombre como autores de la presentación.</p>", 
  a1:{t:"Llenar los Contenedores", d:"En tu diapositiva inicial, toca la caja que dice 'Añadir un título' y escribe el nombre de un país. Toca la caja de abajo y escribe tu nombre."}, 
  a2:{t:"Movimiento Libre", d:"Mantén presionado el borde de la caja de tu nombre y arrástrala hacia una de las esquinas superiores de la diapositiva."}, 
  v:"cajas de texto google slides celular"},
 {t:"Semana 3: Agregar Nuevas Hojas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Insertar, eliminar y reordenar diapositivas en el panel de navegación para estructurar la exposición.</p><p><strong>📖 Explicación detallada:</strong><br>Una exposición nunca tiene solo una tarjeta. Necesitamos una portada, contenido y una conclusión. Para agregar más 'hojas', debes buscar el botón inferior que tiene un cuadrado con un símbolo de más (+).<br><br>Al pulsarlo, el sistema te preguntará qué 'Diseño' (Layout) quieres para esa nueva hoja. Algunos diseños vienen con dos columnas para comparar cosas, otros vienen solo con un cuadro gigante para poner una foto. A medida que agregues hojas, aparecerán como cuadritos pequeños en un menú lateral o inferior. Ese menú te permite revisar el orden de tu trabajo. Si te equivocas de orden, puedes mantener presionada una diapositiva en ese panel y arrastrarla hacia arriba o hacia abajo para reorganizar tu presentación al instante.</p>", 
  a1:{t:"Diseños Diferentes", d:"Agrega dos diapositivas nuevas a tu presentación. A la primera ponle el diseño 'Título y Cuerpo', y a la segunda el diseño 'Vacío'."}, 
  a2:{t:"Reordenar", d:"Ve al panel de navegación (las miniaturas), mantén presionada la diapositiva número 3 y muévela para que se convierta en la número 2."}, 
  v:"agregar diapositivas google slides"},
 {t:"Semana 4: Temas y Colores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar un diseño unificado a toda la presentación mediante el uso de Temas predeterminados.</p><p><strong>📖 Explicación detallada:</strong><br>Tener una presentación con fondo blanco y letras negras no llamará la atención de tus compañeros. Aunque podríamos ir diapositiva por diapositiva cambiando el color, esto tomaría horas y podría quedar desparejo. <br><br>La solución profesional es utilizar la opción de 'Temas' (Themes). Un tema es un paquete inteligente diseñado por expertos que cambia el fondo, el tipo de letra, los colores y la ubicación de los títulos de todas tus diapositivas al mismo tiempo. Aplicar un tema garantiza coherencia visual: todas las páginas parecerán ser parte de una misma familia o libro, dándole un toque corporativo y estéticamente superior a tu proyecto en un solo clic.</p>", 
  a1:{t:"Catálogo de Temas", d:"Abre el menú principal de tu presentación (tres puntitos) y selecciona 'Cambiar Tema'. Explora todas las opciones disponibles en la galería."}, 
  a2:{t:"Cambio Automático", d:"Selecciona un tema oscuro y elegante. Revisa tus diapositivas 1, 2 y 3 para comprobar cómo el programa les cambió el diseño a todas simultáneamente."}, 
  v:"cambiar tema google slides celular"},
 {t:"Semana 5: Insertar Fotos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Enriquecer la presentación insertando imágenes desde el dispositivo para apoyar la narrativa oral.</p><p><strong>📖 Explicación detallada:</strong><br>El 80% de una buena exposición es visual. El público entenderá mejor tu explicación de las pirámides de Egipto si están viendo una gran foto de ellas en lugar de leer texto sobre las mismas.<br><br>Para agregar fotografías en Slides, utilizamos el mismo botón de inserción (+) que vimos en Docs. La diferencia vital en Slides es que, una vez que la imagen entra a la diapositiva, actúa como un bloque independiente. Puedes arrastrar sus esquinas para hacerla del tamaño exacto que necesitas. Un error común es jalar la imagen desde los lados en lugar de las esquinas, lo cual aplastará o deformará la foto, haciéndola lucir poco profesional. Siempre debes escalarla desde un punto de la esquina.</p>", 
  a1:{t:"Apoyo Visual", d:"Ve a tu diapositiva número 2. Escribe de título 'Mi Animal Favorito'. Ve a Insertar (+), selecciona Imagen desde galería y coloca una foto de ese animal."}, 
  a2:{t:"Redimensión Correcta", d:"Selecciona la foto y usa solo los puntos de las esquinas azules para hacerla tan grande que cubra la mitad de la diapositiva sin deformarse."}, 
  v:"insertar imagen google slides celular"},
 {t:"Semana 6: La Regla del Poco Texto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Sintetizar ideas largas utilizando viñetas para crear guías de lectura rápidas y eficientes.</p><p><strong>📖 Explicación detallada:</strong><br>El error número uno al hacer presentaciones es pegar bloques de texto de Internet y tratar de leerlos en voz alta. Para evitarlo, usamos la regla del poco texto: tu diapositiva solo debe tener apuntes clave, la verdadera información la debes decir tú con tu voz.<br><br>Para lograr esto, las herramientas ofimáticas fomentan el uso de las 'Viñetas' (Puntitos). Una viñeta solo debe contener entre 4 y 7 palabras. Por ejemplo, en lugar de escribir: 'El león es un animal muy peligroso que come mucha carne y vive en África', la diapositiva solo debe decir: '• Animal carnívoro. • Habita en África. • Considerado peligroso'. El expositor luego explicará los detalles a la audiencia.</p>", 
  a1:{t:"Resumir en Viñetas", d:"Crea una diapositiva con el título 'Cosas que me gustan'. Usa la herramienta de viñetas para listar 3 cosas usando solo 2 o 3 palabras por cada punto."}, 
  a2:{t:"Edición Rápida", d:"Elimina cualquier oración larga que se pase de una línea. Practica decir la oración completa en voz alta mientras solo lees las dos palabras clave de la pantalla."}, 
  v:"viñetas google slides celular"},
 {t:"Semana 7: El Botón de Presentar", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Activar el modo de pantalla completa y navegar durante la exposición en vivo.</p><p><strong>📖 Explicación detallada:</strong><br>Mientras estamos diseñando, vemos todos los menús, botones y herramientas de la aplicación. Cuando llegue el momento de exponer frente a la clase, no podemos mostrar nuestra pantalla desordenada; debemos activar el 'Modo de Presentación'.<br><br>En la parte superior hay un ícono de reproducción (similar a un botón de Play). Al pulsarlo y elegir 'Presentar en este dispositivo', la aplicación elimina todos los botones y menús, mostrando únicamente la diapositiva en pantalla completa, como si fuera una película. A partir de este momento, para avanzar a la siguiente tarjeta solo necesitas dar un toque suave en el lado derecho de la pantalla, o tocar el lado izquierdo si necesitas retroceder a la idea anterior.</p>", 
  a1:{t:"Simulacro de Pantalla", d:"Ve a la primera diapositiva de tu proyecto y presiona el botón de 'Presentar' en la parte superior. Observa cómo desaparecen las herramientas de edición."}, 
  a2:{t:"Navegación Táctil", d:"Toca el lado derecho de tu pantalla varias veces hasta llegar al final de tu presentación. Luego presiona el botón de salir ('X' o flecha atrás) para regresar al editor."}, 
  v:"como presentar google slides celular"},
 {t:"Semana 8: Proyecto de Exposición", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diseñar una presentación lógica, aplicar un tema visual y realizar un simulacro de exposición oral utilizando Slides.</p><p><strong>📖 Explicación detallada:</strong><br>En esta última etapa, se requiere demostrar que la tecnología es un apoyo para tu comunicación, no tu reemplazo. Deberás crear un proyecto de 4 diapositivas aplicando un Tema coherente, insertando imágenes de apoyo sin deformarlas y respetando la regla del uso de viñetas para minimizar el texto.<br><br>Se evaluará tu capacidad organizativa (que las hojas tengan un orden lógico: Título, Datos y Fin), tu estética digital (que el fondo no impida leer la letra) y, finalmente, tu habilidad técnica para poner el dispositivo en 'Modo Presentación' sin pedir ayuda, demostrando total autonomía y dominio sobre la herramienta ofimática.</p>", 
  a1:{t:"Creación Ejecutiva", d:"Elabora una presentación de 4 hojas sobre un deporte. Hoja 1: Título. Hoja 2: Reglas (en viñetas). Hoja 3: Una gran imagen. Hoja 4: Cierre (Gracias)."}, 
  a2:{t:"La Exposición Oral", d:"Activa el Modo Presentación. Explícale el tema a un familiar o a la pared durante 1 minuto, tocando la pantalla para avanzar las diapositivas justo en el momento adecuado."}, 
  v:"tips para exponer con diapositivas"}
];
  
  // === GRADO 3 - BIMESTRE 4: IA Tools ===
const g3_b4 = [
 {t:"Semana 1: Autocorrector y Texto Predictivo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender cómo el teclado utiliza estadística e IA para predecir las palabras que vamos a escribir.</p><p><strong>📖 Explicación detallada:</strong><br>¿Te has fijado que mientras escribes un mensaje, el teclado del celular te sugiere la siguiente palabra en la parte superior antes de que la teclees? A esto se le llama 'Texto Predictivo'.<br><br>No es que el celular lea tu mente. Utiliza una IA de procesamiento de lenguaje que se basa en matemáticas y probabilidad. La IA ha leído millones de correos y libros, y ha calculado que después de la palabra 'Feliz', la palabra que más usan los humanos es 'Cumpleaños'. Además, la IA 'aprende' de ti; si siempre escribes 'Nos vemos en el parque', la próxima vez que escribas 'Nos vemos en el...', el teclado adivinará la palabra 'parque' automáticamente para ahorrarte tiempo.</p>", 
  a1:{t:"Juego de Predicción", d:"Abre un documento y escribe 'Me gusta comer'. Observa la barra arriba del teclado. ¿Qué tres palabras te sugiere la Inteligencia Artificial?"}, 
  a2:{t:"La Historia del Robot", d:"Escribe solo la palabra 'El', y a partir de ahí, presiona siempre la palabra del medio que te sugiere el texto predictivo hasta formar una oración loca de 10 palabras."}, 
  v:"como funciona el teclado predictivo"},
 {t:"Semana 2: Reconocimiento Visual (Google Lens)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar las cámaras inteligentes (Computer Vision) para analizar objetos del mundo real y obtener datos.</p><p><strong>📖 Explicación detallada:</strong><br>Las cámaras ya no solo sirven para guardar recuerdos, ahora son 'ojos' inteligentes conectados al internet. La tecnología detrás de esto se llama 'Visión por Computadora' (Computer Vision).<br><br>Aplicaciones como Google Lens toman una foto, pero en lugar de guardarla, la IA la escanea buscando formas, colores y letras. Si apuntas a una flor, la IA compara la forma de los pétalos con millones de fotos de flores en internet en milisegundos y te dice su nombre científico. Esta tecnología es tan avanzada que puede leer códigos de barras, detectar si estás fotografiando un perro o un gato, e incluso decirte dónde comprar los zapatos que estás enfocando con la cámara.</p>", 
  a1:{t:"Explorador Lens", d:"Abre la aplicación de Google o la cámara con Lens integrado. Apunta a un objeto de tu mochila (como un bolígrafo de marca) y presiona el botón de buscar para ver qué resultados te da internet."}, 
  a2:{t:"Lector de Textos Vivos", d:"Apunta la cámara de Lens hacia una página de tu libro, selecciona la opción 'Texto' y usa el botón de 'Escuchar' para que la IA te lea la página en voz alta."}, 
  v:"como usar google lens para estudiar"},
 {t:"Semana 3: Filtros de Cámara y Rostros", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender el reconocimiento facial básico utilizado en filtros de redes sociales y seguridad geométrica.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando usas un filtro divertido que te pone orejas de perro o lentes de sol que se mueven contigo, estás usando Inteligencia Artificial de Mapeo Facial.<br><br>La cámara no sabe que tú eres un humano. La IA está programada para buscar un patrón geométrico específico: dos puntos oscuros alineados (los ojos), una línea vertical en el centro (la nariz) y una línea horizontal que cambia de forma abajo (la boca). Al encontrar ese patrón en la pantalla, el programa dibuja una 'máscara invisible' de puntos sobre tu rostro. Si tú giras la cabeza, el programa calcula el movimiento de esos puntos matemáticos y hace que el filtro digital (las orejas de perro) gire exactamente al mismo tiempo y ángulo.</p>", 
  a1:{t:"El Patrón Geométrico", d:"Toma una foto de tu cara frontal. Usando una herramienta de dibujo, dibuja puntos sobre tus ojos, la punta de la nariz y los bordes de la boca. Así te ve la IA."}, 
  a2:{t:"Engañar a la Máquina", d:"Abre una app con filtros faciales. Apunta la cámara a un dibujo de una cara sonriente en un papel (o una muñeca). ¿Logra la IA ponerle el filtro al papel? Si es así, la engañaste."}, 
  v:"como funcionan los filtros de caras inteligencia artificial"},
 {t:"Semana 4: IA en la Música y el Sonido", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender cómo los sistemas de IA identifican ondas sonoras para buscar coincidencias en bases de datos masivas.</p><p><strong>📖 Explicación detallada:</strong><br>¿Te ha pasado que escuchas una canción en la radio y no sabes cómo se llama? Aplicaciones como 'Shazam' o el buscador de Google pueden escuchar 5 segundos de la música y decirte el nombre exacto de la canción, el artista y el álbum.<br><br>Esto no lo hace un humano escuchando del otro lado. El sonido está hecho de ondas. La IA graba un pedacito de la canción, lo convierte en un gráfico de líneas (un espectrograma) y crea una 'Huella dactilar de audio' única. Luego, viaja a la nube y busca a la velocidad de la luz entre 50 millones de canciones hasta encontrar el gráfico que encaje perfectamente como un rompecabezas. Cuando hay 'Match' (coincidencia), te muestra el resultado en la pantalla.</p>", 
  a1:{t:"La Huella Sonora", d:"Dibuja cómo te imaginas que se ve el sonido de un grito vs. el sonido de un susurro en forma de líneas o gráficos (Ondas)."}, 
  a2:{t:"Cazador de Canciones", d:"Usa la función 'Buscar canción' en Google o Shazam. Pídele al profesor que ponga una canción instrumental y mira cuánto tiempo tarda la IA en encontrar su nombre."}, 
  v:"como funciona shazam inteligencia artificial"},
 {t:"Semana 5: Traductor de Cámara en Vivo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Combinar tecnologías de OCR (Reconocimiento Óptico de Caracteres) e IA para manipular el texto en la realidad aumentada.</p><p><strong>📖 Explicación detallada:</strong><br>Hemos hablado de traducir por voz y buscar fotos con Lens, pero existe una fusión de ambas tecnologías: la traducción en Realidad Aumentada (AR).<br><br>Si abres el Traductor de Google, seleccionas 'Cámara' y apuntas a un cartel en inglés, la IA hace tres trabajos increíbles en un segundo. 1) OCR: Detecta dónde hay letras en la foto. 2) NLP: Traduce esas palabras del inglés al español. 3) Realidad Aumentada: Borra mágicamente las letras originales de la pantalla y dibuja las letras nuevas en español encima, imitando el mismo color y tamaño original para que parezca que el cartel siempre estuvo en tu idioma.</p>", 
  a1:{t:"Magia AR", d:"Abre el Traductor de cámara. Apunta a la portada de tu libro de inglés o a la etiqueta de tu camisa. Mira cómo el texto en la pantalla cambia de idioma en tiempo real."}, 
  a2:{t:"Diferencia Tecnológica", d:"Explica en tu cuaderno por qué crees que es más fácil para el traductor cambiar el texto de un cartel claro que el texto escrito a mano en cursiva."}, 
  v:"traduccion de camara google en vivo"},
 {t:"Semana 6: El Asistente de Matemáticas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar IA para la resolución guiada de problemas lógico-matemáticos (No solo obtener la respuesta, sino los pasos).</p><p><strong>📖 Explicación detallada:</strong><br>Copiar la respuesta de una calculadora no te hace más inteligente. Las herramientas de IA modernas para la educación, como Socratic o Google Lens Matemático, no solo te dan el número final, sino que te enseñan.<br><br>Cuando escaneas una ecuación compleja o un problema de texto, el algoritmo analiza la estructura matemática. En lugar de arrojarte un 'X = 5', la IA está programada para actuar como un tutor: busca en internet cómo se resuelve ese tipo de problema y te despliega en la pantalla el 'Paso a paso' (Paso 1: Sumar ambos lados. Paso 2: Dividir...), para que entiendas la lógica detrás de la solución y puedas replicarla tú mismo en el examen.</p>", 
  a1:{t:"El Tutor Virtual", d:"Escribe en tu cuaderno una suma de tres cifras. Usa Google Lens (Opción Tareas/Deberes) y tómale una foto. Revisa si te muestra los pasos de la solución."}, 
  a2:{t:"Uso Ético", d:"Escribe un pequeño párrafo debatiendo: ¿Por qué es malo usar la IA para que haga toda tu tarea, y por qué es bueno usarla para que te explique cuando no entiendes?"}, 
  v:"socratic app inteligencia artificial para estudiar"},
 {t:"Semana 7: Privacidad con la IA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender el riesgo de los datos biométricos y personales al interactuar con aplicaciones impulsadas por IA.</p><p><strong>📖 Explicación detallada:</strong><br>La Inteligencia Artificial necesita comer 'Datos' para hacerse más lista. Cada vez que usas un teclado predictivo, le das tu foto a una cámara de filtros o le hablas a un asistente, esos datos viajan por internet hacia las empresas dueñas de la IA.<br><br>Esto levanta un tema crítico: La Privacidad. Es divertido usar aplicaciones que 'te envejecen la cara con IA', pero al aceptar los términos y condiciones sin leer, le estás regalando los datos geométricos de tu rostro a una empresa desconocida, la cual podría venderlos. Jamás debes proporcionar tu nombre completo, dirección, contraseñas o fotos personales y sensibles a programas de IA (como ChatGPT o apps de filtros gratuitas), porque esos datos quedan registrados en su memoria de entrenamiento para siempre.</p>", 
  a1:{t:"Detectives de Privacidad", d:"Revisa tu dispositivo e identifica dos aplicaciones (ej. Cámara, Teclado) que creas que recolectan tus datos para funcionar con IA."}, 
  a2:{t:"El Escudo Digital", d:"Escribe 3 reglas de oro en tu cuaderno sobre qué cosas personales NUNCA le contarías o le mostrarías a una Inteligencia Artificial."}, 
  v:"privacidad de datos en internet niños"},
 {t:"Semana 8: Proyecto: Herramientas del Futuro", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Consolidar el conocimiento sobre las herramientas cognitivas (IA) y su aplicación práctica en el estudio diario.</p><p><strong>📖 Explicación detallada:</strong><br>Hemos pasado de herramientas pasivas (como escribir texto) a herramientas activas y cognitivas (aplicaciones que 'piensan' contigo). En este punto, tu dispositivo móvil se ha convertido en una navaja suiza digital.<br><br>Para cerrar esta unidad y el curso completo, deberás demostrar que dominas estas nuevas tecnologías no para el entretenimiento, sino para la productividad. El profesor asignará un reto que requerirá que utilices la predicción de texto para redactar rápido, Google Lens para extraer información de un objeto físico y el asistente de voz para traducir un pequeño párrafo, integrando el flujo de trabajo de la IA en tu rutina académica de manera segura y ética.</p>", 
  a1:{t:"El Reto Integrado", d:"Usa el traductor de cámara para leer una etiqueta en inglés. Escribe su significado en tus Notas usando dictado por voz. ¡Muestra tu resultado!"}, 
  a2:{t:"Reflexión Final", d:"Escribe un pequeño ensayo de 5 líneas respondiendo: ¿Cómo crees que nos ayudará la Inteligencia Artificial cuando seas adulto y estés trabajando?"}, 
  v:"el futuro de la tecnologia en la educacion"}
];

 {t:"Semana 6: Mapas y Ubicación",

 {t:"Semana 7: Código QR",

const g4_b2 = [
 {t:"Semana 1: ¿Qué son las Tablas?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Organizar información estructurada utilizando el sistema de cuadrículas en Google Docs.</p><p><strong>📖 Explicación detallada:</strong><br>En la redacción de documentos, a menudo encontramos información que resulta confusa si se escribe en párrafos normales, como listas de precios, horarios o comparaciones. Para solucionar esto, la ofimática utiliza 'Tablas'.<br><br>Una tabla es una cuadrícula organizativa compuesta por dos elementos fundamentales: las 'Filas', que son las líneas horizontales (acostadas) que van de izquierda a derecha, y las 'Columnas', que son las líneas verticales (paradas) que van de arriba hacia abajo. La intersección donde se cruza una fila y una columna se llama 'Celda', y es allí donde introducimos el texto o los números. Al insertar una tabla, el sistema te pedirá que definas previamente cuántas columnas y filas necesitarás para estructurar tus datos correctamente.</p>", 
  a1:{t:"Insertar Matriz", d:"Abre el menú de inserción (+) y selecciona 'Tabla'. Configura la matriz para que tenga exactamente 3 columnas y 3 filas. Observa cómo aparece la cuadrícula en tu documento."}, 
  a2:{t:"Encabezados", d:"En la primera fila superior, escribe los encabezados de tu tabla: 'Nombre', 'Edad', 'Deporte Favorito'. Aplica negrita a esta fila para diferenciarla del resto de los datos."}, 
  v:"insertar tablas google docs celular"},
 {t:"Semana 2: Mi Primer Horario", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar el formato de tablas para gestionar el tiempo y diseñar un horario de clases funcional.</p><p><strong>📖 Explicación detallada:</strong><br>Las tablas no son rígidas; el procesador de texto permite modificar su apariencia para que la información sea más legible y profesional. Uno de los usos más prácticos de las tablas es la gestión del tiempo mediante horarios.<br><br>Para que un horario sea efectivo, necesita formato. Puedes ajustar el ancho de las columnas arrastrando las líneas divisorias, en caso de que el nombre de una materia sea muy largo y no quepa en una sola línea. Además, puedes aplicar un color de fondo diferente a las celdas de los títulos (como los días de la semana) utilizando la herramienta de 'Color de fondo de la celda', lo cual crea un contraste visual que facilita encontrar la información rápidamente sin forzar la vista.</p>", 
  a1:{t:"Días de la Semana", d:"Crea una tabla nueva. En la primera fila (encabezado), escribe los días hábiles de Lunes a Viernes. Aplica alineación centrada a todo el texto de esa fila."}, 
  a2:{t:"Asignación de Clases", d:"Completa las celdas inferiores ingresando las materias que cursas cada día. Intenta aplicar un color de fondo azul claro a la celda donde escribas 'Informática'."}, 
  v:"hacer horario en docs celular"},
 {t:"Semana 3: Entrando a Google Sheets", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar la interfaz y la lógica de coordenadas de las Hojas de Cálculo.</p><p><strong>📖 Explicación detallada:</strong><br>Mientras que Google Docs es un lienzo en blanco para escribir texto, Google Sheets (Hojas de Cálculo) es un entorno diseñado específicamente para trabajar con números, datos y matemáticas. Al abrir Sheets, notarás que toda la pantalla ya es una tabla infinita de celdas.<br><br>La característica más importante de Sheets es su sistema de coordenadas. Cada celda tiene una 'dirección' única, como si fuera la dirección de una casa. Las columnas están nombradas con Letras mayúsculas en la parte superior (A, B, C...) y las filas están numeradas en el lateral izquierdo (1, 2, 3...). Al hacer clic en un cuadro, su nombre se forma uniendo la columna y la fila; por ejemplo, el primer cuadro arriba a la izquierda es siempre la celda 'A1'.</p>", 
  a1:{t:"Navegación por Coordenadas", d:"Abre la aplicación Google Sheets. Desplázate por la pantalla, localiza visualmente la celda B2 y escribe tu primer nombre en ella."}, 
  a2:{t:"Búsqueda de Celdas", d:"Localiza la columna D y baja hasta la fila 10. Escribe la palabra 'Coordenada' exactamente en la celda D10."}, 
  v:"introduccion google sheets celular"},
 {t:"Semana 4: Bordes y Colores en Sheets", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar el formato visual de las celdas para su correcta presentación o impresión.</p><p><strong>📖 Explicación detallada:</strong><br>Al entrar a Sheets, ves líneas grises que separan todas las celdas. Es crucial entender que estas líneas son solo guías visuales para ayudarte a trabajar en la pantalla. Si intentaras imprimir esa hoja, saldría totalmente en blanco, sin ninguna línea divisoria.<br><br>Para convertir un grupo de datos en una tabla formal y profesional, es necesario aplicarles 'Bordes' reales. Seleccionando el conjunto de celdas y utilizando la herramienta de 'Bordes' (el ícono de una pequeña cuadrícula), le indicamos al programa que dibuje líneas negras permanentes. Adicionalmente, el 'Bote de pintura' o color de relleno nos permite destacar encabezados o celdas con resultados importantes, dándole estructura visual a nuestros datos.</p>", 
  a1:{t:"Enmarcar Datos", d:"Selecciona un bloque contiguo de 4 celdas. Utiliza la herramienta de bordes y elige la opción 'Todos los bordes' para dibujar una cuadrícula negra."}, 
  a2:{t:"Relleno de Énfasis", d:"Selecciona únicamente la primera celda de tu cuadrícula y utiliza la herramienta de color de relleno (bote de pintura) para aplicarle un fondo amarillo claro."}, 
  v:"formato celdas google sheets"},
 {t:"Semana 5: Introducción a Presentaciones", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar el uso de un procesador de texto frente al software de presentaciones visuales.</p><p><strong>📖 Explicación detallada:</strong><br>Google Slides (Presentaciones) tiene un propósito completamente distinto a Docs o Sheets. Se utiliza como apoyo visual cuando vas a hablar frente a una audiencia (una exposición de clase o una reunión de negocios). Por ello, no utiliza páginas verticales, sino 'Diapositivas' horizontales diseñadas para proyectarse en pantallas o televisores.<br><br>La regla de oro de una presentación profesional es que no debe estar llena de texto largo. El público no puede leer un documento completo y prestarte atención al mismo tiempo. Las diapositivas deben contener 'Temas' visualmente atractivos (diseños de fondo predeterminados), letras muy grandes y viñetas cortas que resuman los puntos clave de lo que tú estás explicando oralmente.</p>", 
  a1:{t:"Nueva Diapositiva", d:"Abre Google Slides y crea una presentación nueva. Escribe el título 'La Tecnología' en la primera diapositiva, y luego utiliza el botón de 'Nueva diapositiva' para agregar una hoja adicional en blanco."}, 
  a2:{t:"Aplicación de Tema", d:"Explora el menú de diseño y selecciona un 'Tema' (plantilla de colores y formas) para cambiar el fondo blanco aburrido por un diseño profesional."}, 
  v:"usar google slides celular"},
 {t:"Semana 6: Textos e Imágenes en Slides", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Manipular objetos y cuadros de texto para diagramar el contenido de una presentación.</p><p><strong>📖 Explicación detallada:</strong><br>A diferencia de un documento normal donde escribes directamente sobre el fondo, en Slides el lienzo es libre y funciona por 'Capas' u objetos. Para poder escribir cualquier palabra, es obligatorio crear primero un 'Cuadro de texto' (Text box). Esta caja invisible actúa como un contenedor que puedes mover, rotar o cambiar de tamaño en cualquier parte de la pantalla.<br><br>Las presentaciones dependen fuertemente del impacto visual, por lo que insertar imágenes es fundamental. Una técnica de diseño profesional consiste en mantener el equilibrio en la pantalla: si colocas un cuadro de texto en la mitad izquierda de la diapositiva, deberías insertar una fotografía relevante en la mitad derecha. Esto guía el ojo del espectador de manera armónica.</p>", 
  a1:{t:"Contenedores de Texto", d:"Ve a tu segunda diapositiva, inserta un nuevo cuadro de texto y utiliza viñetas para listar 3 beneficios de usar computadoras."}, 
  a2:{t:"Equilibrio Visual", d:"Arrastra el cuadro de texto que creaste hacia la parte izquierda de la pantalla. Luego, inserta una imagen relacionada con tecnología y colócala en el espacio vacío de la derecha."}, 
  v:"insertar imagen google slides celular"},
 {t:"Semana 7: Transiciones Básicas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar efectos de movimiento entre diapositivas manteniendo la sobriedad del diseño.</p><p><strong>📖 Explicación detallada:</strong><br>Las 'Transiciones' son animaciones o efectos visuales programados que ocurren en el intervalo de tiempo en el que cambias de una diapositiva a la siguiente durante tu exposición. Estos efectos (como disolución, deslizamiento o giro) hacen que la presentación fluya con un ritmo dinámico y parecido al de un video.<br><br>Sin embargo, el uso de las transiciones requiere criterio. En entornos académicos o profesionales, se recomienda usar transiciones sutiles (como 'Disolver' o 'Aparición') y aplicar el mismo efecto a toda la presentación. Utilizar una transición extravagante o diferente para cada diapositiva distrae a la audiencia del contenido principal y le resta seriedad a tu trabajo.</p>", 
  a1:{t:"Efecto de Disolución", d:"Configura una transición suave de tipo 'Disolver' o 'Desvanecer' para que se aplique en el cambio entre tu diapositiva 1 y tu diapositiva 2."}, 
  a2:{t:"Simulacro de Presentación", d:"Inicia el 'Modo Presentación' tocando el ícono de reproducción (Play). Pasa a la siguiente diapositiva para comprobar cómo se visualiza el efecto de transición a pantalla completa."}, 
  v:"transiciones google slides celular"},
 {t:"Semana 8: Proyecto Ofimático", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Seleccionar y utilizar la herramienta ofimática adecuada para un objetivo específico de comunicación.</p><p><strong>📖 Explicación detallada:</strong><br>Un profesional digital sabe distinguir cuándo usar Docs (para informes de lectura y redacción formal), cuándo usar Sheets (para cálculos y bases de datos) y cuándo usar Slides (para exposiciones y material de apoyo visual).<br><br>Para este cierre de unidad, consolidarás tus habilidades en Slides. Deberás diseñar una presentación visual coherente y equilibrada, demostrando que puedes jerarquizar la información: usarás textos grandes para títulos, viñetas para ideas concisas, fotografías para ilustrar conceptos y transiciones sutiles para unir las diapositivas de manera elegante, listo para exponer frente a un proyector.</p>", 
  a1:{t:"Creación Ejecutiva", d:"Elabora una presentación de 3 diapositivas sobre tu deporte o afición favorita. Incluye: Diapositiva de título, diapositiva con reglas o datos (en viñetas) y diapositiva visual con imágenes ilustrativas."}, 
  a2:{t:"Prueba de Campo", d:"Inicia el modo presentación y practica explicar tu tema oralmente, pasando las diapositivas en tu dispositivo al ritmo de tu explicación, tal como lo harías frente al salón."}, 
  v:"como hacer una buena presentacion niños"}
];
  
  // === GRADO 4 - BIMESTRE 3: Diseño ===
const g4_b3 = [
 {t:"Semana 1: El Lienzo y los Formatos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender las dimensiones y orientaciones de un archivo digital según su propósito.</p><p><strong>📖 Explicación detallada:</strong><br>Antes de poner un solo color o letra, un diseñador debe saber dónde se verá su trabajo. En las aplicaciones de diseño (como Canva, Adobe Express o similares), lo primero es elegir el 'Formato' del lienzo.<br><br>Si el diseño es para imprimirse en la escuela, usaremos un formato rectangular vertical (A4 o Carta). Si es para proyectarse en una pantalla, será rectangular horizontal (16:9). Si es para el perfil de una red social, debe ser un cuadrado perfecto (1:1). Escoger el lienzo equivocado desde el principio hará que, al final, tu diseño salga cortado al intentar imprimirlo o que queden barras negras a los lados en las pantallas. La planificación espacial es el paso número uno.</p>", 
  a1:{t:"Análisis de Formatos", d:"Mide con una regla o calcula visualmente la forma de la pantalla de tu dispositivo, la de un cuaderno y la de una televisión. Anota cuál es vertical y cuál horizontal."}, 
  a2:{t:"Creación de Lienzo", d:"Abre tu aplicación de diseño y explora el menú de crear nuevo. Crea un lienzo cuadrado (Post de Instagram o 1080x1080) y déjalo en blanco."}, 
  v:"formatos de diseño digital explicacion"},
 {t:"Semana 2: Psicología del Color", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar paletas de color para transmitir emociones y mensajes sin usar palabras.</p><p><strong>📖 Explicación detallada:</strong><br>Los colores le hablan al cerebro humano antes de que la persona siquiera empiece a leer. El rojo transmite alerta, energía o hambre (por eso lo usan los restaurantes rápidos). El azul transmite tranquilidad, tecnología y seguridad (usado por bancos y hospitales).<br><br>Un diseño profesional rara vez usa más de 3 colores principales. A esto se le llama 'Paleta de colores'. Al diseñar, debemos usar la Rueda Cromática o los códigos Hexadecimales (códigos de 6 letras y números que identifican un color exacto en internet) para asegurarnos de que el fondo y los elementos tengan colores que combinen armónicamente y no lastimen la vista del espectador por estar demasiado saturados.</p>", 
  a1:{t:"Cazador de Marcas", d:"Piensa en 3 marcas famosas y escribe en tu cuaderno qué colores usan en sus logotipos y por qué crees que eligieron esos colores."}, 
  a2:{t:"Mi Paleta", d:"En tu lienzo digital, dibuja 3 cuadrados. Usa el selector de color para pintar el primero de azul oscuro, el segundo de celeste y el tercero de naranja (una paleta de colores complementarios)."}, 
  v:"psicologia del color diseño para niños"},
 {t:"Semana 3: El Poder de la Tipografía", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Seleccionar y emparejar fuentes de texto (Tipografías) para asegurar la legibilidad del mensaje.</p><p><strong>📖 Explicación detallada:</strong><br>La Tipografía es el arte de diseñar las letras. Existen dos grandes familias: las 'Serif' (letras que tienen pequeños adornos o 'zapatitos' en las puntas, ideales para libros largos y serios) y las 'Sans Serif' (letras rectas y modernas, ideales para pantallas y carteles).<br><br>Un error de novato es usar fuentes de letras cursivas o muy adornadas para todo el texto. Aunque se ven bonitas, son imposibles de leer desde lejos. La regla de oro en el diseño de afiches es: usar una fuente gruesa y llamativa para el Título Gigante, y una fuente recta, clara y sencilla (Sans Serif) para el texto pequeño que explica los detalles. Nunca se deben usar más de dos tipos de letras diferentes en un mismo diseño.</p>", 
  a1:{t:"Contraste de Fuentes", d:"Inserta dos cajas de texto en tu lienzo. En la de arriba escribe 'FIESTA' usando una letra muy gruesa y divertida. En la de abajo escribe 'Te invito a mi casa' usando una letra recta y delgada."}, 
  a2:{t:"Prueba de Legibilidad", d:"Aléjate un metro de tu pantalla. Si no puedes leer el texto pequeño fácilmente, debes cambiar la tipografía a una más clara o aumentarle el tamaño."}, 
  v:"como combinar fuentes tipograficas"},
 {t:"Semana 4: Composición y Márgenes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Estructurar el espacio de trabajo para evitar el desorden visual mediante la respiración del diseño.</p><p><strong>📖 Explicación detallada:</strong><br>Tener una hoja en blanco no significa que debemos llenarla hasta los bordes. El 'Espacio Negativo' o espacio en blanco es fundamental. Si pegamos las letras y las imágenes a la orilla del lienzo, el diseño se verá amontonado y generará estrés visual al lector.<br><br>Debemos imaginar un margen o marco invisible alrededor de todo nuestro lienzo donde está prohibido poner cosas importantes. Además, aplicamos técnicas de composición visual: si ponemos una imagen muy grande y pesada en el lado izquierdo, debemos equilibrarla poniendo el texto o colores más oscuros en el lado derecho para que la balanza visual no se 'caiga' hacia un solo lado.</p>", 
  a1:{t:"Márgenes Seguros", d:"Activa la opción de 'Mostrar márgenes' o 'Mostrar reglas' en tu aplicación de diseño. Notarás un cuadro de líneas punteadas; asegúrate de que tus letras nunca se salgan de ahí."}, 
  a2:{t:"El Equilibrio", d:"Coloca un círculo muy grande de color oscuro en una esquina. Luego, utiliza varias figuras pequeñas y claras en la esquina opuesta para lograr el equilibrio visual."}, 
  v:"composicion visual diseño basico"},
 {t:"Semana 5: Iconos e Ilustraciones", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar vectores y gráficos minimalistas para comunicar instrucciones rápidas.</p><p><strong>📖 Explicación detallada:</strong><br>En el diseño moderno, especialmente para internet o aplicaciones, no siempre usamos fotografías reales. Los 'Iconos' (dibujos simples de un solo color como la lupa de buscar, la casa del menú de inicio o el sobre de correo) son el lenguaje universal de la tecnología.<br><br>Estos elementos se llaman 'Vectores'. A diferencia de una foto normal que se pixela y se vuelve borrosa si la haces muy grande, los vectores son cálculos matemáticos que mantienen sus líneas perfectamente definidas sin importar su tamaño. Aprenderemos a buscar en la biblioteca de elementos usando palabras clave específicas como 'Icono teléfono' o 'Ilustración vector' para mantener un estilo limpio y profesional.</p>", 
  a1:{t:"Lenguaje Universal", d:"Ve a la sección de Elementos y busca 3 íconos: uno de ubicación (pin), uno de teléfono y uno de reloj. Colócalos alineados en tu lienzo."}, 
  a2:{t:"Información Visual", d:"Añade una caja de texto al lado de cada ícono e inventa una dirección, un número y una hora. ¡Acabas de crear la sección de contacto de un cartel profesional!"}, 
  v:"uso de iconos en diseño digital"},
 {t:"Semana 6: Contraste para Leer Mejor", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Asegurar que los mensajes de texto destaquen claramente sobre los fondos fotográficos.</p><p><strong>📖 Explicación detallada:</strong><br>Uno de los problemas más comunes es poner letras blancas sobre una foto que tiene el cielo blanco, haciendo que las letras desaparezcan. Para solucionar esto, el diseñador debe dominar el 'Contraste'.<br><br>El contraste es la diferencia de luz y oscuridad. Si el fondo es oscuro, la letra debe ser clara; si el fondo es claro, la letra debe ser oscura. Cuando necesitamos escribir encima de una fotografía llena de muchos colores diferentes, la técnica secreta es insertar un cuadrado de color negro o gris oscuro detrás del texto, y bajarle la 'Transparencia' (Opacidad) al 50%. Esto oscurecerá la foto sutilmente y permitirá que nuestras letras blancas resalten con total claridad.</p>", 
  a1:{t:"El Problema del Fondo", d:"Pon de fondo una fotografía de un paisaje con mucho sol. Escribe la palabra 'HOLA' en color blanco y colócala sobre la parte más clara de la foto para ver cómo se pierde."}, 
  a2:{t:"La Solución (Caja Opaca)", d:"Inserta un cuadrado, píntalo de negro y ponlo detrás del texto. Ve al botón de 'Transparencia' (los cuadritos degradados) y bájalo a la mitad. Mira cómo resalta el texto ahora."}, 
  v:"contraste de color en diseño"},
 {t:"Semana 7: Agrupación y Alineación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar herramientas de alineación automática para lograr precisión milimétrica en el lienzo.</p><p><strong>📖 Explicación detallada:</strong><br>El ojo humano detecta inmediatamente cuando algo está ligeramente chueco. Intentar centrar tres cuadros de texto moviéndolos solo con el dedo a 'ojo de buen cubero' dejará resultados mediocres.<br><br>Las aplicaciones ofimáticas y de diseño incluyen herramientas de 'Alineación'. Cuando seleccionas varios elementos al mismo tiempo, el sistema te muestra botones mágicos que dicen: 'Alinear al centro', 'Alinear a la izquierda' o 'Distribuir verticalmente'. Estas opciones usan las coordenadas matemáticas de la pantalla para colocar los objetos en una línea perfecta con precisión milimétrica. Una vez alineados, debemos utilizar el botón de 'Agrupar' para fusionarlos temporalmente y que no se vuelvan a desordenar.</p>", 
  a1:{t:"El Desorden", d:"Inserta 3 estrellas de diferente tamaño y ponlas desordenadas por la pantalla."}, 
  a2:{t:"Orden Matemático", d:"Selecciona las tres estrellas juntas al mismo tiempo (Selección múltiple). Busca la opción 'Posición' o 'Alinear' y elige 'Alinear al medio'. Observa cómo forman una fila perfecta."}, 
  v:"alinear y agrupar en canva"},
 {t:"Semana 8: Proyecto de Diseño Publicitario", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar la teoría del color, tipografía y composición en la creación de un producto digital final.</p><p><strong>📖 Explicación detallada:</strong><br>El examen final consistirá en crear una pieza gráfica completa desde cero. Serás evaluado no por hacer el diseño más lleno de cosas, sino el más ordenado y efectivo para comunicar un mensaje.<br><br>Deberás elegir un lienzo con el formato correcto, aplicar un fondo con buen contraste, usar una tipografía llamativa para el título y una clara para la información, insertar vectores en lugar de fotos borrosas y dejar márgenes respirables. Al finalizar, generarás la exportación en alta calidad (PNG) para presentar tu trabajo demostrando todo lo aprendido en la unidad.</p>", 
  a1:{t:"Construcción del Afiche", d:"Diseña un cartel digital invitando a una 'Feria de Tecnología'. Usa una paleta de colores azul y blanco. Incluye título, fecha, lugar y un ícono de computadora."}, 
  a2:{t:"Revisión de Calidad", d:"Verifica tus márgenes, asegúrate de que los textos están bien alineados usando la herramienta automática y exporta el archivo a la galería."}, 
  v:"como hacer un cartel digital facil"}
];
  
  // === GRADO 4 - BIMESTRE 4: IA Ayuda ===
const g4_b4 = [
 {t:"Semana 1: ¿Qué es la IA de Asistencia?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender cómo la Inteligencia Artificial actúa como una herramienta de apoyo para potenciar nuestras capacidades diarias.</p><p><strong>📖 Explicación detallada:</strong><br>La Inteligencia Artificial no viene a reemplazar a los humanos, viene a asistirnos. A esto se le llama 'Inteligencia Aumentada'. Así como una calculadora nos ayuda a resolver multiplicaciones gigantes en un segundo sin que tengamos que hacerlas en papel, la IA de asistencia nos ayuda a procesar grandes cantidades de información rápidamente.<br><br>Los asistentes virtuales, los sistemas de dictado y los traductores son ejemplos de IA de ayuda. No piensan por ti, pero ejecutan las tareas repetitivas o complejas para que tu cerebro humano tenga más tiempo y energía para dedicarse a lo más importante: la creatividad y la toma de decisiones.</p>", 
  a1:{t:"Análisis de Tareas", d:"Haz una lista de 3 cosas que te toman mucho tiempo hacer en la escuela (ej. buscar información, traducir, revisar ortografía) y anota cómo crees que una máquina podría ayudarte."}, 
  a2:{t:"El Ayudante Invisible", d:"Escribe un pequeño párrafo explicando la diferencia entre 'hacer trampa' en un examen y 'usar una herramienta' para estudiar mejor."}, 
  v:"inteligencia artificial como herramienta de ayuda"},
 {t:"Semana 2: Búsqueda Visual Avanzada", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar motores de visión computacional para extraer información estructurada del mundo físico.</p><p><strong>📖 Explicación detallada:</strong><br>El buscador de texto de Google es útil cuando sabes cómo se llama lo que estás buscando. Pero, ¿qué pasa si ves un insecto raro o un edificio histórico y no sabes su nombre? Para eso usamos la Búsqueda Visual (como Google Lens).<br><br>Esta IA descompone la fotografía en millones de puntos matemáticos y los compara con toda la base de datos de internet. No solo reconoce objetos, sino que puede extraer texto de una foto (OCR). Si tomas foto a una página de un libro físico, la IA reconoce las letras y te permite copiarlas y pegarlas en tu documento digital, ahorrándote el trabajo de transcribir todo el texto a mano.</p>", 
  a1:{t:"Extracción de Texto (OCR)", d:"Usa Google Lens o una app similar. Tómale una foto a un párrafo de un libro físico, selecciona el texto en la pantalla y pégalo en un documento digital."}, 
  a2:{t:"El Investigador Visual", d:"Toma foto a una planta, un animal o una fruta. Revisa los resultados web que la IA te muestra para identificar su nombre científico."}, 
  v:"como extraer texto de una imagen celular"},
 {t:"Semana 3: Dictado y Accesibilidad", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Manejar el Procesamiento de Lenguaje Natural (NLP) como herramienta de transcripción y accesibilidad.</p><p><strong>📖 Explicación detallada:</strong><br>La IA también sirve para hacer que la tecnología sea accesible para todos. Si una persona tiene una mano lastimada y no puede teclear, puede usar el 'Dictado por Voz'. La IA escucha las ondas sonoras, identifica los fonemas de las palabras y las escribe en la pantalla en tiempo real.<br><br>Pero va más allá. También existe el proceso inverso: 'Texto a Voz' (Text-to-Speech). Si tienes que leer un artículo muy largo de internet y se te cansa la vista, puedes activar la función de lectura en voz alta. Una IA con voz neuronal (que suena casi humana, respetando las comas y los puntos) te leerá todo el documento mientras tú solo escuchas, como si fuera un audiolibro.</p>", 
  a1:{t:"Dictado de un Minuto", d:"Abre un documento nuevo. Activa el micrófono del teclado e intenta dictar todo lo que hiciste en tu día de corrido durante un minuto. Revisa qué tan preciso fue."}, 
  a2:{t:"Lectura Asistida", d:"Busca un artículo de Wikipedia en tu navegador. Activa la función de 'Escuchar página' o 'Lectura en voz alta' y escucha un párrafo completo."}, 
  v:"texto a voz y dictado inteligente"},
 {t:"Semana 4: Corrector Contextual", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender cómo la IA analiza la gramática y el sentido de las oraciones para sugerir mejoras de redacción.</p><p><strong>📖 Explicación detallada:</strong><br>Los correctores ortográficos antiguos solo sabían si una palabra existía en el diccionario o no. Si escribías 'El banco de madera' y 'El banco de dinero', el sistema viejo no veía la diferencia. La IA moderna es 'Contextual'.<br><br>Esto significa que la Inteligencia Artificial lee toda la oración completa para entender el significado o 'contexto'. Si escribes 'Yo fue a la tienda', la IA no solo te marca la falta ortográfica, sino que analiza la gramática, detecta que el tiempo verbal está mal estructurado y te sugiere cambiarlo por 'Yo fui a la tienda'. Estas herramientas (como Grammarly o el editor de Google Docs) son copilotos de escritura que te enseñan a redactar mejor.</p>", 
  a1:{t:"Prueba de Contexto", d:"Escribe en un documento: 'Ayer yo correr en el parque con mi perro'. Observa cómo la línea azul de la IA te sugiere corregir el verbo para que tenga sentido."}, 
  a2:{t:"Corrector Activo", d:"Revisa un texto viejo que hayas escrito. Pásalo por el corrector del procesador de texto y acepta las sugerencias gramaticales que mejoren tu redacción."}, 
  v:"corrector gramatical con inteligencia artificial"},
 {t:"Semana 5: IA en Traducción Contextual", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar traductores neuronales para romper barreras idiomáticas comprendiendo expresiones complejas.</p><p><strong>📖 Explicación detallada:</strong><br>Traducir palabra por palabra siempre termina mal. Por ejemplo, en inglés 'It is raining cats and dogs' significa 'Llueve a cántaros', pero si traduces palabra por palabra diría 'Están lloviendo gatos y perros', lo cual no tiene sentido en español.<br><br>Las inteligencias artificiales de traducción (como DeepL o Google Translate) usan Redes Neuronales que analizan párrafos enteros. Han sido entrenadas leyendo millones de libros en ambos idiomas, por lo que saben identificar frases hechas, refranes y el tono formal o informal del texto, entregando traducciones que suenan naturales y humanas, acercando culturas y facilitando el estudio global.</p>", 
  a1:{t:"El Refrán", d:"Intenta traducir un refrán o frase hecha de tu país al inglés usando un traductor con IA. ¿Lo tradujo literalmente o buscó una frase similar en inglés?"}, 
  a2:{t:"Comunicación Global", d:"Usa la función de 'Conversación' del traductor. Di una frase en español y deja que la IA hable en voz alta en otro idioma para comunicarte con alguien más."}, 
  v:"traductor neuronal como funciona"},
 {t:"Semana 6: Resumen Automático", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Emplear la IA para sintetizar grandes volúmenes de texto y extraer los conceptos más importantes.</p><p><strong>📖 Explicación detallada:</strong><br>A veces los profesores nos piden leer artículos de 10 páginas. Aprender a leer es fundamental, pero cuando hacemos investigación, necesitamos saber rápidamente de qué trata un documento antes de dedicarle horas. Aquí entra la 'Extracción de Información'.<br><br>Existen herramientas de IA integradas en los navegadores o aplicaciones que pueden leer un documento entero en 2 segundos y generar un resumen en viñetas de lo más importante. La IA no corta pedazos de texto al azar; su algoritmo evalúa cuáles son los sustantivos y verbos más repetidos y reconstruye un párrafo nuevo que contiene la idea principal (la tesis) del texto original.</p>", 
  a1:{t:"Lectura y Síntesis", d:"Encuentra una noticia larga en internet. Lee el primer párrafo y luego usa una herramienta de IA (o un bot) para pedirle que 'Resuma este texto en 3 viñetas'."}, 
  a2:{t:"Comparación", d:"Verifica si el resumen que hizo la Inteligencia Artificial incluyó la información más importante que tú también notaste al leer el principio de la noticia."}, 
  v:"resumir textos con inteligencia artificial"},
 {t:"Semana 7: Organización y Rutinas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Delegar la gestión del tiempo y la creación de recordatorios a la asistencia automatizada.</p><p><strong>📖 Explicación detallada:</strong><br>La IA también es un excelente gestor de proyectos. Nuestro cerebro suele estresarse tratando de recordar fechas de exámenes, horas de entrega y reuniones. Liberar esa carga mental nos hace más productivos.<br><br>Podemos usar calendarios inteligentes y asistentes de voz para programar rutinas. Si tú le dices a tu dispositivo: 'Programa una rutina de estudio', la IA puede configurarse para que, a las 4:00 PM de lunes a viernes, tu teléfono se ponga en silencio, suene música de concentración y te envíe un recordatorio para abrir tus libros. La automatización del tiempo nos ayuda a ser disciplinados.</p>", 
  a1:{t:"Creación de Recordatorio", d:"Usa el asistente de tu dispositivo. Dile: 'Recuérdame revisar mi mochila a las [pon una hora cercana]'. Espera a que la IA te lo notifique."}, 
  a2:{t:"El Horario", d:"Escribe en un papel qué tareas harías automáticamente todos los días si pudieras programar a un robot asistente para que te las recordara."}, 
  v:"automatizar tareas con asistente de voz"},
 {t:"Semana 8: Proyecto: Mi Asistente Escolar", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Demostrar competencia integrando diferentes herramientas de IA para resolver un problema académico.</p><p><strong>📖 Explicación detallada:</strong><br>El examen final consistirá en utilizar a tu 'Copiloto' de IA de forma ética y útil. Serás puesto a prueba con un ejercicio práctico que requerirá no tu memoria, sino tu habilidad para delegar tareas tecnológicas.<br><br>Deberás extraer texto de una imagen usando la cámara, traducirlo a otro idioma usando la IA neuronal y pasarlo por un corrector ortográfico para asegurarte de que quede perfecto en tu documento final. El objetivo es que logres completar el circuito de tareas en menos tiempo y con menos errores de los que tendrías si lo hicieras totalmente a mano.</p>", 
  a1:{t:"Circuito de Asistencia", d:"1. Escanea un párrafo físico con Lens. 2. Pega el texto y tradúcelo. 3. Revisa la gramática con el editor del documento."}, 
  a2:{t:"Reflexión", d:"Escribe al final de tu documento: ¿Cuál de todas estas herramientas de Inteligencia Artificial crees que te servirá más para tu próximo año escolar?"}, 
  v:"herramientas de ia para estudiantes"}
];

 {t:"Semana 1: Google Drive",

 {t:"Semana 2: Carpetas Compartidas",

 {t:"Semana 3: Google Calendar", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Organizar nuestro tiempo y nunca olvidar una tarea o examen.</p><p><strong>📖 Explicación:</strong><br>Tu cerebro no puede recordarlo todo, pero tu celular sí. Usaremos el Calendario para <b>agendar el futuro</b>. El calendario nos enviará una notificación antes del evento para que no nos tome por sorpresa.</p>",

 {t:"Semana 4: Contraseñas Seguras", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Crear contraseñas fuertes que los hackers no puedan adivinar.</p><p><strong>📖 Explicación:</strong><br>'123456', tu fecha de nacimiento o el nombre de tu perro <b>NO</b> son contraseñas seguras. Una buena contraseña es como una ensalada: Tiene Mayúsculas, minúsculas, números y símbolos raros.</p><p><strong>Truco:</strong> Usa una frase loca. Ej: 'MeGustaComerPizzaALas3!'.</p>", 
  a1:{t:"Fortaleza", d:"Inventa una contraseña 'Mnemotécnica' (basada en una frase) y escríbela en un papel secreto que guardarás en casa."},

  v:"crear contraseñas seguras"},
 {t:"Semana 5: Widgets", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Personalizar la pantalla de inicio para ser más rápidos y eficientes.</p><p><strong>📖 Explicación:</strong><br>Un <b>Widget</b> es una 'mini-app' que vive en tu pantalla de inicio. Te deja ver el calendario o tus notas sin tener que abrir la aplicación. Ahorra mucho tiempo.</p><p><strong>🛠️ Manos a la obra:</strong><br>Mantén presionado el fondo de pantalla > Widgets > Busca Calendar o Drive > Arrástralo.</p>", 
  a1:{t:"Acceso Rápido", d:"Agrega el Widget de Calendar grande a tu pantalla principal para ver tu agenda siempre."}, 
  a2:{t:"Lista a la Vista", d:"Agrega el Widget de Google Keep (Notas) para ver tu lista de tareas pendientes sin abrir la app."}, 
  v:"mejores widgets productividad android"},
 {t:"Semana 6: Fake News", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> No creer todo lo que vemos en internet. Verificar la verdad.</p><p><strong>📖 Explicación:</strong><br>Cualquiera puede escribir en internet. Debemos ser detectives para saber si es verdad. Si una noticia es demasiado sorprendente o te da mucho miedo, ¡duda!</p><ul><li><b>¿Quién lo escribió?</b> (Autor).</li><li><b>¿Cuándo?</b> (Fecha).</li><li><b>¿Otras páginas dicen lo mismo?</b></li></ul>", 
  a1:{t:"El Detective", d:"Busca una noticia 'rara' (ej: Animales que llueven). Investiga en 2 webs distintas si es Verdadera o Falsa y explica por qué."}, 
  a2:{t:"Fuente", d:"Aprende a identificar si una web es seria (Revisa la sección 'Quiénes somos' o busca la fecha de la noticia)."}, 
  v:"identificar fake news niños"},
 {t:"Semana 7: Comentarios Docs", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Corregir trabajos de compañeros de forma digital y amable.</p><p><strong>📖 Explicación:</strong><br>En lugar de tachar con rojo o borrar lo que hizo tu amigo, en digital usamos <b>Comentarios</b>. Así tu amigo puede ver qué cambiar sin que le arruines su documento.</p><p><strong>🛠️ Manos a la obra:</strong><br>Selecciona una palabra > Toca el ícono '+' de comentario > Escribe tu sugerencia.</p>", 
  a1:{t:"El Editor", d:"Revisa el texto de un compañero. Déjale al menos 2 comentarios constructivos (uno de corrección y uno de felicitación)."},

 {t:"Semana 8: Proyecto Organizador",
