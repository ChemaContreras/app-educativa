<style>
    /* ESTILOS GLOBALES */
    :root { --p: #2563eb; --s: #db2777; --bg: #f8fafc; --c: #fff; --t: #334155; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); padding-bottom: 80px; }
    .nav { background: var(--p); color: #fff; padding: 1rem; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .bk { background: 0 0; border: 0; color: #fff; font-size: 24px; margin-right: 15px; cursor: pointer; }
    .tit { font-weight: 800; font-size: 1.2rem; }
    .con { max-width: 800px; margin: 25px auto; padding: 0 20px; }
    
    /* PANTALLA DE LOGIN */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; background: var(--c); }
    .log-box { max-width: 400px; width: 100%; }
    .log-ic { font-size: 60px; color: var(--p); margin-bottom: 10px; }
    .log-tit { font-size: 1.8rem; color: #1e293b; margin-bottom: 5px; font-weight: 800; }
    .log-sub { color: #64748b; margin-bottom: 30px; font-size: 0.9rem; }
    .inp { width: 100%; box-sizing: border-box; padding: 15px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; }
    .inp:focus { border-color: var(--p); }
    .btn-log { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.3s; }
    .btn-log:active { background: #1d4ed8; }
    .cerrar-sesion { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; margin-left: auto; }

    /* ESTILOS DE LA PLATAFORMA */
    .grd { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .crd { background: var(--c); border-radius: 16px; padding: 30px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border-bottom: 5px solid transparent; transition: transform .2s; }
    .crd:active { transform: scale(.98); }
    .crd.bim { border-bottom-color: var(--s); } .crd.bim .ic { color: var(--s); }
    .ic { font-size: 45px; color: var(--p); margin-bottom: 10px; }
    .ct { font-weight: 800; color: #1e293b; display: block; }
    .lck { opacity: 0.6; background: #e2e8f0; cursor: not-allowed; border-color: #94a3b8 !important; }
    .lck .ic { color: #94a3b8 !important; }
    .lst { background: var(--c); border-radius: 16px; overflow: hidden; }
    .it { padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; cursor: pointer; font-weight: 600; }
    .it:hover { background: #f8fafc; }
    .dt { background: var(--c); border-radius: 16px; padding: 30px; line-height: 1.8; }
    .bdg { background: #dbeafe; color: var(--p); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
    h2 { color: #1e293b; margin: 15px 0 25px; font-size: 1.8rem; }
    .bx p { margin-bottom: 15px; } .bx ul, .bx ol { margin-left: 20px; margin-bottom: 20px; } .bx li { margin-bottom: 8px; } .bx strong { color: #1e293b; }
    .sh { display: flex; align-items: center; font-weight: 800; font-size: 1.1rem; margin: 30px 0 15px; color: var(--p); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
    .sh.act { color: var(--s); } .sh span { margin-right: 10px; font-size: 24px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .tb { flex: 1; padding: 12px; border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; font-weight: 700; color: #64748b; cursor: pointer; }
    .tb.on { background: var(--s); color: #fff; border-color: var(--s); }
    .abx { background: #fff1f2; padding: 25px; border-radius: 12px; border-left: 5px solid var(--s); }
    .vid { display: flex; justify-content: center; align-items: center; width: 100%; background: #ef4444; color: #fff; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 40px; font-size: 1.1rem; }
    .hid { display: none !important; }
</style>

// === GRADO 1 ===
const g1_b1 = [
 {t:"Semana 1: ¿Qué es mi dispositivo?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conocer las partes físicas de la tableta o celular y cómo usar nuestros dedos en la pantalla sin miedo.</p><p><strong>📖 Explicación:</strong><br>Un dispositivo inteligente no es solo una pantalla de vidrio. Es una pequeña computadora que tiene 'ojos' y 'botones mágicos'.</p><ul><li><b>Botón de Encendido:</b> Es el que despierta al celular cuando está dormido.</li><li><b>Botones de Volumen:</b> Sirven para que hable más fuerte o en secreto.</li><li><b>Pantalla Táctil:</b> Funciona con el calor de tu dedo. ¡No necesitas apretar fuerte! Es como tocar una burbuja de jabón sin romperla.</li></ul><p><strong>🛠️ Manos a la obra (Paso a paso):</strong><br>1. Sostén tu dispositivo con las dos manos.<br>2. Busca los botones en los bordes.<br>3. Presiona suavemente el botón de encendido para ver la luz.<br>4. Usa tu dedo índice para deslizar en la pantalla.</p>", 
  a1:{t:"Simón Dice Digital", d:"El profesor dirá: '¡Simón dice tocar el botón de subir volumen!' y todos deben hacerlo. Luego '¡Simón dice bloquear pantalla!'."}, 
  a2:{t:"Mi Dibujo Tecnológico", d:"En una hoja de papel, dibuja tu tableta. Pinta de <b>ROJO</b> el botón de apagar y de <b>AZUL</b> los botones de volumen."}, 
  v:"partes del celular para niños"},
 {t:"Semana 2: Higiene y Cuidado", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Cómo limpiar nuestro equipo y evitar accidentes fatales.</p><p><strong>📖 Explicación:</strong><br>Tu dispositivo es delicado. Tiene tres grandes enemigos:</p><ol><li><b>El Agua:</b> Si se moja, deja de funcionar para siempre.</li><li><b>La Comida:</b> Las migas y los dedos pegajosos ensucian la pantalla.</li><li><b>Las Caídas:</b> El suelo es lava para tu celular. Siempre debe estar en el centro de la mesa, nunca en la orilla.</li></ol><p><strong>🛠️ Manos a la obra:</strong><br>Nunca limpies la pantalla con tu suéter (la ropa tiene polvo que raya). Usa un pañito suave (de microfibra) y haz círculos suaves sobre la pantalla hasta que te veas como en un espejo.</p>", 
  a1:{t:"Limpieza Guiada", d:"Con un pañito, todos limpiaremos la pantalla al mismo tiempo siguiendo al profesor."}, 
  a2:{t:"Zona de Peligro", d:"Mira a tu alrededor. Señala 3 lugares donde NO debes poner tu celular (ej: cerca de una botella de agua, en la orilla de la mesa, en el suelo)."}, 
  v:"cuidados del celular para niños"},
 {t:"Semana 3: La Cámara Mágica (Enfoque)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Abrir la cámara y lograr que la foto se vea clarita (enfocada).</p><p><strong>📖 Explicación:</strong><br>¿Alguna vez has visto una foto borrosa? Eso pasa porque la cámara 'no sabía qué mirar'. La cámara es como un ojo; necesita que le digas qué es lo importante. Para eso usamos el <b>Enfoque Táctil</b>.</p><p><strong>🛠️ Manos a la obra (Paso a paso):</strong><br>1. Abre la aplicación de Cámara.<br>2. Apunta a un objeto.<br>3. <b>¡El Truco!</b> Toca con tu dedo en la pantalla justo donde está el objeto.<br>4. Verás un cuadrito o círculo amarillo. Eso significa que ya enfocó. ¡Dispara!</p>", 
  a1:{t:"Cazador de Objetos", d:"Pon un borrador en la mesa. Tócale la nariz al borrador (en la pantalla) para enfocar y toma la foto."}, 
  a2:{t:"Cerca y Lejos", d:"Toma una foto a tu mano (muy cerca) y luego una foto a la pizarra (muy lejos). Debes tocar la pantalla cada vez para enfocar."}, 
  v:"tomar fotos con celular niños"},
 {t:"Semana 4: Fotografiando Tareas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Tomar una foto perfecta de nuestro cuaderno para enviarla al profesor.</p><p><strong>📖 Explicación:</strong><br>Para mandar tareas, la foto debe ser perfecta. Si está oscura o chueca, el profesor no podrá leerla.</p><ul><li><b>La Luz:</b> La luz debe dar en el cuaderno, no en la cámara.</li><li><b>El Ángulo:</b> Debes ponerte arriba del cuaderno, como un pájaro volando.</li></ul><p><strong>🛠️ Manos a la obra:</strong><br>1. Pon tu cuaderno sobre una mesa plana.<br>2. Levántate de la silla.<br>3. Sostén el celular con dos manos encima de la hoja.<br>4. ¡Cuidado con tu sombra! Muévete si tu sombra tapa las letras.</p>", 
  a1:{t:"El Fotógrafo Escolar", d:"Toma una foto a la página 10 de tu libro. Revisa: ¿Se lee todo? ¿Salió tu sombra?"}, 
  a2:{t:"Editor de Luz", d:"Toma una foto con poca luz (bajo la mesa). Luego toma otra igual acercándote a una ventana. Compara las dos fotos."}, 
  v:"escanear tareas con celular"},
 {t:"Semana 5: Mi Galería", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Encontrar nuestras fotos y borrar las que no sirven.</p><p><strong>📖 Explicación:</strong><br>Todas las fotos que tomas se van a una casita llamada 'Galería' o 'Fotos'. A veces llenamos la casita de fotos feas (el suelo, fotos negras) y hay que limpiar para tener espacio.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Busca el ícono que parece una flor o un paisaje (Galería).<br>2. Entra y mira tus fotos.<br>3. Si ves una foto negra, borrosa o que no te gusta, tócala y busca el basurero 🗑️ para borrarla.</p>", 
  a1:{t:"Basurero Digital", d:"Entra a tu galería. Encuentra 3 fotos que no sirvan y bórralas para siempre."}, 
  a2:{t:"Mis Favoritas", d:"Busca la foto más bonita que tengas y dale al corazón ❤️ (Favoritos) para no perderla nunca."}, 
  v:"galeria de fotos android niños"},
 {t:"Semana 6: Emojis y Teclado", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Escribir nuestro nombre y usar caritas (emojis) para expresarnos.</p><p><strong>📖 Explicación:</strong><br>El teclado del celular es mágico. Tiene letras para escribir palabras, pero también tiene dibujos llamados <b>Emojis</b>. Un emoji vale más que mil palabras: una carita feliz 🙂 dice que estás contento sin escribir nada.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre una aplicación de Notas.<br>2. Toca la pantalla para que salga el teclado.<br>3. Busca la carita feliz 🙂 en el teclado para abrir el menú de emojis.<br>4. Explora los animales, comidas y caritas.</p>", 
  a1:{t:"Mi Nombre Animal", d:"Escribe tu nombre y pon al lado el animal que te represente. (Ejemplo: 'Ana 🦋')."}, 
  a2:{t:"Cuento con Emojis", d:"Intenta escribir una frase solo con dibujos. Ej: 🏠 🏃 🏫 (Corro de casa a la escuela)."}, 
  v:"teclado y emojis para niños"},
 {t:"Semana 7: Comandos de Voz", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Hablar con el celular para que nos ayude sin tocarlo.</p><p><strong>📖 Explicación:</strong><br>Tu celular tiene oídos. Puedes pedirle cosas sin tocarlo usando el <b>Asistente de Voz</b>. Es como tener un amigo robot que sabe todo. Puedes pedirle que abra aplicaciones o que te diga la hora.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Busca el micrófono 🎙️ en la barra de Google o mantén presionado el botón de inicio.<br>2. Di fuerte y claro: 'Abrir calculadora'.<br>3. ¡Mira cómo obedece sin que tú busques nada!</p>", 
  a1:{t:"La Orden Mágica", d:"Pasa al frente y dile al celular: <i>'Cuéntame un chiste'</i>. Todos escucharemos la respuesta."}, 
  a2:{t:"Sonidos Animales", d:"Pregúntale al asistente: <i>'¿Qué sonido hace el elefante?'</i> y escucha."}, 
  v:"google assistant para niños trucos"},
 {t:"Semana 8: Proyecto Final", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar todo lo aprendido (Enfoque, Luz y Cuidado) para crear un recuerdo digital.</p><p><strong>📖 Explicación:</strong><br>Hoy seremos fotógrafos profesionales. No tomaremos una foto rápida; tomaremos una foto <b>pensada</b>. Cuidaremos que no esté borrosa, que tenga luz y que el celular esté seguro.</p><p><strong>🛠️ Manos a la obra (Instrucciones):</strong><br>1. Trae tu juguete favorito.<br>2. Busca un lugar con buena luz (cerca de la ventana).<br>3. Limpia el lente de tu cámara con el pañito.<br>4. Sostén el celular con dos manos, enfoca tocando la pantalla y dispara.</p>", 
  a1:{t:"El Fotógrafo", d:"Muestra tu foto al profesor. Debe estar nítida y con luz."}, 
  a2:{t:"Galería de Arte", d:"(Evaluación) Si hay proyector, mostraremos las fotos de todos y explicaremos por qué elegimos ese juguete."}, 
  v:"tips fotografia movil niños"}
];

// === GRADO 1 - BIMESTRE 2: Nube y Docs ===
const g1_b2 = [
 {t:"Semana 1: ¿Qué es la Nube?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender el concepto de almacenamiento virtual y cómo protege nuestra información.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando hablamos de 'La Nube' en informática, no nos referimos a las nubes del cielo. La nube es un sistema de computadoras gigantes y muy potentes, llamadas servidores, que están conectadas a internet todo el tiempo. <br><br>Antes, si se rompía una computadora o se perdía un teléfono, las personas perdían todas sus fotos, trabajos y archivos. Ahora, al guardar nuestros documentos en la nube, la información viaja por internet y se almacena en estos servidores seguros. De esta manera, si tu dispositivo se daña, tu información sigue intacta y puedes acceder a ella desde cualquier otra pantalla ingresando tu usuario y contraseña.</p>", 
  a1:{t:"Dibujo de la Nube", d:"Dibuja en tu cuaderno una representación de 'La Nube' tecnológica. Adentro, dibuja tres cosas importantes que te gustaría guardar allí para que nunca se pierdan."}, 
  a2:{t:"Buscando la Nube", d:"Enciende tu dispositivo y busca el ícono de Google Drive (el triángulo con los colores verde, amarillo y azul). Tócalo para ver cómo luce por dentro."}, 
  v:"que es la nube para niños"},
 {t:"Semana 2: Entrando a Drive", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conocer la interfaz principal de nuestra mochila digital y aprender a navegar en ella.</p><p><strong>📖 Explicación detallada:</strong><br>Google Drive funciona exactamente como una mochila escolar, pero en versión digital. Es el espacio personal que te asigna la nube para organizar tus materiales de estudio. <br><br>Dentro de esta mochila digital, puedes tener diferentes compartimentos (carpetas) para separar tus clases de matemáticas, lenguaje o informática. Lo más importante de esta herramienta es el gran botón con el signo de Más (+). Este botón es el comando principal que le indica al sistema que deseas crear un elemento nuevo, ya sea una carpeta para organizar o un documento en blanco para empezar a trabajar.</p>", 
  a1:{t:"Abrir y Cerrar", d:"Abre la aplicación de Google Drive. Observa los elementos que aparecen en la pantalla y luego cierra la aplicación. Repite este proceso 3 veces para memorizar su ubicación."}, 
  a2:{t:"El Botón de Creación", d:"Dentro de Google Drive, localiza el botón con el signo Más (+) y tócalo para leer las opciones que te ofrece (Carpeta, Subir, Escanear, etc.). No crees nada todavía, solo explora el menú."}, 
  v:"google drive para niños"},
 {t:"Semana 3: Mi Primer Documento", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Crear un archivo de texto digital para empezar a escribir sin usar papel físico.</p><p><strong>📖 Explicación detallada:</strong><br>Históricamente, los seres humanos han escrito sobre piedra, luego sobre pergaminos y finalmente sobre papel hecho de árboles. Hoy en día, utilizamos documentos digitales, como Google Docs.<br><br>La ventaja de una hoja digital es que es infinita; nunca te quedarás sin espacio para escribir. Además, al usar documentos digitales en lugar de cuadernos físicos, ayudamos a cuidar el medio ambiente reduciendo la tala de árboles. Al tocar el botón para crear un nuevo Documento de Google, el sistema genera inmediatamente un lienzo en blanco listo para recibir tus ideas a través del teclado.</p>", 
  a1:{t:"Hoja Nueva", d:"Dentro de Google Drive, presiona el botón '+' y selecciona 'Documento de Google' para generar tu primer archivo en blanco."}, 
  a2:{t:"El Teclado", d:"Toca suavemente la hoja en blanco en tu pantalla. Observa cómo aparece automáticamente el teclado digital en la parte inferior, indicando que el sistema está listo para que escribas."}, 
  v:"como usar google docs niños"},
 {t:"Semana 4: Escribiendo mi Nombre", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Reconocer la ubicación de las letras en el teclado para ingresar información al documento.</p><p><strong>📖 Explicación detallada:</strong><br>El teclado es el puente de comunicación entre tú y el dispositivo. Cada tecla representa un carácter específico (una letra, un número o un símbolo). Al presionar una tecla, le envías una señal al procesador del dispositivo, que inmediatamente dibuja esa misma letra en tu documento digital.<br><br>Es fundamental presionar las teclas con suavidad. Los dispositivos modernos son muy sensibles y registrarán la letra con un toque ligero. Si mantienes el dedo presionado por mucho tiempo sobre una letra, el sistema pensará que quieres escribirla muchas veces seguidas.</p>", 
  a1:{t:"Mi Nombre", d:"Busca una por una las letras que conforman tu primer nombre en el teclado digital y escríbelo en la primera línea de tu documento."}, 
  a2:{t:"Mi Animal Favorito", d:"Presiona la tecla para bajar de renglón y, debajo de tu nombre, escribe con cuidado cuál es el animal que más te gusta."}, 
  v:"aprender a escribir en teclado tablet"},
 {t:"Semana 5: Letras de Colores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Modificar el color del texto utilizando las herramientas de formato de la aplicación.</p><p><strong>📖 Explicación detallada:</strong><br>En un cuaderno físico, necesitas tener varios lapiceros o crayones para cambiar de color. En un documento digital, el texto aparece en color negro por defecto para facilitar la lectura, pero puedes cambiarlo al color que desees en una fracción de segundo.<br><br>Para lograr esto, los procesadores de texto tienen una barra de herramientas. Debes buscar el ícono que tiene una letra 'A' mayúscula con una línea de color debajo. Al seleccionar tu texto y tocar este ícono, se desplegará una paleta de colores completa que alterará los píxeles de la pantalla para mostrar tus palabras en el tono exacto que hayas elegido.</p>", 
  a1:{t:"Arcoíris", d:"Escribe tres palabras diferentes (por ejemplo: Sol, Mar, Bosque). Luego, cambia el color de cada palabra para que coincida con su significado."}, 
  a2:{t:"Mi Color Favorito", d:"Selecciona las letras de tu nombre y utiliza la herramienta de color de texto para pintarlo con tu color favorito."}, 
  v:"cambiar color de letra docs celular"},
 {t:"Semana 6: Letras Gigantes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Ajustar el tamaño de la fuente para establecer jerarquías visuales en el texto.</p><p><strong>📖 Explicación detallada:</strong><br>El tamaño de las letras en un documento no es solo una cuestión de decoración; sirve para indicarle al lector qué información es más importante. Los títulos siempre deben ser más grandes que el resto del texto para captar la atención inmediatamente.<br><br>El tamaño del texto se mide en 'puntos'. Un texto normal para leer suele estar en tamaño 11 o 12. Si cambias el tamaño a 24 o 36 puntos, el texto se verá gigante, ideal para un título principal. Puedes ajustar esta medida usando la herramienta que muestra números y signos de más (+) y menos (-) en el menú superior de formato.</p>", 
  a1:{t:"Jerarquía Visual", d:"Escribe la palabra 'TÍTULO' y aumenta su tamaño a 24 puntos. Debajo, escribe la palabra 'texto' y redúcela a tamaño 10."}, 
  a2:{t:"El Semáforo", d:"Escribe la letra 'O' tres veces en distintos renglones. Cambia sus tamaños para que la primera sea gigante, la segunda mediana y la tercera pequeña."}, 
  v:"cambiar tamaño letra google docs"},
 {t:"Semana 7: Poner una Foto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Insertar elementos multimedia dentro de un documento de texto para complementar la información.</p><p><strong>📖 Explicación detallada:</strong><br>Los documentos profesionales rara vez contienen únicamente texto. Las imágenes, fotografías y diagramas ayudan a explicar mejor las ideas y hacen que la lectura sea mucho más dinámica.<br><br>Para agregar una imagen en Google Docs, debes usar el menú de inserción (generalmente representado por un ícono de Más '+' en la parte superior). Al seleccionarlo, el sistema te preguntará el origen de la imagen: puedes tomar una foto nueva usando la cámara del dispositivo en ese momento, o puedes elegir una imagen que ya esté guardada previamente en tu galería. Una vez seleccionada, la imagen se colocará exactamente donde dejaste parpadeando tu cursor.</p>", 
  a1:{t:"El Ilustrador", d:"Escribe la palabra 'Perro' o 'Gato'. Ve al botón de insertar (+), selecciona 'Imagen' y escoge una foto de un animal desde la galería para colocarla debajo de la palabra."}, 
  a2:{t:"Foto en Vivo", d:"Usa nuevamente el botón de insertar, pero esta vez selecciona la opción de la cámara. Toma una foto de tu cuaderno y visualiza cómo se inserta directamente en tu hoja digital."}, 
  v:"insertar imagenes google docs celular"},
 {t:"Semana 8: Proyecto Final", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Consolidar las habilidades de creación, edición, formato y guardado en la nube.</p><p><strong>📖 Explicación detallada:</strong><br>Todo documento debe tener una estructura clara y, sobre todo, un nombre que lo identifique. Si creas diez documentos y a todos los dejas como 'Documento sin título', será imposible saber qué contiene cada uno sin tener que abrirlos uno por uno.<br><br>En esta última etapa, combinaremos todas las herramientas aprendidas. Es vital renombrar el archivo en la parte superior de la pantalla. Al hacer esto, el sistema de Google Drive actualizará la base de datos y tu trabajo quedará debidamente registrado y almacenado en los servidores de la nube, garantizando que puedas presentarlo y acceder a él en el futuro.</p>", 
  a1:{t:"Mi Cartel Digital", d:"Crea un nuevo documento y ponle de título 'Mi Cartel'. Escribe tu nombre completo con un tamaño de letra grande y un color llamativo. Finalmente, inserta una fotografía debajo."}, 
  a2:{t:"Auditoría de Guardado", d:"Cierra completamente la aplicación de Google Docs. Luego, ingresa a tu aplicación de Google Drive, localiza tu archivo llamado 'Mi Cartel' y ábrelo para confirmar que tus cambios se guardaron correctamente."}, 
  v:"guardar documentos google drive"}
];
  
 const g1_b3 = [
 {t:"Semana 1: ¿Qué es el Diseño?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender que las pantallas no solo sirven para ver cosas, sino para crear mensajes visuales usando colores y formas.</p><p><strong>📖 Explicación detallada:</strong><br>El diseño gráfico es la manera en la que combinamos imágenes, colores y letras para comunicar una idea. Todo lo que vemos a nuestro alrededor (la caja de tus cereales, los carteles en la calle, las portadas de los libros) fue creado por un diseñador en una computadora.<br><br>En esta unidad usaremos una herramienta mágica llamada Canva. Canva es un lienzo digital que nos da superpoderes para crear tarjetas, afiches y dibujos sin necesitar tijeras ni pegamento. En Canva, todo funciona seleccionando y arrastrando con nuestro dedo o ratón, lo que nos permite explorar nuestra creatividad de una manera limpia y moderna.</p>", 
  a1:{t:"Detective de Diseño", d:"Busca en tu casa o salón 3 objetos que tengan dibujos o letras (como una botella, un libro o un juguete) e identifica qué colores usaron."}, 
  a2:{t:"El Lienzo Blanco", d:"Abre la aplicación de Canva, presiona el botón '+' y elige la opción 'Documento A4' para ver tu primer lienzo en blanco."}, 
  v:"que es canva para niños"},
 {t:"Semana 2: Plantillas Mágicas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar diseños prefabricados (Templates) para ahorrar tiempo y aprender sobre composición visual.</p><p><strong>📖 Explicación detallada:</strong><br>En el mundo digital, no siempre tenemos que empezar desde cero. Canva tiene una biblioteca gigante de 'Plantillas' o Templates. Estas son bases que otros artistas profesionales ya dejaron listas, combinando colores que se ven bien juntos y letras que combinan a la perfección.<br><br>Al elegir una plantilla, nuestro trabajo no es hacer todo de nuevo, sino editarla. Es como tener un libro de colorear donde ya están las líneas hechas y nosotros decidimos cómo pintarlo. Aprenderemos a buscar en la barra superior la palabra de lo que necesitamos (ejemplo: 'Cumpleaños' o 'Perros') para que la aplicación nos muestre las plantillas correctas.</p>", 
  a1:{t:"Buscador de Ideas", d:"Entra a Canva, ve a la barra de búsqueda y escribe 'Tarjeta de animales'. Observa todas las opciones mágicas que aparecen."}, 
  a2:{t:"Mi Primera Plantilla", d:"Toca una plantilla que te guste mucho. Observa cómo se abre en tu lienzo y tócale las letras para ver cómo puedes borrarlas y escribir tu nombre."}, 
  v:"como usar plantillas en canva niños"},
 {t:"Semana 3: Agregar Figuras y Stickers", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Buscar e insertar elementos gráficos ('Elementos') para decorar nuestro lienzo.</p><p><strong>📖 Explicación detallada:</strong><br>Un diseño necesita dibujos para ser divertido. Canva tiene una pestaña muy importante llamada 'Elementos'. Es como una caja de stickers digital infinita donde hay millones de dibujos, formas geométricas y fotografías que puedes pegar en tu diseño.<br><br>Lo más interesante es que estos elementos son inteligentes. A diferencia de un sticker de papel que se rompe si intentas despegarlo, en Canva puedes tocar un elemento, hacerlo gigante, hacerlo pequeñito, o moverlo de un lado a otro las veces que quieras. Incluso, a muchos de estos elementos se les puede cambiar el color tocando el pequeño cuadrado de pintura que aparece en el menú inferior.</p>", 
  a1:{t:"El Menú Elementos", d:"En tu lienzo en blanco, presiona el botón '+', busca la pestaña 'Elementos' (que tiene un ícono de cuadrado, círculo y triángulo) y escribe 'Estrella'."}, 
  a2:{t:"Lluvia de Stickers", d:"Inserta 5 estrellas diferentes en tu lienzo. Cambia el tamaño de algunas para que se vean más grandes que otras."}, 
  v:"insertar elementos en canva"},
 {t:"Semana 4: Textos Divertidos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Añadir palabras a nuestro diseño utilizando diferentes tipos de letras (Tipografías).</p><p><strong>📖 Explicación detallada:</strong><br>En diseño, las letras no son solo para leerse, también son dibujos que adornan nuestro trabajo. A las diferentes formas y estilos de las letras se les llama 'Tipografías' o Fuentes.<br><br>Para agregar palabras, usamos la pestaña 'Texto' (representada por una letra 'T'). Canva nos permite elegir si queremos que la letra sea seria como la de un periódico, o divertida como la de un cómic. Al tocar el texto, podemos usar las opciones de abajo para cambiar su color o ponerle efectos como sombras o bordes de colores neón, haciendo que nuestro mensaje resalte mucho más en la pantalla.</p>", 
  a1:{t:"Mi Nombre en Neón", d:"Añade un cuadro de texto grande. Escribe tu primer nombre y busca el botón de 'Efectos' para aplicarle un efecto brillante o de sombra."}, 
  a2:{t:"La Tipografía", d:"Selecciona tu nombre y busca la opción 'Fuente'. Cambia el estilo de la letra al menos 3 veces hasta encontrar tu favorita."}, 
  v:"texto y fuentes canva celular"},
 {t:"Semana 5: Subir mis Propias Fotos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conectar la galería de nuestro dispositivo con la aplicación de diseño para personalizar nuestro trabajo.</p><p><strong>📖 Explicación detallada:</strong><br>Aunque Canva tiene miles de dibujos, a veces necesitamos usar nuestras propias fotografías. Existe un botón especial llamado 'Subidos' o 'Archivos subidos' (representado por una nube con una flecha) que sirve como un puente entre la galería de tu celular o tablet y el lienzo de Canva.<br><br>Al tocar este botón, Canva te pedirá permiso para entrar a tus fotos. Una vez que eliges la fotografía de tu mascota o tu familia, esta sube a la nube de Canva y puedes arrastrarla a tu diseño como si fuera un elemento más, dándole un toque totalmente personal y único a tu trabajo.</p>", 
  a1:{t:"Puente Digital", d:"Ve al menú '+', busca la pestaña 'Subidos' y elige la opción 'Subir archivos'. Busca una foto tuya o de algo que te guste en tu galería."}, 
  a2:{t:"Marco Perfecto", d:"Busca en 'Elementos' la palabra 'Marco' (son los dibujos que tienen un paisaje adentro). Ponlo en tu lienzo y arrastra tu foto dentro del marco para que tome su forma."}, 
  v:"subir fotos a canva app"},
 {t:"Semana 6: Cambiar el Fondo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar color o texturas a la base de nuestro diseño para evitar los espacios blancos aburridos.</p><p><strong>📖 Explicación detallada:</strong><br>El fondo es la pared sobre la que ponemos todos nuestros adornos. Dejar el fondo blanco puede verse inacabado. En nuestro diseño digital, cambiar el color del fondo es tan fácil como tocar la parte blanca de la pantalla donde no hay ningún elemento.<br><br>Al hacer esto, aparecerá la opción de color. Podemos elegir un color sólido, o usar la barra de búsqueda para escribir 'Fondo del espacio' o 'Fondo de madera'. El sistema reemplazará inmediatamente el lienzo blanco por una imagen que cubrirá toda la pantalla, dándole profundidad y vida a todo lo que hayamos puesto encima.</p>", 
  a1:{t:"Pintar la Pared", d:"Toca la parte blanca de tu lienzo y busca el botón 'Color'. Pinta todo tu fondo de tu color favorito."}, 
  a2:{t:"Fondo Mágico", d:"Ve a la pestaña 'Elementos' y busca 'Fondo de estrellas'. Toca los tres puntitos sobre la imagen y elige 'Establecer imagen como fondo'."}, 
  v:"cambiar fondo en canva"},
 {t:"Semana 7: Agrupar y Mover", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aprender técnicas para organizar varios elementos al mismo tiempo sin desordenar el diseño.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando tu diseño empieza a tener muchas letras, estrellas y fotos, moverlas una por una es muy cansado y puede arruinar cómo estaban acomodadas. <br><br>La solución técnica es 'Agrupar'. Esto significa que podemos usar una herramienta de selección para decirle a la computadora: 'Quiero que este texto y este círculo se vuelvan un solo equipo'. Al agruparlos, ambos objetos se moverán juntos, se harán grandes o pequeños al mismo tiempo, como si los hubiéramos pegado con pegamento virtual. Si después queremos separarlos, existe también el botón de 'Desagrupar'.</p>", 
  a1:{t:"El Equipo", d:"Pon un cuadrado de color y una estrella encima. Selecciona el cuadrado, busca la opción 'Seleccionar varios', toca la estrella y presiona 'Agrupar'."}, 
  a2:{t:"Movimiento en Bloque", d:"Intenta mover tu nuevo grupo por toda la pantalla para comprobar que ambas figuras ya no se separan."}, 
  v:"agrupar elementos canva celular"},
 {t:"Semana 8: Descargar mi Arte", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Exportar nuestro proyecto final desde la aplicación hacia la memoria de nuestro dispositivo.</p><p><strong>📖 Explicación detallada:</strong><br>Todo lo que hemos hecho hasta ahora vive dentro de Canva. Si queremos enviar nuestro afiche por correo al profesor o imprimirlo, necesitamos sacarlo de la aplicación. A este proceso se le llama 'Descargar' o Exportar.<br><br>En la esquina de arriba, siempre hay un botón que tiene una flecha apuntando hacia abajo o hacia arriba (Compartir). Al presionarlo, el procesador de Canva tomará todas las capas de letras, figuras y fondos, y las aplastará para convertirlas en una sola fotografía en formato JPG o PNG. Esa fotografía se guardará mágicamente en la galería de tu dispositivo, lista para ser enviada o impresa.</p>", 
  a1:{t:"Proyecto Final", d:"Crea un afiche que diga 'Feliz Día'. Ponle un fondo de color, usa letras divertidas y pon al menos 3 elementos decorativos."}, 
  a2:{t:"La Descarga", d:"Toca el botón de Compartir en la esquina superior derecha, selecciona 'Descargar', elige el formato PNG y guárdalo en la galería de tu dispositivo para mostrarlo."}, 
  v:"guardar imagen canva en galeria"}
];

const g1_b4 = [
 {t:"Semana 1: ¿Qué es la IA?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender que las computadoras pueden aprender a hacer tareas observando ejemplos, parecido a los humanos.</p><p><strong>📖 Explicación detallada:</strong><br>La Inteligencia Artificial (IA) suena a ciencia ficción o a robots gigantes, pero en realidad ya vive adentro de nuestras pantallas. Normalmente, una computadora solo hace exactamente lo que tú le ordenas cuando presionas un botón. Sin embargo, la Inteligencia Artificial es un tipo de programa especial que puede 'aprender'.<br><br>Imagina que le enseñas a un perrito a traer la pelota. Al principio se equivoca, pero con mucha práctica lo hace bien. La IA funciona igual: los científicos le muestran a la computadora miles de fotos de gatos, hasta que la computadora aprende a reconocer cómo es un gato por sí sola, sin que nadie se lo tenga que decir cada vez que ve uno nuevo.</p>", 
  a1:{t:"El Cerebro Digital", d:"En tu cuaderno, dibuja cómo te imaginas que es el 'cerebro' de una computadora. ¿Tiene cables, luces o números adentro?"}, 
  a2:{t:"Juego de Reconocimiento", d:"El profesor mostrará varias imágenes rápido. Tú debes gritar si es 'Perro' o 'Gato'. ¡Así es como entrena una Inteligencia Artificial!"}, 
  v:"que es la inteligencia artificial para niños"},
 {t:"Semana 2: Los Algoritmos (Recetas)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender que las máquinas siguen instrucciones paso a paso llamadas algoritmos.</p><p><strong>📖 Explicación detallada:</strong><br>Para que una Inteligencia Artificial funcione, necesita instrucciones muy claras. A estas instrucciones los programadores les llaman 'Algoritmos'.<br><br>Un algoritmo es exactamente igual a una receta de cocina para hacer un pastel. Si te saltas un paso (como olvidar poner los huevos), el pastel saldrá mal. La computadora lee su 'receta' paso a paso, a una velocidad increíble, para saber qué tiene que hacer. Si la computadora juega ajedrez contra ti, está usando un algoritmo larguísimo que le dice cuáles son los mejores movimientos según lo que tú hayas movido antes.</p>", 
  a1:{t:"Mi Receta Secreta", d:"Escribe en tu cuaderno el 'Algoritmo' (los pasos en orden) para lavarse las manos. Ej: 1. Abrir el agua, 2. Ponerse jabón..."}, 
  a2:{t:"El Robot Ciego", d:"Cierra los ojos. Un compañero te dará instrucciones precisas (un algoritmo) para que logres tocar la puerta del salón caminando sin ver."}, 
  v:"que es un algoritmo explicacion niños"},
 {t:"Semana 3: ¿Dónde vive la IA?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar entre un robot físico (hardware) y un programa de IA (software).</p><p><strong>📖 Explicación detallada:</strong><br>Muchas veces confundimos a los robots con la IA. Un robot es una máquina de metal y plástico que puedes tocar (Hardware). Puede tener brazos, ruedas y cámaras. Pero sin un 'cerebro', el robot no se movería.<br><br>La IA es el cerebro invisible, el programa matemático (Software). La IA no tiene cuerpo físico, vive en forma de código dentro de la computadora, de la tablet o en la nube. Por eso, tu teléfono celular no tiene brazos ni piernas de robot, pero sí tiene Inteligencia Artificial adentro para reconocer tu cara o tu voz cuando lo desbloqueas.</p>", 
  a1:{t:"Hardware vs Software", d:"Dibuja un robot de metal en una hoja. Luego, dibuja un celular al lado. Señala con una flecha dónde crees que está guardada la IA en cada uno."}, 
  a2:{t:"Caza del Tesoro", d:"Nombra 3 aparatos en tu casa que creas que son 'inteligentes' (que toman decisiones o se conectan a internet, como una Smart TV o un reloj)."}, 
  v:"hardware y software para niños"},
 {t:"Semana 4: IA en los Videojuegos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar cómo se usa la IA para controlar a los personajes que no maneja el jugador.</p><p><strong>📖 Explicación detallada:</strong><br>¿Te has preguntado quién controla a los monstruos, a los carros de carrera enemigos o a las personas que caminan por la ciudad en tus videojuegos favoritos? Tú tienes el control de tu personaje, pero la consola controla a los demás usando Inteligencia Artificial.<br><br>A estos personajes se les llama NPCs (Personajes No Jugables). Los programadores les escriben algoritmos para que sepan cómo reaccionar. Por ejemplo, la IA del juego tiene una regla: 'Si el jugador se acerca a menos de 5 metros, el monstruo debe empezar a correr hacia él'. Sin la IA, todos los personajes del juego se quedarían parados como estatuas.</p>", 
  a1:{t:"Análisis de Juegos", d:"Piensa en tu videojuego favorito. Escribe o dibuja qué hacen los personajes enemigos cuando te ven. ¡Esa es su IA trabajando!"}, 
  a2:{t:"El Juego del NPC", d:"Conviértete en un NPC. El profesor dirá: 'Si levanto la mano derecha, saltan; si levanto la izquierda, se agachan'. Sigue tu algoritmo."}, 
  v:"ia en videojuegos explicacion"},
 {t:"Semana 5: El Sistema de Recomendación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender cómo las plataformas digitales adivinan lo que nos gusta ver o escuchar.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando abres Netflix, YouTube o un juego, la pantalla siempre te sugiere videos que casualmente te gustan mucho. No es coincidencia ni magia, es una IA llamada 'Sistema de Recomendación'.<br><br>Esta IA es como un detective que anota todo lo que haces en una libreta secreta. Si nota que viste tres videos seguidos de dinosaurios, el algoritmo hace un cálculo matemático y decide: 'A este usuario le gustan los dinosaurios, voy a ponerle 10 videos más de dinosaurios en su pantalla principal para que siga viendo'. Así es como las aplicaciones logran que pases horas usándolas.</p>", 
  a1:{t:"El Detective de Gustos", d:"Imagina que eres YouTube. Un niño acaba de buscar 'Carros de carrera'. Escribe 3 videos que le recomendarías ver después."}, 
  a2:{t:"Mi Perfil Invisible", d:"Haz una lista de las últimas 3 cosas que buscaste en internet. ¿Qué crees que piensa la IA que son tus temas favoritos?"}, 
  v:"como funciona el algoritmo de youtube niños"},
 {t:"Semana 6: Dibujo Inteligente", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Experimentar cómo la computadora usa redes neuronales para adivinar trazos humanos.</p><p><strong>📖 Explicación detallada:</strong><br>Existen inteligencias artificiales entrenadas específicamente para entender imágenes y dibujos. Han estudiado millones de garabatos hechos por personas de todo el mundo para encontrar patrones.<br><br>Cuando tú dibujas un círculo con cuatro palitos abajo, la IA analiza la forma casi al instante, la compara con su base de datos gigante y adivina: '¡Es un perro!'. A este sistema se le llama 'Reconocimiento de imágenes'. Funciona analizando los píxeles negros sobre el fondo blanco, al igual que nuestro cerebro reconoce las formas geométricas desde que somos bebés.</p>", 
  a1:{t:"Adivinanza Rápida", d:"Dibuja algo en la pizarra o en tu cuaderno en menos de 10 segundos. Tus compañeros deben adivinar qué es antes de que se acabe el tiempo."}, 
  a2:{t:"QuickDraw (Práctica)", d:"(Si hay internet) Entra a la página 'Quick Draw con Google' y juega contra la IA para ver si logra adivinar tus dibujos en menos de 20 segundos."}, 
  v:"google quick draw ia"},
 {t:"Semana 7: Reglas y Seguridad", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Establecer normas básicas de seguridad al interactuar con sistemas automatizados.</p><p><strong>📖 Explicación detallada:</strong><br>La IA es muy inteligente, pero no tiene sentimientos ni sentido común como los humanos. Es solo una máquina. A veces, las máquinas cometen errores (a esto se le llama 'Alucinaciones de la IA') y pueden dar información equivocada o inventada, creyendo que es real.<br><br>Por esta razón, nunca debemos confiar ciegamente en todo lo que nos dice una máquina en internet. Si usamos un programa de IA para que nos ayude con una tarea o nos responda una pregunta, siempre debemos dudar, leerlo bien y pedirle a un adulto o profesor que revise si la información es verdadera. La regla de oro es: La IA es un ayudante, no el jefe.</p>", 
  a1:{t:"Verdadero o Falso", d:"El profesor dirá tres cosas que dijo una máquina. Debes usar tu sentido común humano para decir si crees que es Verdad o Mentira."}, 
  a2:{t:"El Ayudante", d:"Dibuja a un humano y a un robot trabajando juntos. Ponle al humano una medalla de 'Jefe' para recordar quién toma la decisión final."}, 
  v:"seguridad en internet niños ia"},
 {t:"Semana 8: Proyecto: Cazadores de IA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Reconocer la tecnología inteligente en el entorno cotidiano.</p><p><strong>📖 Explicación detallada:</strong><br>Para terminar nuestra unidad, demostraremos que la IA ya no es un secreto para nosotros. A lo largo de estas semanas hemos aprendido que la IA está en los juegos, en los videos, en los buscadores y en nuestros dispositivos.<br><br>Serás un cazador de tecnología. Deberás presentar un reporte explicando dónde has visto algoritmos y sistemas de reconocimiento trabajando en tu propia casa o en la escuela. Comprender que estamos rodeados de estas matemáticas invisibles es el primer paso para convertirnos en creadores de tecnología en el futuro, y no solo en consumidores.</p>", 
  a1:{t:"El Mapa de la IA", d:"Dibuja un mapa de tu casa. Dibuja estrellitas en los cuartos donde haya un aparato o aplicación que use IA (Tele, Celular, Bocina inteligente, etc.)."}, 
  a2:{t:"Exposición Final", d:"Muestra tu mapa a la clase y explica cuál es la función inteligente que hace el aparato que marcaste en tu habitación."}, 
  v:"el futuro de la inteligencia artificial niños"}
];
