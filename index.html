// === GRADO 5 - BIMESTRE 2: Sheets ===
const g5_b2 = [
 {t:"Semana 1: Fórmulas y Símbolos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Programar celdas en Sheets para ejecutar cálculos matemáticos básicos de forma autónoma.</p><p><strong>📖 Explicación detallada:</strong><br>El verdadero poder de Google Sheets no es almacenar texto, sino su capacidad de procesamiento matemático. Para que Sheets deje de tratar a un número como simple texto y lo reconozca como un cálculo matemático que debe resolver, es obligatorio iniciar la escritura en la celda con el signo Igual (=).<br><br>Este símbolo le indica al motor del programa: 'Atención, lo que sigue es una fórmula, resuélvelo'. En informática, los símbolos matemáticos cambian respecto al papel: usamos el signo Más (+) para sumar, el Guion (-) para restar, el Asterisco (*) en lugar de la 'X' para multiplicar, y la Barra diagonal (/) para dividir. Si escribes =10*5 y presionas Enter, la celda ocultará la fórmula y mostrará directamente el resultado final (50).</p>", 
  a1:{t:"Sintaxis Matemática", d:"En celdas separadas, programa las siguientes fórmulas presionando Enter al final de cada una: =20+15, =30-10, =5*8 y =100/4. Observa cómo el sistema calcula los resultados instantáneamente."}, 
  a2:{t:"Referencias de Celda", d:"Escribe el número 8 en la celda A1 y el 2 en la celda B1. En la celda C1, programa la fórmula mediante referencias: =A1*B1. El resultado debe ser 16."}, 
  v:"formulas basicas google sheets"},
 {t:"Semana 2: La Función SUMA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar funciones preprogramadas para ejecutar operaciones complejas en grandes rangos de datos.</p><p><strong>📖 Explicación detallada:</strong><br>Sumar dos números con la fórmula '=A1+A2' es fácil. Pero en el mundo real, podrías necesitar sumar el precio de 100 productos diferentes. Escribir =A1+A2+A3...+A100 sería un proceso propenso a errores y extremadamente lento. <br><br>Para automatizar esto, Sheets incluye 'Funciones', que son comandos preprogramados que hacen el trabajo pesado por ti. La función más utilizada es =SUMA(). Su estructura exige abrir paréntesis, seleccionar el 'Rango' (por ejemplo, desde A1 hasta A10), y cerrar el paréntesis. Así, la fórmula se vería como =SUMA(A1:A10). Los dos puntos (:) significan 'hasta'. El programa sumará todos los valores contenidos en ese bloque de celdas en milisegundos, y si algún valor cambia después, el total se actualizará solo.</p>", 
  a1:{t:"Rango de Valores", d:"Crea una columna escribiendo 5 precios o cantidades diferentes en las celdas desde la A1 hasta la A5."}, 
  a2:{t:"Suma Automatizada", d:"En la celda A6, ingresa la función =SUMA(A1:A5) y presiona Enter. Luego, modifica el número de la celda A1 y observa cómo el sistema recalcula el total inferior de forma automática y silenciosa."}, 
  v:"sumar en google sheets celular"},
 {t:"Semana 3: Moneda y Decimales", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar formatos de datos numéricos para representar transacciones financieras con precisión.</p><p><strong>📖 Explicación detallada:</strong><br>En informática, un dato puede tener diferentes tipos de formatos. Un simple '5' en una celda es un número genérico; podría representar 5 perros, 5 horas o 5 kilómetros. Sin embargo, si estamos haciendo un presupuesto escolar o la contabilidad de una tienda, necesitamos que esos números representen dinero real.<br><br>Utilizando la herramienta de 'Formato de número' (a menudo representada por un ícono de billete o el símbolo $), podemos indicarle a Sheets que esa columna representa valores monetarios. Inmediatamente, la aplicación agregará el símbolo de tu moneda local (Quetzales, Dólares, etc.) y añadirá la precisión de los centavos (.00). Además, contarás con herramientas para aumentar o disminuir los decimales visibles según el nivel de exactitud que requiera tu documento financiero.</p>", 
  a1:{t:"Conversión Monetaria", d:"Selecciona las 5 celdas con números de la actividad anterior. Busca la opción de Formato y cámbialas al formato de 'Moneda'. Observa la adición de los símbolos y centavos."}, 
  a2:{t:"Control de Decimales", d:"Utiliza los botones de 'Disminuir decimales' (las flechas junto a los ceros en la barra superior) para remover los centavos visualmente, dejando el número como un entero exacto."}, 
  v:"formato moneda google sheets"},
 {t:"Semana 4: Ordenar Datos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Implementar comandos de organización (Sorting) para estructurar grandes bases de datos.</p><p><strong>📖 Explicación detallada:</strong><br>Imagina que eres un profesor con una hoja de cálculo que contiene los nombres y calificaciones de 200 estudiantes que se inscribieron en diferentes días. Encontrar a un estudiante específico en una lista desordenada tomaría mucho tiempo. El comando 'Ordenar' es una herramienta de gestión de datos esencial para resolver este problema.<br><br>Seleccionando la columna que contiene los nombres, puedes utilizar la función 'Ordenar de A a Z' para aplicar un algoritmo alfabético ascendente. El programa reorganizará instantáneamente todas las filas, manteniendo la información de cada estudiante en su lugar correcto, pero estructurando la lista desde la 'A' hasta la 'Z'. De igual forma, este comando se puede utilizar para ordenar números de forma descendente (de mayor a menor), ideal para ver rápidamente quién obtuvo la nota más alta.</p>", 
  a1:{t:"Lista Desordenada", d:"Escribe en una columna 6 nombres de frutas o animales de forma completamente aleatoria, sin seguir ningún patrón alfabético."}, 
  a2:{t:"Aplicar Algoritmo", d:"Selecciona toda la columna. Abre el menú contextual de la celda (los tres puntos o menú superior) y ejecuta la opción 'Ordenar de A a Z'. Verifica el nuevo orden alfabético."}, 
  v:"ordenar datos google sheets celular"},
 {t:"Semana 5: Gráficos de Barras", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Traducir datos numéricos brutos en representaciones visuales claras mediante la generación de gráficos.</p><p><strong>📖 Explicación detallada:</strong><br>El cerebro humano procesa imágenes mucho más rápido y eficientemente que grandes bloques de texto o tablas llenas de números. Por esta razón, el análisis de datos siempre se apoya en la 'Visualización de datos'.<br><br>Un Gráfico de Barras o de Columnas es una representación visual donde la longitud o altura de una barra rectangular es proporcional al valor numérico que representa. Este tipo de gráfico es excelente para realizar comparaciones directas; por ejemplo, comparar los resultados de ventas de diferentes meses o la cantidad de votos de distintos candidatos. Al seleccionar una tabla y elegir 'Insertar Gráfico', Sheets analizará los datos y dibujará las barras automáticamente, permitiendo que cualquier persona entienda las diferencias de valores a simple vista.</p>", 
  a1:{t:"Tabla de Origen", d:"Crea una pequeña tabla estadística. En la columna A escribe: 'Perros', 'Gatos', 'Peces'. En la columna B escribe sus cantidades respectivas: 15, 8, 4."}, 
  a2:{t:"Generación Visual", d:"Selecciona las 6 celdas de tu tabla, presiona el botón '+' y selecciona 'Gráfico'. Asegúrate de configurar el tipo de gráfico como 'Columnas' o 'Barras' y observa el resultado en pantalla."}, 
  v:"crear graficos google sheets celular"},
 {t:"Semana 6: Gráficos de Pastel", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar gráficos circulares para interpretar porcentajes y fracciones de un todo.</p><p><strong>📖 Explicación detallada:</strong><br>Mientras que los gráficos de barras son ideales para comparar cantidades individuales, los Gráficos Circulares (conocidos popularmente como Gráficos de Pastel) tienen una función estadística distinta: se utilizan para visualizar proporciones, porcentajes o fracciones de un total (el 100%).<br><br>En este tipo de representación, el círculo completo representa el universo total de los datos (por ejemplo, todos los alumnos de la clase). Cada categoría toma una 'rebanada' cuyo tamaño refleja matemáticamente su porcentaje. Al configurar el editor de gráficos de Sheets para mostrar un modelo 'Circular', la aplicación calcula internamente la proporción matemática de cada valor respecto a la suma total y asigna grados específicos a cada color, revelando de inmediato qué categoría domina sobre el resto.</p>", 
  a1:{t:"Encuesta Escolar", d:"Crea una tabla con 3 sabores de helado y la cantidad hipotética de estudiantes que prefieren cada sabor, asegurándote de que los números sean diferentes."}, 
  a2:{t:"Proporciones en Pastel", d:"Genera el gráfico seleccionando los datos. Luego, accede al menú 'Tipo de gráfico' y modifícalo específicamente a la opción 'Circular' para visualizar las rebanadas y los porcentajes."}, 
  v:"grafico circular google sheets"},
 {t:"Semana 7: Congelar Filas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Optimizar la experiencia de navegación en bases de datos extensas inmovilizando los encabezados.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando se trabaja con una hoja de cálculo pequeña, es fácil recordar qué información contiene cada columna. Sin embargo, en bases de datos profesionales que superan las 100 filas, al desplazarse hacia abajo (scroll), la fila número 1 (donde están los títulos) desaparece por la parte superior de la pantalla.<br><br>Esto genera un problema de navegación (UX), ya que el usuario olvida si la columna 'D' correspondía al código postal o al número de teléfono. La solución técnica es 'Congelar' o 'Inmovilizar' filas. Al aplicar esta configuración a la primera fila, el programa fija esos encabezados en la parte superior del cristal de la pantalla. De esta forma, puedes bajar hasta la fila 1000 y el encabezado siempre te seguirá, sirviendo como guía de referencia constante para no cometer errores en la introducción de datos.</p>", 
  a1:{t:"Base de Datos Larga", d:"Escribe tres encabezados distintos en la fila 1 (Ej: Nombre, Fecha, Asistencia). Luego, desliza tu pantalla hacia abajo hasta llegar aproximadamente a la fila 50."}, 
  a2:{t:"Inmovilización", d:"Vuelve a subir. Toca el número '1' situado en el extremo izquierdo para seleccionar toda la fila superior. Abre el menú de la celda y activa la opción 'Inmovilizar fila'. Desliza hacia abajo de nuevo y comprueba que el título permanece visible."}, 
  v:"inmovilizar filas google sheets celular"},
 {t:"Semana 8: Presupuesto (Proyecto)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Construir una herramienta financiera automatizada aplicando fórmulas, formatos y operaciones matemáticas reales.</p><p><strong>📖 Explicación detallada:</strong><br>El manejo de hojas de cálculo es una competencia altamente valorada en cualquier entorno laboral. Un presupuesto es la aplicación práctica de casi todas las funciones aprendidas. Requiere organizar los gastos planificados frente a los ingresos reales, proyectar costos totales y asegurar que las operaciones matemáticas no contengan fallos.<br><br>En este proyecto, combinarás tus habilidades para crear una 'Cotización de Evento'. Deberás integrar la estructuración de columnas, aplicar el formato de moneda a los valores comerciales, configurar bordes para delinear el documento y emplear la función SUMA() en la base para automatizar el gran total. El diseño deberá estar listo para que, si un producto cambia de precio en la vida real, solo tengas que modificar una celda y el documento entero recalcule la viabilidad financiera del proyecto.</p>", 
  a1:{t:"Cotización Estructurada", d:"Diseña una tabla formal con 4 artículos necesarios para organizar un evento escolar (ej. Decoración, Alimentos). Asigna un precio a cada uno y asegúrate de aplicar el formato Moneda a los valores."}, 
  a2:{t:"Automatización Financiera", d:"En la parte inferior de la columna de precios, crea una fila de 'Total'. Utiliza la función =SUMA() abarcando todos los precios superiores para generar la sumatoria exacta del dinero necesario."}, 
  v:"presupuesto en google sheets basico"}
];
  
  // === GRADO 5 - BIMESTRE 3: Web ===
const g5_b3 = [
 {t:"Semana 1: Navegadores y Buscadores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar entre la aplicación que nos da acceso a internet y el motor que encuentra la información.</p><p><strong>📖 Explicación detallada:</strong><br>Mucha gente confunde un 'Navegador' con un 'Buscador', pero son herramientas tecnológicas distintas. El Navegador (Browser) es el programa o aplicación instalada en tu dispositivo que sirve como ventana hacia el internet; ejemplos de esto son Google Chrome, Safari, Firefox o Edge.<br><br>Por otro lado, el Buscador (Search Engine) es una página web súper potente que vive <i>dentro</i> del navegador (como Google.com, Bing o Yahoo). Su trabajo es usar robots (algoritmos) para rastrear miles de millones de páginas web y devolverte una lista ordenada de resultados cuando tú escribes una palabra clave. Entender esto es fundamental para solucionar problemas de conexión o configuración en tu dispositivo.</p>", 
  a1:{t:"Identificación de Software", d:"Revisa tu dispositivo (celular o tablet). Encuentra el ícono de tu Navegador de internet y anota su nombre (¿Es Chrome? ¿Es Safari?). Abre la aplicación."}, 
  a2:{t:"El Motor de Búsqueda", d:"Una vez dentro del navegador, fíjate en la barra de búsqueda central. Averigua qué motor de búsqueda está usando tu dispositivo por defecto (usualmente es Google)."}, 
  v:"diferencia entre navegador y buscador"},
 {t:"Semana 2: Direcciones URL y Enlaces", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender cómo funcionan las direcciones web para navegar directamente sin usar el buscador.</p><p><strong>📖 Explicación detallada:</strong><br>Cada página que existe en internet tiene una dirección única y exacta, como si fuera la dirección de una casa. A esto se le llama URL (Uniform Resource Locator). Las URLs se escriben en la barra superior del navegador (la barra de direcciones) y siempre empiezan con 'https://' y terminan en dominios como '.com', '.org' o '.edu'.<br><br>Un Enlace (o Link) es simplemente un texto o imagen que tiene una URL escondida adentro. Cuando las letras están azules o subrayadas, significa que si haces clic o las tocas, el navegador leerá esa dirección oculta y te 'teletransportará' instantáneamente a esa página sin que tengas que escribir la dirección completa.</p>", 
  a1:{t:"La Barra de Direcciones", d:"Abre tu navegador y toca la barra que está hasta arriba (no la caja de búsqueda del medio). Escribe exactamente 'es.wikipedia.org' y presiona Ir o Enter."}, 
  a2:{t:"Salto Hipertextual", d:"Una vez en Wikipedia, busca cualquier palabra que esté en color azul y tócala. Observa cómo cambia la URL en la barra superior cada vez que saltas de página."}, 
  v:"que es una url explicacion"},
 {t:"Semana 3: Búsqueda Experta en Google", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar operadores lógicos para filtrar la basura de internet y encontrar resultados precisos.</p><p><strong>📖 Explicación detallada:</strong><br>Si escribes 'Historia de Guatemala' en el buscador, obtendrás millones de resultados y muchos no te servirán. Los profesionales usan comandos especiales (Operadores de Búsqueda) para hablarle directamente al algoritmo.<br><br>Por ejemplo, si pones tu búsqueda entre comillas dobles (ejemplo: \"Historia de Guatemala\"), el buscador ignorará las páginas generales y solo te mostrará páginas que contengan esa frase exacta, sin separar las palabras. Si agregas el comando 'filetype:pdf' al final de tu búsqueda, el robot de Google filtrará todos los blogs comerciales y te entregará únicamente documentos PDF formales y estructurados, ideales para la investigación escolar.</p>", 
  a1:{t:"Búsqueda Exacta", d:"Busca en Google: Poemas de la naturaleza. Revisa cuántos millones de resultados salen. Luego, busca exactamente lo mismo, pero encerrado en comillas: \"Poemas de la naturaleza\". Nota la diferencia."}, 
  a2:{t:"Filtro de Documentos", d:"En la barra de búsqueda escribe: filetype:pdf Sistema Solar. Abre el primer enlace y comprueba que se trata de un documento digital real y no de una página web normal."}, 
  v:"trucos de busqueda en google para estudiantes"},
 {t:"Semana 4: Detectives de la Información", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Evaluar críticamente la credibilidad de las páginas web (Evitar Fake News y copias).</p><p><strong>📖 Explicación detallada:</strong><br>En internet, cualquiera puede publicar lo que sea, sin importar si es verdad o mentira. Confiar en el primer resultado que aparece es un error. Para investigar profesionalmente, debes revisar la fuente de la información.<br><br>Fíjate en el dominio (la terminación de la URL): las páginas que terminan en '.edu' (Educación) o '.gov' (Gobierno) son fuentes oficiales y confiables. Las páginas comerciales '.com' pueden tener intereses de ventas. Además, siempre debes buscar si el artículo tiene un 'Autor' real, si tiene una 'Fecha' de publicación (una noticia de hace 10 años ya no sirve hoy) y si el sitio tiene un diseño profesional y no está lleno de anuncios engañosos o botones de descarga falsos.</p>", 
  a1:{t:"Análisis de Dominio", d:"Realiza una búsqueda sobre 'El ciclo del agua'. Busca entre los resultados hasta encontrar una página que termine en '.edu' o '.org' y entra a leerla."}, 
  a2:{t:"Caza del Autor", d:"Dentro del artículo que abriste, busca si aparece el nombre de quién lo escribió y en qué año se publicó esa información."}, 
  v:"como saber si una fuente de internet es confiable"},
 {t:"Semana 5: Historial y Marcadores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Gestionar la memoria del navegador para guardar recursos valiosos y recuperar páginas cerradas accidentalmente.</p><p><strong>📖 Explicación detallada:</strong><br>Si encontraste una página perfecta para tu tarea y por accidente la cerraste, no necesitas volver a buscarla en Google tratando de recordar cómo se llamaba. El navegador tiene una memoria llamada 'Historial', a la cual puedes acceder desde el menú de opciones (tres puntos), donde se guarda el registro de cada clic y página visitada con su hora exacta.<br><br>Si sabes que necesitarás esa página todos los días, la herramienta ideal son los 'Marcadores' o Favoritos (Bookmarks). Al tocar el ícono de la estrella (⭐) en la barra de direcciones, esa URL se guardará permanentemente en una lista de acceso rápido dentro de tu navegador, creando así tu propia biblioteca digital personalizada.</p>", 
  a1:{t:"El Rescate", d:"Entra a una página web de noticias y luego ciérrala por completo. Ve al menú de tu navegador, abre el 'Historial' y vuelve a entrar a la noticia tocando el enlace desde allí."}, 
  a2:{t:"Mi Biblioteca", d:"Busca una página de juegos educativos o herramientas. Toca el ícono de la estrella (o la opción 'Añadir a marcadores') para guardarla. Luego, intenta acceder a ella desde el menú de Marcadores."}, 
  v:"como usar marcadores e historial"},
 {t:"Semana 6: Descargas y Derechos de Autor", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Guardar archivos locales respetando la propiedad intelectual y evitando problemas legales.</p><p><strong>📖 Explicación detallada:</strong><br>El hecho de que una foto esté en Google Imágenes no significa que sea pública, gratuita o tuya. La mayoría de las imágenes tienen 'Derechos de Autor' (Copyright), lo que significa que le pertenecen a un fotógrafo o diseñador. Usarlas para proyectos comerciales puede ser ilegal.<br><br>Para descargar una imagen, mantenemos presionado sobre ella y elegimos 'Descargar imagen'. Esta se guardará en la carpeta local de 'Downloads' de nuestro dispositivo. Sin embargo, para hacer las cosas éticamente, enseñaremos a usar las herramientas de Google Imágenes para filtrar la búsqueda y pedirle que solo nos muestre imágenes con 'Licencias Creative Commons', que son aquellas que los autores regalaron para que los estudiantes las puedan usar libremente.</p>", 
  a1:{t:"Descarga de Imagen", d:"Busca una imagen de un paisaje, mantén el dedo presionado sobre la foto y selecciona 'Descargar imagen' o 'Guardar imagen'. Ve a la galería de tu celular para confirmar que está ahí."}, 
  a2:{t:"Búsqueda Legal", d:"En Google Imágenes, busca 'Computadoras'. Ve al botón de 'Herramientas', luego 'Derechos de uso' y selecciona 'Licencias Creative Commons'. Esas fotos son libres para usar."}, 
  v:"derechos de autor internet explicacion"},
 {t:"Semana 7: Navegación Segura (Ciberseguridad)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar protocolos de seguridad para proteger nuestra información y evitar fraudes informáticos.</p><p><strong>📖 Explicación detallada:</strong><br>El internet es una ciudad gigante, y no todas las calles son seguras. Cuando ingresamos una contraseña o nuestros datos personales en una página, esa información viaja por cables hasta los servidores. Si la página no es segura, los piratas informáticos (Hackers) pueden interceptar esa información.<br><br>El escudo protector del internet es el protocolo 'HTTPS'. ¿Cómo sabemos si funciona? Siempre debemos revisar la barra de direcciones superior: si vemos un ícono de un candado cerrado (🔒) justo al lado de la URL, significa que la conexión está encriptada (codificada y segura). Si el navegador lanza una alerta roja diciendo 'Sitio no seguro', jamás debes introducir tu correo ni contraseñas allí, pues tu información correría un gran riesgo.</p>", 
  a1:{t:"Auditoría de Candados", d:"Abre tu navegador, entra a YouTube, a la página de tu colegio o a Wikipedia. Toca la barra de direcciones arriba y fíjate si aparece el ícono del candado cerrado."}, 
  a2:{t:"Advertencias", d:"Toca el ícono del candado cerrado en el navegador para abrir el panel de seguridad y lee el texto que dice 'La conexión es segura'."}, 
  v:"que es el candado verde en internet"},
 {t:"Semana 8: Investigación Web Profesional", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar las técnicas de búsqueda web avanzada en un entorno académico.</p><p><strong>📖 Explicación detallada:</strong><br>Esta semana aplicaremos todo el conocimiento de arquitectura web en un simulacro real. Recopilar información en internet para una tarea no es buscar en Google y copiar y pegar lo primero que aparezca (eso es plagio).<br><br>Una verdadera investigación requiere el uso de operadores de búsqueda con comillas, filtrar por documentos PDF o sitios de educación (.edu), descargar imágenes respetando los derechos de autor (Creative Commons) y guardar todas esas referencias usando la herramienta de marcadores del navegador. El dominio de estas técnicas separa a los navegantes casuales de los verdaderos investigadores de la era de la información.</p>", 
  a1:{t:"Búsqueda Oficial", d:"Investiga sobre las 'Culturas Precolombinas' usando Google, pero debes filtrar la búsqueda agregando al final: site:.edu para que solo te salgan páginas de universidades."}, 
  a2:{t:"Archivo de Fuentes", d:"Encuentra una página confiable, guárdala en tus marcadores y descarga una imagen con derechos libres relacionada al tema para tenerla lista en tu galería."}, 
  v:"como investigar en internet para estudiantes"}
];
  
  // === GRADO 5 - BIMESTRE 4: IA Gen ===
const g5_b4 = [
 {t:"Semana 1: ¿Qué es la IA Generativa?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar entre la IA que analiza datos y la nueva IA que crea contenido original (LLMs).</p><p><strong>📖 Explicación detallada:</strong><br>Hasta hace poco, la IA solo servía para organizar información: buscar fotos, traducir textos o ganarte en el ajedrez. Pero ha surgido una tecnología revolucionaria: La Inteligencia Artificial Generativa. Esta IA no busca cosas que ya existen, sino que <i>crea cosas completamente nuevas</i> que jamás habían existido.<br><br>Modelos como ChatGPT, Gemini o Claude se llaman 'Grandes Modelos de Lenguaje' (LLM). Han leído casi todo el internet (miles de millones de libros y páginas web). Entienden la estructura del lenguaje humano tan bien que pueden conversar contigo, escribirte un poema, inventar un cuento o redactar un código de programación, simplemente prediciendo qué palabra tiene más sentido escribir después de la otra basándose en su gigantesco entrenamiento matemático.</p>", 
  a1:{t:"Buscador vs Creador", d:"Explica en tu cuaderno: Si buscas 'Cuento de un dragón' en Google, te da enlaces a cuentos que alguien más escribió. Si se lo pides a un LLM, ¿qué hace diferente?"}, 
  a2:{t:"Análisis de Inteligencia", d:"Anota tres cosas que creas que una IA Generativa NO puede hacer porque no es humana (ej. no puede tener sentimientos, no puede probar un pastel)."}, 
  v:"que es la ia generativa explicacion facil"},
 {t:"Semana 2: El Arte del Prompt", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Formular instrucciones precisas y contextuales para obtener los mejores resultados de un Chatbot.</p><p><strong>📖 Explicación detallada:</strong><br>La IA Generativa es como un genio de la lámpara muy literal. Si le das una instrucción mala o corta, te dará una respuesta mala o genérica. A la instrucción que le escribimos a la IA se le llama 'Prompt'.<br><br>La nueva profesión del futuro se llama 'Ingeniería de Prompts'. Un buen Prompt tiene 3 partes clave: 1) El Rol (Ej: 'Actúa como un profesor de historia'). 2) La Tarea (Ej: 'Explícame la revolución industrial'). 3) Las Restricciones o Formato (Ej: 'Usa palabras sencillas para un niño de 10 años y hazlo en una tabla'). Si dominas esta fórmula, la IA te dará exactamente lo que necesitas en el primer intento.</p>", 
  a1:{t:"Prompt Básico vs Avanzado", d:"En un papel, escribe una instrucción simple (ej: 'Habla de los planetas'). Luego, conviértela en un Prompt Avanzado dándole un rol, una tarea y un límite de palabras."}, 
  a2:{t:"El Genio Literal", d:"Piensa en un deseo mal formulado. (Ej: 'Quiero volar'). ¿Cómo podría el genio (o la IA) malinterpretar eso si no eres específico en tu Prompt?"}, 
  v:"como hacer buenos prompts chatgpt"},
 {t:"Semana 3: Lluvia de Ideas (Brainstorming)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar los Modelos de Lenguaje como compañeros de pensamiento para superar el bloqueo creativo.</p><p><strong>📖 Explicación detallada:</strong><br>Uno de los mayores errores éticos es pedirle a la IA que 'escriba tu tarea' y luego entregarla como si fuera tuya. Eso es plagio. El uso correcto y profesional de la IA es como 'Compañero de Lluvia de Ideas' (Brainstorming).<br><br>Cuando tienes que escribir una historia o hacer un proyecto y tienes la mente en blanco, puedes usar la IA para arrancar. Le escribes un prompt: 'Dame 5 ideas diferentes para un cuento sobre un astronauta que pierde a su perro en Marte'. La IA te dará 5 escenarios creativos. Tú lees las opciones, te inspiras, eliges una y luego <i>tú mismo escribes la historia con tus propias palabras</i>. Así, la IA potenció tu creatividad sin hacer el trabajo por ti.</p>", 
  a1:{t:"El Bloqueo Creativo", d:"Inventa un Prompt pidiéndole a una IA imaginaria 3 ideas de nombres para una empresa de venta de limonadas espaciales."}, 
  a2:{t:"Selección Humana", d:"De las ideas que pediste, reflexiona por qué la creatividad final siempre depende del humano que elige cuál idea es buena y cuál es aburrida."}, 
  v:"usar chatgpt para lluvia de ideas"},
 {t:"Semana 4: Generación de Imágenes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la lógica detrás de los modelos de Difusión que convierten texto en imágenes digitales.</p><p><strong>📖 Explicación detallada:</strong><br>Al igual que la IA aprendió a escribir, también aprendió a pintar. Modelos como DALL-E, Midjourney o Leonardo AI utilizan una tecnología llamada 'Difusión'. La IA fue entrenada viendo miles de millones de fotos que tenían etiquetas de texto (ej. Foto de un 'gato' en una 'silla').<br><br>Cuando tú le das un Prompt (ej: 'Un gato astronauta comiendo pizza en la luna, estilo acuarela'), la IA comienza con una imagen llena de ruido estático (como la televisión sin señal) y, matemáticamente, va limpiando ese ruido hasta formar una imagen nueva que cumpla con todas las palabras que le pediste. Jamás dibuja la misma imagen dos veces, cada generación es matemáticamente única e irrepetible.</p>", 
  a1:{t:"El Prompt de Arte", d:"Escribe en tu cuaderno una instrucción súper detallada para una IA creadora de imágenes. Debes incluir el Sujeto, el Lugar y el Estilo de Arte (ej: estilo 3D, lápiz, acuarela)."}, 
  a2:{t:"El Analista Visual", d:"Busca en internet una imagen generada por IA. Fíjate en los detalles pequeños (como las manos o letras del fondo) para detectar los errores que aún cometen las máquinas."}, 
  v:"como funciona la inteligencia artificial de imagenes"},
 {t:"Semana 5: Generación de Sonido y Música", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Explorar cómo los algoritmos pueden componer melodías y sintetizar voces clonadas.</p><p><strong>📖 Explicación detallada:</strong><br>La IA Generativa también abarca el audio. Hoy en día, existen programas a los que les puedes escribir un prompt como 'Una canción alegre de rock sobre mi perro Bobby', y la IA creará la melodía, los instrumentos, escribirá la letra y pondrá una voz robótica cantándola en cuestión de minutos.<br><br>Otra rama es la clonación de voz. La IA solo necesita escuchar 30 segundos de la voz de una persona hablando para hacer un mapa matemático de su tono y acento. Una vez clonada, puedes escribir cualquier texto y la máquina lo leerá sonando exactamente como esa persona. Esta tecnología es increíble para los creadores de contenido, pero también conlleva grandes riesgos éticos si se usa para engañar a alguien.</p>", 
  a1:{t:"Letrista Asistido", d:"Escribe un pequeño coro de 4 líneas para una canción sobre tu escuela. Imagina qué ritmo o género musical (Pop, Rap, Rock) le pedirías a la IA que usara para cantarla."}, 
  a2:{t:"Debate de Clonación", d:"Anota en tu cuaderno: ¿Por qué crees que clonar la voz de un famoso sin su permiso podría ser peligroso o ilegal?"}, 
  v:"musica generada por inteligencia artificial"},
 {t:"Semana 6: Alucinaciones de la IA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Desarrollar pensamiento crítico frente a las respuestas de la IA, reconociendo cuando inventa datos.</p><p><strong>📖 Explicación detallada:</strong><br>Este es el concepto de seguridad más importante: La IA no 'piensa', solo predice. Como su objetivo es darte una respuesta que suene bien y humana, a veces, si no tiene la información correcta en su base de datos, <i>se inventa la respuesta</i> y te la dice con total seguridad. A esto se le llama 'Alucinación de la IA'.<br><br>Si le pides la biografía de un inventor famoso de tu ciudad, y la IA no encuentra datos, puede que le invente un nombre, una esposa y fechas de nacimiento falsas, todo escrito con palabras muy formales. Por eso, si usas la IA Generativa para investigar datos históricos, científicos o matemáticos, es obligatorio comprobar esa información en Google o en libros reales. La IA miente sin darse cuenta.</p>", 
  a1:{t:"El Detector de Mentiras", d:"¿Por qué una IA podría decirte que el 'Elefante volador' es un animal real si le escribes el prompt adecuado? Explica qué es una Alucinación."}, 
  a2:{t:"Verificación Humana", d:"Escribe la regla de oro: 'Confía, pero verifica'. Explica por qué siempre debemos revisar las respuestas de un Chatbot en una enciclopedia oficial."}, 
  v:"alucinaciones de chatgpt explicadas"},
 {t:"Semana 7: Deepfakes y Fake News", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar el contenido audiovisual manipulado para proteger nuestra seguridad en el entorno digital.</p><p><strong>📖 Explicación detallada:</strong><br>Si juntamos la generación de imágenes hiperrealistas y la clonación de voz, obtenemos un 'Deepfake' (Falsificación profunda). Esto es un video donde usan IA para poner el rostro y la voz de una persona en el cuerpo de otra, haciéndole decir cosas que nunca dijo.<br><br>Los creadores de 'Fake News' (Noticias falsas) usan esto para engañar a la población en internet o para estafar. Nuestro trabajo como ciudadanos digitales es ser escépticos. Para detectar un Deepfake debemos mirar fijamente el video: ¿El parpadeo de los ojos es raro? ¿Los bordes del cabello se ven borrosos? ¿El movimiento de los labios no cuadra perfectamente con el sonido? El pensamiento crítico es nuestra única defensa técnica.</p>", 
  a1:{t:"Cazador de Falsos", d:"Anota 3 señales visuales que te ayudarían a descubrir si un video de un famoso haciendo algo raro es un Deepfake creado por IA."}, 
  a2:{t:"Impacto Social", d:"Escribe un pequeño párrafo sobre por qué crear imágenes falsas de otras personas para molestar o hacer bromas es un acto de ciberacoso inaceptable."}, 
  v:"que es un deepfake y como detectarlo"},
 {t:"Semana 8: Proyecto: Creadores Éticos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar el ciclo de uso ético de la IA Generativa en un proyecto de creación literaria y gráfica.</p><p><strong>📖 Explicación detallada:</strong><br>Para graduarte de esta unidad, deberás demostrar que sabes usar la IA como un amplificador de tu propio talento, no como un atajo para evitar el esfuerzo. <br><br>El proyecto final consiste en escribir un cuento original. Solo podrás usar la IA Generativa (Chatbots) para hacer lluvia de ideas (Pedirle opciones de nombres de personajes o giros de la trama). Toda la redacción final debe ser tuya. Luego, deberás escribir un 'Prompt de arte' altamente detallado para generar la imagen de portada de tu cuento, demostrando tu dominio de la 'Ingeniería de Prompts' y el respeto a la autoría humana.</p>", 
  a1:{t:"Creación de Prompts", d:"Redacta los dos prompts que usarías: 1) El prompt de texto para pedir ideas de personajes, y 2) El prompt de imagen para pedir el dibujo de la portada de tu cuento."}, 
  a2:{t:"Autoría y Transparencia", d:"Al final de tu proyecto, deberás agregar una 'Declaración de IA', explicando en qué partes de tu trabajo usaste inteligencia artificial y en cuáles no. La honestidad es clave."}, 
  v:"uso etico de la inteligencia artificial"}
];

const g6_b1 = [
 {t:"Semana 1: Multitarea", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Hacer dos cosas a la vez (de verdad) en el celular.</p><p><strong>📖 Explicación:</strong><br>Los celulares modernos pueden partir la pantalla en dos (Split Screen). Puedes ver un video arriba y tomar notas abajo. ¡Ya no tienes que pausar y cambiar de app a cada rato!</p><p><strong>🛠️ Manos a la obra:</strong><br>Abre una app > Vista recientes (cuadrado) > Toca el ícono de la app > Pantalla dividida > Elige la segunda app.</p>", 
  a1:{t:"Apuntes en Vivo", d:"Pon un video educativo arriba. Abre Notas abajo. Escribe 3 ideas principales sin detener el video."}, 
  a2:{t:"Comparador", d:"Abre Chrome arriba y la Calculadora abajo. Busca precios de computadoras en una web y calcula el promedio abajo."}, 
  v:"pantalla dividida android tutorial"},
 {t:"Semana 2: Firmar PDF", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Llenar formularios y firmar documentos sin imprimir nada.</p><p><strong>📖 Explicación:</strong><br>En la vida adulta te mandarán documentos para firmar. Imprimir, firmar, escanear y enviar es cosa del pasado. Puedes hacerlo directo en la pantalla con tu dedo usando el editor de Drive o Adobe.</p>", 
  a1:{t:"El Trámite", d:"El profesor enviará una 'Ficha de Inscripción' falsa. Llena tus datos con texto y crea tu firma con el dedo en la línea final."}, 
  a2:{t:"Guardado", d:"Guarda el documento como 'Copia Firmada' para no perder el original vacío. Envíalo."}, 
  v:"firmar pdf celular gratis"},
 {t:"Semana 3: Bienestar Digital", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Controlar el celular y no que el celular nos controle a nosotros.</p><p><strong>📖 Explicación:</strong><br>¿Sabes cuántas horas pasas en TikTok o Juegos? El celular lleva la cuenta secreta. Vamos a analizarlo para cuidar nuestra salud mental y vista. Un profesional sabe cuándo desconectarse.</p><p><strong>🛠️ Manos a la obra:</strong><br>Ve a Ajustes > Bienestar Digital o Tiempo de Pantalla. Mira el gráfico.</p>", 
  a1:{t:"La Auditoría", d:"Analiza tus datos. Anota en un papel cuánto tiempo pasaste ayer en el celular. ¿Fue mucho o poco?"}, 
  a2:{t:"El Límite", d:"Configura un bloqueo real (Temporizador) de 30 min para un juego. Cuando se acabe el tiempo, la app se cerrará sola."}, 
  v:"bienestar digital android explicacion"},
 {t:"Semana 4: OCR (Texto a Digital)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Copiar texto de un libro de papel y pegarlo en el celular mágicamente.</p><p><strong>📖 Explicación:</strong><br>Imagina tener que copiar a mano 2 páginas de un libro. ¡Qué cansado! <b>OCR</b> es la tecnología que 'lee' el papel y lo convierte en letras digitales que puedes editar. Usaremos Google Lens.</p><p><strong>🛠️ Manos a la obra:</strong><br>Abre Lens y apunta a una página de texto. Toca 'Texto' y luego 'Seleccionar todo'. Copia y pega en Docs.</p>", 
  a1:{t:"Digitalizador", d:"Copia un poema de un libro físico y pégalo en un Doc digital en segundos. Arregla los espacios si quedaron mal."}, 
  a2:{t:"Lector en Voz Alta", d:"Usa la opción 'Escuchar' de Lens para que el celular te lea la página del libro en voz alta."}, 
  v:"copiar texto imagen google lens"},
 {t:"Semana 5: Presentar desde Móvil", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar el celular para exponer en una TV o proyector.</p><p><strong>📖 Explicación:</strong><br>Ya no necesitas una computadora gigante para exponer. Puedes conectar tu celular a la TV o usarlo como control remoto de tus diapositivas.</p><p><strong>Modo Presentador:</strong><br>Tú ves tus notas secretas en el celular, pero el público solo ve las fotos en la pantalla grande.</p>", 
  a1:{t:"El Expositor", d:"Pasa al frente y expón un tema de 1 minuto usando solo tu celular para pasar las láminas."}, 
  a2:{t:"Notas del Orador", d:"Aprende a activar las 'Notas del orador' para leer tus apuntes en el celular mientras expones."}, 
  v:"presentar diapositivas google desde celular"},
 {t:"Semana 6: Edición Video Pro", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Crear videos atractivos eliminando las partes aburridas.</p><p><strong>📖 Explicación:</strong><br>Un buen video no es largo, es interesante. Usaremos una app profesional (CapCut o InShot) para usar <b>Cortes (Split)</b> y eliminar los silencios incómodos o errores.</p><p><strong>Audio:</strong> La música de fondo debe bajar de volumen cuando tú hablas y subir cuando te callas.</p>", 
  a1:{t:"Tutorial Express", d:"Crea un video de 30 segundos sobre 'Cómo hacer un avión de papel'. Debe tener música de fondo y cortes rápidos."}, 
  a2:{t:"Banda Sonora", d:"Practica mezclar el audio. Baja la música al 10% cuando hables para que se entienda tu voz."}, 
  v:"editar video capcut basico"},
 {t:"Semana 7: Netiqueta", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comportarnos como profesionales en chats y correos.</p><p><strong>📖 Explicación:</strong><br>Escribir 'kmo stas' está bien para amigos, pero mal para el trabajo. <b>Netiqueta</b> son las reglas de educación en internet. Aprenderemos a escribir correos formales con Saludo, Cuerpo y Despedida.</p>", 
  a1:{t:"Simulacro Formal", d:"Escribe un correo al director pidiendo permiso para faltar por una cita médica. Usa lenguaje muy educado."}, 
  a2:{t:"Corrector", d:"Corrige este mensaje mal escrito: 'Ola profe k tarea ay pa mañana'. Escríbelo como un profesional."}, 
  v:"netiqueta estudiantes ejemplos"},
 {t:"Semana 8: Oficina de Bolsillo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Resolver problemas reales bajo presión usando tecnología.</p><p><strong>📖 Explicación:</strong><br>Este es el examen final práctico. Simularás ser un profesional que debe resolver un trámite urgente usando solo su teléfono.</p><p><strong>🛠️ Manos a la obra (Misión):</strong><br>'Te acaban de enviar un contrato por correo. Debes descargarlo, firmarlo, adjuntar una foto de tu carnet (bien recortada) y devolverlo antes de 10 minutos'.</p>", 
  a1:{t:"Reto Final", d:"Realiza la misión en tiempo real. Se evaluará que el PDF esté firmado y que el correo tenga asunto y saludo."}, 
  a2:{t:"Revisión Cruzada", d:"Revisa el correo que envió tu compañero. ¿Llegó el adjunto? ¿Está firmado? ¿Escribió bien el correo?"}, 
  v:"productividad movil estudiantes"}
];

// === GRADO 6 - BIMESTRE 2: Colaboración ===
const g6_b2 = [
 {t:"Semana 1: Compartir Archivos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar los permisos de acceso y seguridad para permitir el trabajo en red mediante la nube.</p><p><strong>📖 Explicación detallada:</strong><br>Históricamente, trabajar en equipo significaba guardar un archivo en una memoria USB, dárselo físicamente al compañero, esperar a que lo modificara y que lo devolviera, arriesgándose a tener múltiples versiones confundidas del mismo archivo. La computación en la nube eliminó este problema.<br><br>Con Google Workspace, el archivo siempre está en los servidores de Google. Usando el botón 'Compartir' (identificado con el ícono de una persona y un '+'), le envías una invitación digital al correo electrónico de tu compañero para que acceda al mismo archivo. Lo crucial es la gestión de permisos de seguridad: Puedes conceder el rol de 'Editor' (si el compañero necesita modificar y borrar información), de 'Comentador' (si solo debe dar sugerencias sin alterar el texto base), o de 'Lector' (si únicamente necesitas que lea el documento sin que pueda intervenirlo bajo ninguna circunstancia).</p>", 
  a1:{t:"Otorgar Acceso de Editor", d:"Genera un Documento de Google nuevo y escribe un título. Accede a la función de 'Compartir', introduce la dirección de correo electrónico de un compañero de clase y otórgale permisos de 'Editor'."}, 
  a2:{t:"Seguridad en la Información", d:"Comparte el mismo documento con el correo electrónico del profesor, pero configúralo estrictamente con el nivel de permiso 'Lector'. Esto asegura que el profesor pueda evaluar el trabajo sin posibilidad de modificar el contenido."}, 
  v:"compartir google docs celular"},
 {t:"Semana 2: Edición Simultánea", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Ejecutar procesos de co-creación en tiempo real aplicando reglas básicas de respeto digital.</p><p><strong>📖 Explicación detallada:</strong><br>Una vez que varios usuarios tienen el rol de 'Editor' en un mismo archivo, ocurre uno de los procesos más impresionantes de la nube: la edición simultánea (o trabajo síncrono). El servidor de Google sincroniza los teclados de todos los participantes conectados en cuestión de milisegundos.<br><br>Podrás ver pequeños cursores parpadeantes de diferentes colores moviéndose por el documento, cada uno representando a un miembro del equipo tecleando en vivo desde sus propios dispositivos u hogares. Aunque la tecnología permite esto, el reto es puramente humano: exige coordinación extrema, planeación de qué párrafo escribirá cada persona y un alto nivel de 'netiqueta' (respeto en internet) para no intervenir accidentalmente la sección donde el compañero está trabajando ni borrar el esfuerzo del otro usuario.</p>", 
  a1:{t:"Co-creación Sincrónica", d:"Tú y tu compañero deben ingresar al archivo compartido al mismo tiempo. Establezcan un acuerdo: uno redactará información en la parte superior de la primera hoja y el otro elaborará un texto diferente en la mitad inferior."}, 
  a2:{t:"Monitoreo de Sesión", d:"Presta atención a la interfaz superior de la aplicación; localiza los íconos circulares que muestran los avatares de los usuarios conectados en tiempo real a tu sesión."}, 
  v:"trabajo colaborativo google docs"},
 {t:"Semana 3: Dejar Comentarios", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Proveer retroalimentación constructiva en documentos compartidos sin alterar la autoría del texto original.</p><p><strong>📖 Explicación detallada:</strong><br>En entornos académicos y profesionales colaborativos, modificar directamente el trabajo de otra persona sin previo aviso puede considerarse invasivo o generar conflictos en el equipo. La herramienta profesional para solucionar esto es el sistema de 'Comentarios'.<br><br>Al seleccionar un bloque de texto que requiere revisión y tocar el ícono de 'Añadir Comentario' (+), se crea una nota al margen asociada específicamente a esas palabras seleccionadas. Esto funciona como un post-it virtual. El autor original recibirá una notificación alertándolo sobre la observación, podrá leer tu justificación en la nota al margen y será él quien tome la decisión final de aplicar el cambio o debatir sobre el tema dentro del hilo de respuestas de ese mismo comentario. Una vez hecho el arreglo, el autor puede presionar 'Resolver' (Check) para archivar la conversación y limpiar el documento.</p>", 
  a1:{t:"Feedback Estructurado", d:"Revisa el texto que tu compañero redactó en la clase anterior. Selecciona una oración que pueda mejorarse, inserta un comentario formal y sugiere una corrección gramatical o de contenido."}, 
  a2:{t:"Resolución de Hilos", d:"Lee el comentario que tu compañero te ha dejado a ti. Realiza la mejora necesaria en el texto de tu documento y luego utiliza el botón de verificación (Check) para resolver y ocultar el hilo de comentarios."}, 
  v:"comentarios google docs tutorial"},
 {t:"Semana 4: Historial de Versiones", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Auditar modificaciones y aplicar técnicas de recuperación de datos mediante el control de versiones en la nube.</p><p><strong>📖 Explicación detallada:</strong><br>Uno de los mayores miedos del trabajo en equipo es que alguien cometa un error catastrófico, como borrar una página entera de investigación o sobrescribir datos críticos. Afortunadamente, Google Docs funciona como una 'máquina del tiempo' gracias a su Historial de Versiones.<br><br>El sistema toma 'capturas fotográficas' invisibles de todo el código del documento cada vez que detecta cambios sustanciales (a las 10:05 am, a las 11:20 am, etc.). Accediendo al menú de los tres puntos y buscando la opción de 'Historial', se despliega un panel que funciona como auditoría: muestra exactamente qué usuario borró o añadió qué información a qué hora. Más importante aún, permite hacer clic en el botón 'Restaurar esta versión', devolviendo el documento de forma inmediata a como lucía en ese momento del pasado, revirtiendo cualquier accidente o sabotaje digital.</p>", 
  a1:{t:"Simulacro de Accidente", d:"Accede a tu documento y elimina de forma intencional un párrafo completo y significativo de tu trabajo, simulando un error grave de edición."}, 
  a2:{t:"Restauración del Sistema", d:"Dirígete al menú de configuración del archivo, localiza la herramienta de 'Historial de versiones' y ejecuta la restauración a la versión previa para recuperar el párrafo eliminado de forma impecable."}, 
  v:"historial versiones google docs"},
 {t:"Semana 5: Google Keep Compartido", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Implementar metodologías ágiles de gestión de tareas y distribución de roles mediante notas compartidas.</p><p><strong>📖 Explicación detallada:</strong><br>Antes de comenzar a redactar o investigar, un equipo profesional necesita organizar su plan de acción y definir responsabilidades. Para esto, en lugar de utilizar procesadores de texto pesados, se emplean herramientas ágiles de gestión como Google Keep.<br><br>Keep permite crear 'Notas' digitales. Si configuras una nota como una lista de 'Casillas de verificación' (Checklists) y la compartes con tu equipo mediante sus correos, esta se convierte en un tablero de progreso en vivo. Pueden listar todas las fases del proyecto escolar y asignar una misión a cada integrante. La magia de la colaboración en la nube entra en acción cuando un integrante, desde su propio dispositivo, finaliza su tarea y marca la casilla. La tarea se tachará inmediatamente en las pantallas de todo el equipo, manteniendo a todos informados del progreso sin necesidad de mensajes o reuniones innecesarias.</p>", 
  a1:{t:"Tablero de Misiones", d:"Crea una nota nueva en Google Keep. Habilita la configuración de 'Casillas de verificación' y redacta 3 pasos obligatorios para completar un proyecto escolar hipotético."}, 
  a2:{t:"Sincronización de Tareas", d:"Comparte la nota con un compañero de equipo. Este compañero deberá ingresar desde su cuenta y marcar una de las casillas. Verifica cómo la actualización se refleja al instante en tu propia pantalla."}, 
  v:"google keep colaborativo"},
 {t:"Semana 6: Google Forms (Formularios)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diseñar instrumentos digitales estandarizados para la recopilación masiva de datos estructurados.</p><p><strong>📖 Explicación detallada:</strong><br>Si necesitas saber la opinión de 5 amigos, puedes preguntarles por chat. Pero si estás realizando una investigación escolar donde necesitas entrevistar a 100 personas, hacerlo manualmente es ineficiente y difícil de tabular. Google Forms (Formularios) es la herramienta idónea para la recolección de datos masiva.<br><br>Te permite construir una interfaz de encuesta profesional en minutos. Puedes programar distintos tipos de preguntas según el dato que necesites: 'Opción múltiple' (solo pueden elegir una respuesta), 'Casillas de verificación' (pueden elegir varias respuestas), o 'Párrafo' (para que escriban su opinión libremente). Al finalizar el diseño, el programa genera un único enlace (URL). Al distribuir este enlace a tu público objetivo, cualquier persona, desde cualquier dispositivo, podrá acceder al formulario, contestarlo y enviar la información directamente a tu servidor privado.</p>", 
  a1:{t:"Construcción de Encuesta", d:"Abre Google Forms desde tu navegador móvil. Diseña un formulario corto con una pregunta de 'Opción múltiple' orientada a conocer el sabor de jugo preferido de tus compañeros."}, 
  a2:{t:"Distribución de Instrumento", d:"Una vez diseñado, genera el enlace de envío (URL), cópialo en el portapapeles y compártelo con al menos dos compañeros a través de un medio digital para que procedan a responderlo."}, 
  v:"como crear formulario google celular"},
 {t:"Semana 7: Ver Respuestas (Forms)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Analizar las métricas automatizadas generadas por el sistema y migrar datos brutos para su estudio estadístico avanzado.</p><p><strong>📖 Explicación detallada:</strong><br>El proceso de tabulación (contar respuestas una por una en un papel) requiere horas de esfuerzo. La mayor ventaja competitiva de usar Google Forms es que el sistema procesa los datos en el instante en que los usuarios presionan 'Enviar', eliminando el trabajo de tabulación manual.<br><br>Al acceder a la pestaña de 'Respuestas' como administrador del formulario, la plataforma muestra inmediatamente gráficos de pastel interactivos y barras estadísticas resumiendo perfectamente las preferencias de tu audiencia. Sin embargo, para un análisis más profundo o corporativo, Forms cuenta con un botón verde con una cruz blanca en la esquina superior. Al presionarlo, el sistema vincula el formulario con Google Sheets, enviando cada respuesta individual a una fila separada en una Hoja de Cálculo, permitiéndote aplicar fórmulas, filtros y cruces de datos estadísticos avanzados.</p>", 
  a1:{t:"Análisis en Tiempo Real", d:"Accede al panel de administración de tu formulario y revisa la pestaña 'Respuestas' para examinar los gráficos de colores que el sistema ha generado automáticamente basándose en la información que enviaron tus compañeros."}, 
  a2:{t:"Migración a Base de Datos", d:"Localiza y presiona el ícono verde de integración con Sheets. Confirma la creación de la hoja de cálculo y observa cómo los datos de la encuesta se estructuran automáticamente en filas y columnas."}, 
  v:"ver respuestas google forms"},
 {t:"Semana 8: Proyecto Grupal Final", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar el ecosistema de herramientas de la nube para ejecutar un proyecto colaborativo de alto rendimiento simulando un entorno profesional.</p><p><strong>📖 Explicación detallada:</strong><br>El mercado laboral moderno no exige memorizar comandos, sino saber aplicar las tecnologías para resolver problemas en equipo, especialmente cuando los miembros trabajan desde distintos lugares (teletrabajo).<br><br>Este proyecto final consolidará tu capacidad de gestionar el ecosistema de Google Workspace en un flujo continuo. Como equipo de 3 integrantes, no utilizarán papel ni intercambiarán dispositivos. Deberán coordinar la temática mediante una lista compartida en Keep, recolectar información de sus compañeros usando un Formulario, volcar el texto redactado simultáneamente en un Documento estructurado y, en caso de retroalimentación del profesor, utilizarán la función de comentarios con menciones (usando el símbolo '@') para asignar rápidamente correcciones precisas a cada integrante, entregando un producto final impecable y totalmente digital.</p>", 
  a1:{t:"Asignación por Menciones", d:"Dentro del documento compartido del proyecto, utiliza la función de Comentarios e inserta el símbolo '@' seguido del correo de tu compañero para asignarle formalmente la responsabilidad de revisar la introducción."}, 
  a2:{t:"Validación de Entrega", d:"Realicen una auditoría final: verifiquen la ortografía general, asegúrense de que todos los comentarios internos hayan sido resueltos (cerrados) y validen que el archivo cuente con los permisos adecuados para que el profesor pueda evaluarlo."}, 
  v:"google workspace colaboracion escolar"}
];
  
  // === GRADO 6 - BIMESTRE 3: Video Pro ===
const g6_b3 = [
 {t:"Semana 1: El Guion y Formato de Video", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Planificar la producción audiovisual antes de encender la cámara y configurar el lienzo del editor.</p><p><strong>📖 Explicación detallada:</strong><br>Una película profesional no se graba al azar; se planifica en papel mediante un Guion. Editar un montón de videos sueltos sin saber qué historia quieres contar resultará en un video desastroso. Antes de tocar la aplicación de edición, debes saber cuál será el inicio, el desarrollo y el final de tu proyecto.<br><br>Al abrir una aplicación de edición avanzada (como CapCut, InShot o Premiere), lo primero es definir la 'Relación de Aspecto' o formato del lienzo (Canvas). Si el video es para YouTube o proyectarse en TV, el formato debe configurarse obligatoriamente en 16:9 (Horizontal/Acostado). Si el video es para TikTok o Reels, el formato debe ser 9:16 (Vertical/Parado). Mezclar videos verticales en un lienzo horizontal generará unas terribles franjas negras a los lados que arruinan la estética visual.</p>", 
  a1:{t:"Selección de Formato", d:"Abre tu aplicación de edición de video, inicia un Nuevo Proyecto y agrega un video cualquiera desde tu galería. Busca la herramienta 'Relación de aspecto' o 'Formato' y cámbialo a 16:9 (Horizontal)."}, 
  a2:{t:"Análisis del Lienzo", d:"Si pusiste un video vertical en un formato 16:9, nota las barras negras. Usa tus dedos en la pantalla de previsualización para hacer 'zoom' y agrandar el video hasta que llene los bordes, aunque se corte un poco arriba y abajo."}, 
  v:"relacion de aspecto video celular"},
 {t:"Semana 2: Línea de Tiempo y Pistas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la interfaz de edición no lineal (NLE) y navegar por los fotogramas del proyecto.</p><p><strong>📖 Explicación detallada:</strong><br>El corazón de cualquier programa de edición de video es el 'Timeline' (La Línea de Tiempo). Es la barra horizontal gigante en la parte inferior de la pantalla donde se muestran los clips de video en secuencia, de izquierda a derecha. <br><br>Hay una línea blanca vertical fija en el centro de la pantalla llamada 'Cabezal de Reproducción' o aguja. Esta aguja marca el momento exacto (el fotograma o cuadro) que estás viendo en la pantalla superior en ese preciso instante. En lugar de mover el video tocando la pantalla de arriba, un editor profesional desliza la línea de tiempo inferior de lado a lado con su dedo para navegar por los minutos y segundos exactos con precisión quirúrgica.</p>", 
  a1:{t:"Navegación Precisa", d:"Agrega 3 videos diferentes a tu proyecto. Usa tu dedo para arrastrar la línea de tiempo de izquierda a derecha y detén la aguja blanca exactamente donde termina el primer video y empieza el segundo."}, 
  a2:{t:"Cambio de Orden", d:"Mantén tu dedo presionado fuertemente sobre el tercer clip de video hasta que flote, y luego arrástralo hacia la izquierda para colocarlo al principio de toda la línea de tiempo."}, 
  v:"linea de tiempo edicion de video"},
 {t:"Semana 3: Cortes Precisos y Transiciones", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Eliminar el metraje inservible usando la herramienta de división y suavizar los saltos visuales.</p><p><strong>📖 Explicación detallada:</strong><br>El 80% de la edición de video consiste en cortar y eliminar las partes aburridas o los errores. La herramienta maestra para esto es el botón de 'Dividir' o Cortar (Split), que generalmente tiene el ícono de unas tijeras o una cuchilla.<br><br>Al ubicar el cabezal de reproducción sobre un momento exacto y presionar 'Dividir', el video se parte en dos bloques independientes. Esto nos permite tocar el bloque que contiene el error y usar el botón del basurero para eliminarlo. Cuando pegamos dos clips distintos, el cambio de uno al otro se llama 'Corte directo'. A veces, para que ese corte no sea tan brusco o violento a la vista, usamos las 'Transiciones' (ícono de cuadrito blanco entre los videos), que insertan efectos visuales como disolución o deslizamiento entre ambas tomas para conectar la historia de forma suave.</p>", 
  a1:{t:"Cirugía de Video", d:"Coloca la aguja blanca justo a la mitad de tu video y presiona el botón 'Dividir' (Split). Toca la segunda mitad que acabas de cortar y presiona el ícono del basurero para eliminarla."}, 
  a2:{t:"Aplicar Transición", d:"Ahora que tienes dos videos diferentes unidos, toca el pequeño cuadro blanco que los une en la línea de tiempo y selecciona la transición 'Disolver' o 'Desvanecer' y dale Play para ver el efecto."}, 
  v:"como hacer cortes en capcut o inshot"},
 {t:"Semana 4: Mezcla de Audio Profesional", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Equilibrar los niveles de sonido entre la música de fondo y los diálogos para garantizar la claridad del mensaje.</p><p><strong>📖 Explicación detallada:</strong><br>Un mal video con buen audio se puede ver, pero un buen video con mal audio es insoportable. Un error clásico es agregar música de fondo (BGM) y dejarla al 100% de volumen, lo cual compite con la voz de las personas que hablan en el video y hace imposible entenderles.<br><br>La edición requiere 'Mezcla de Audio'. El editor debe seleccionar la pista de música, abrir la herramienta de Volumen y bajarlo drásticamente (generalmente entre el 5% y el 15%) durante todo el tiempo en el que alguien esté hablando en el video principal. Si la persona deja de hablar y hay una escena de solo paisaje, podemos usar la herramienta de 'Dividir' en la pista musical para aislar ese segmento y subir su volumen al 80%, creando un ritmo dinámico y cinematográfico en la narrativa.</p>", 
  a1:{t:"Silenciar y Agregar", d:"Toca tu clip de video original, busca el botón 'Volumen' y bájalo a cero (Silenciar). Luego ve a la opción 'Audio' > 'Sonidos' y agrega una canción de fondo a tu proyecto."}, 
  a2:{t:"Equilibrio (Mezcla)", d:"Asegúrate de que la canción no suene tan fuerte que lastime los oídos. Selecciona la barra verde (o azul) de la música, entra a volumen y redúcelo al 20% para que suene como acompañamiento sutil."}, 
  v:"mezcla de audio en edicion celular"},
 {t:"Semana 5: Títulos y Subtítulos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Insertar tipografía animada en el video para retener la atención en redes y exposiciones.</p><p><strong>📖 Explicación detallada:</strong><br>El texto en un video cumple varias funciones: puede ser un gran Título de introducción, un cintillo que presenta el nombre de la persona que habla, o pueden ser subtítulos. Dado que muchas personas ven videos en sus celulares sin sonido, los subtítulos se han vuelto imprescindibles en la edición moderna.<br><br>Al usar la herramienta 'Texto' en el editor, se creará una nueva caja en la pantalla y una nueva pista de color flotando por encima del video en la línea de tiempo. Tú controlas exactamente en qué segundo aparece y en qué segundo desaparece el texto alargando o acortando esa pista flotante con tus dedos. Además, puedes acceder a la sección de 'Animaciones' para hacer que las letras entren a la pantalla rebotando, escribiéndose a máquina o desvaneciéndose elegantemente.</p>", 
  a1:{t:"Títulos Animados", d:"Toca la opción 'Texto', escribe el título de tu video y ponle un color llamativo. Luego busca el botón de 'Animación' y elige el efecto de 'Máquina de escribir' para que las letras aparezcan de una en una."}, 
  a2:{t:"Control de Tiempo", d:"Mira la barra de texto que apareció en tu línea de tiempo. Toca su borde derecho y arrástralo hacia la izquierda para que el título desaparezca a los 3 segundos exactos de iniciar el video."}, 
  v:"textos y animaciones en capcut"},
 {t:"Semana 6: Efecto PIP (Imágenes Superpuestas)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar la herramienta B-Roll (PIP) para superponer un video encima de otro simultáneamente.</p><p><strong>📖 Explicación detallada:</strong><br>A veces necesitamos mostrar dos cosas al mismo tiempo; por ejemplo, alguien hablando a la cámara, y un segundo video más pequeño en una esquina mostrando el objeto del que está hablando. A esta técnica avanzada se le conoce como 'Picture in Picture' (PIP) o Superposición.<br><br>El video original siempre está en la Pista Principal (la capa de abajo). Si tocamos el menú de Superposición (Overlay/PIP) y elegimos un segundo clip, la aplicación creará una capa nueva flotando por encima. El video superior tapará al de abajo, pero usando dos dedos en la pantalla de vista previa, puedes encoger y mover ese segundo clip hacia una esquina, permitiendo que el espectador vea ambas pistas de video reproduciéndose en sincronía al mismo tiempo.</p>", 
  a1:{t:"Capa de Superposición", d:"Teniendo un video base reproduciéndose, busca el botón de 'Superposición' o 'PIP' (Picture in Picture) y agrega un segundo video corto o fotografía desde tu galería."}, 
  a2:{t:"Ajuste de Pantalla Dividida", d:"Con dos dedos, haz más pequeña la foto o el video que acabas de superponer y colócalo en la esquina superior derecha del video principal, estilo noticiero."}, 
  v:"efecto pip o superposicion en video"},
 {t:"Semana 7: Fotogramas Clave (Keyframes)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Programar animaciones y movimientos de cámara usando la tecnología de Fotogramas Clave.</p><p><strong>📖 Explicación detallada:</strong><br>¿Cómo logramos que un texto o una foto superpuesta se mueva por la pantalla, haga zoom, o siga a un objeto? Usamos la herramienta más poderosa y profesional de la edición: Los Fotogramas Clave (Keyframes), representados por un pequeño ícono de un rombo (♦️).<br><br>Un fotograma clave le dice a la computadora: 'Asegúrate de que la foto esté en ESTE lugar, en ESTE segundo exacto'. Si pones la aguja en el segundo 1, marcas un rombo, pones la foto a la izquierda; luego mueves la aguja al segundo 5, marcas otro rombo y pizas la foto a la derecha, la computadora hará la magia: calculará el recorrido matemático para mover y animar la foto deslizándola suavemente de izquierda a derecha durante esos cuatro segundos de diferencia sin que tú tengas que hacerlo cuadro por cuadro.</p>", 
  a1:{t:"Punto A y Punto B", d:"Agrega un sticker o un texto en superposición. Pon la aguja al inicio, mueve el sticker a la izquierda y presiona el ícono del rombo (Keyframe). El rombo se volverá rojo."}, 
  a2:{t:"La Animación Matemática", d:"Mueve la aguja en tu línea de tiempo 3 segundos hacia adelante. Ahora arrastra tu sticker hacia la derecha de la pantalla y el programa creará otro rombo automático. ¡Dale Play y mira cómo se mueve solo!"}, 
  v:"keyframes en edicion de video explicacion"},
 {t:"Semana 8: Cortometraje Final y Exportación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Completar el flujo de trabajo de edición (Workflow), renderizar (procesar) el archivo final y revisar la calidad técnica.</p><p><strong>📖 Explicación detallada:</strong><br>Todos los recortes, textos, y transiciones que has aplicado hasta ahora no son el video final, son instrucciones de software en la memoria caché del dispositivo. Para crear el video reproducible que podrás enviar, compartir o proyectar, debemos realizar la Exportación o Renderizado.<br><br>Antes de presionar el botón exportar (la flecha hacia arriba en la esquina superior derecha), un buen editor ajusta la 'Resolución'. Normalmente se exporta en 1080p (Alta definición) a 30 fotogramas por segundo (fps). Al exportar, el procesador del dispositivo leerá la línea de tiempo completa y dibujará píxel por píxel la película final, lo cual puede tardar varios minutos. Jamás debes salir de la aplicación o apagar la pantalla durante este proceso, de lo contrario, el archivo resultante quedará corrupto (dañado) e inutilizable.</p>", 
  a1:{t:"Ensamblaje del Cortometraje", d:"Crea un video final de 30 segundos sobre una receta o una manualidad. Debe contener: Un formato correcto, 3 cortes precisos, un título animado, un efecto PIP en la esquina y música de fondo mezclada en volumen bajo."}, 
  a2:{t:"Renderizado", d:"Revisa que no falte nada. Toca el botón de exportación arriba a la derecha, configura la calidad en 1080p y presiona Exportar. Espera pacientemente hasta que llegue al 100% y búscalo en tu galería de fotos."}, 
  v:"como exportar video en alta calidad celular"}
];
  
  // === GRADO 6 - BIMESTRE 4: IA Pro ===
const g6_b4 = [
 {t:"Semana 1: IA como Co-piloto de Trabajo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Entender el concepto de 'Copiloto' integrado en las aplicaciones ofimáticas para acelerar la productividad.</p><p><strong>📖 Explicación detallada:</strong><br>Hasta hace poco, para usar Inteligencia Artificial debías ir a una página web separada (como la de ChatGPT o Claude). Hoy, la IA vive dentro de tus aplicaciones diarias. Google Workspace, Microsoft Office (Copilot) y Canva tienen a la IA integrada como un botón mágico flotando en tu documento.<br><br>La mentalidad profesional ya no es empezar un trabajo desde cero frente a una pantalla en blanco. La mentalidad moderna es pedirle a tu Copiloto de IA que te genere un borrador inicial, una plantilla base o una estructura de puntos, para que tú, como el piloto humano, corrijas, refines y apliques tu conocimiento sobre ese molde. A esto se le llama 'Productividad Aumentada'.</p>", 
  a1:{t:"El Flujo de Trabajo", d:"Escribe en tu cuaderno: ¿Cuál es la diferencia entre que la IA haga el 100% de tu trabajo y que funcione como un 'Copiloto' que te hace el primer borrador?"}, 
  a2:{t:"Identificación de Herramientas", d:"Investiga el nombre comercial de las IAs integradas en las oficinas modernas (Ej. Copilot en Microsoft, Gemini en Google)."}, 
  v:"inteligencia artificial integrada en workspace microsoft"},
 {t:"Semana 2: Prompt Engineering Avanzado", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Dominar la técnica de 'Few-Shot Prompting' y restricciones de formato para resultados de nivel corporativo.</p><p><strong>📖 Explicación detallada:</strong><br>En grados anteriores aprendimos el Prompt básico (Rol, Tarea, Formato). En el nivel Pro, aplicaremos técnicas como el 'Few-Shot Prompting' (Prompting con pocos ejemplos). En lugar de solo darle la orden a la IA, le damos 2 o 3 ejemplos previos dentro del mismo mensaje para que la IA copie exactamente nuestro estilo y estructura de pensamiento.<br><br>Además, agregaremos variables de restricción de 'Tono' (ej: 'Usa un tono formal y persuasivo') y restricciones negativas (ej: 'No uses palabras repetitivas, no incluyas una introducción genérica'). Cuanto más estricto y matemático seas en tu instrucción, más preciso y útil será el código o texto que la máquina te entregará.</p>", 
  a1:{t:"Prompt con Ejemplo", d:"Escribe un prompt avanzado pidiendo a la IA que genere títulos para videos. Debes incluirle dos ejemplos inventados por ti para que ella sepa qué estilo debe imitar."}, 
  a2:{t:"Restricciones Negativas", d:"Agrega a tu prompt anterior una orden que diga qué es lo que la IA NO debe hacer bajo ninguna circunstancia."}, 
  v:"prompt engineering avanzado ejemplos"},
 {t:"Semana 3: IA en Documentos Profesionales", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar modelos de lenguaje para reformular tonos, expandir ideas o cambiar el registro de un documento.</p><p><strong>📖 Explicación detallada:</strong><br>Escribir un correo para un amigo es muy diferente a escribir un correo para el director de una escuela o una empresa. Muchas veces tenemos la idea correcta, pero no sabemos cómo hacer que suene profesional y educada. <br><br>Una técnica avanzada en Docs es usar la IA para 'Reescribir' (Rewrite). Tú escribes un párrafo rápido, crudo y con tus propias palabras (ej: 'Profe, no pude hacer la tarea por enfermo, deme más tiempo'). Seleccionas el texto, abres tu Copiloto de IA y le indicas: 'Reescribe este texto con un tono formal, empático y profesional'. La IA transformará tu idea cruda en un texto corporativo excelente, garantizando que tu comunicación sea siempre de alto nivel.</p>", 
  a1:{t:"El Tono Profesional", d:"Escribe un mensaje muy informal pidiendo permiso para faltar a clases. Luego, redacta el Prompt que usarías para que la IA lo convierta en una carta formal."}, 
  a2:{t:"Expansión de Ideas", d:"Escribe una sola oración sobre un tema. Explica cómo le pedirías a la IA que expanda esa idea en tres párrafos desarrollando el concepto."}, 
  v:"reescribir textos con inteligencia artificial"},
 {t:"Semana 4: IA en Hojas de Cálculo (Data)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Delegar la creación de fórmulas complejas y el análisis de patrones a la inteligencia de la hoja de cálculo.</p><p><strong>📖 Explicación detallada:</strong><br>Google Sheets y Excel tienen integrada una IA de análisis de datos súper potente. Si tienes una tabla con muchísimos números, ventas o fechas, y no sabes qué gráfica hacer o qué fórmula usar, ya no tienes que memorizar todas las matemáticas de la computadora.<br><br>Existen funciones como 'Explorar' (o Copilot) donde puedes escribir en lenguaje natural: '¿Cuál fue el producto que más se vendió en el mes de marzo?'. La IA lee la tabla por ti, escribe la fórmula compleja de extracción de datos de forma invisible, y te devuelve la respuesta escrita o te dibuja el gráfico ideal automáticamente. También sirve para pedirle a los Chatbots que nos escriban fórmulas que no recordamos (Ej: 'Escríbeme la fórmula de Excel para sumar solo los números mayores a 50').</p>", 
  a1:{t:"Fórmulas en Lenguaje Natural", d:"Imagina que tienes una tabla de notas de alumnos. Redacta cómo le preguntarías a la IA (en lenguaje natural) que te busque a los alumnos reprobados."}, 
  a2:{t:"Consultor de Código", d:"Redacta un prompt dirigido a ChatGPT/Gemini pidiéndole que te explique cómo funciona la fórmula de Sheets '=PROMEDIO(A1:A10)' como si tuvieras 10 años."}, 
  v:"usar chatgpt para formulas de excel"},
 {t:"Semana 5: IA en Presentaciones", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Agilizar la maquetación visual y la estructuración de ideas en diapositivas mediante generadores automáticos.</p><p><strong>📖 Explicación detallada:</strong><br>Crear una presentación de 20 diapositivas puede tomar días si tienes que acomodar el texto y buscar fotos para cada hoja. En el entorno profesional, usamos la IA para generar el 'esqueleto' de la presentación en segundos.<br><br>Herramientas como Canva Magic Design o Tome App te permiten escribir un solo prompt: 'Crea una presentación de 5 diapositivas sobre la historia de las computadoras'. La IA escribirá los textos resumidos, buscará y acomodará imágenes, y aplicará un diseño corporativo a todas las hojas casi al instante. Tu trabajo como profesional ya no es acomodar cuadritos, sino revisar críticamente la información generada, corregir las alucinaciones de la IA y agregar tu toque humano y conocimiento experto a la base generada.</p>", 
  a1:{t:"El Prompt de Diseño", d:"Escribe una instrucción completa para una IA generadora de presentaciones. Incluye el tema, la cantidad de diapositivas y qué colores debería usar el diseño."}, 
  a2:{t:"El Rol del Revisor", d:"¿Por qué sería un error terrible generar una presentación con IA y proyectarla en tu clase sin haberla leído antes tú mismo?"}, 
  v:"canva magic design presentaciones ia"},
 {t:"Semana 6: Lógica de Programación y Código", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar los LLM como tutores y depuradores para aprender lenguajes de computadora (Coding).</p><p><strong>📖 Explicación detallada:</strong><br>Los Grandes Modelos de Lenguaje no solo dominan el español o el inglés, también han leído y dominan todos los lenguajes de programación (HTML, JavaScript, Python). La IA es hoy el mejor tutor del mundo para aprender a hacer software o páginas web.<br><br>Los programadores profesionales usan la IA para dos cosas: 1) Escribir fragmentos rápidos de código aburrido, o 2) 'Depurar' (Encontrar errores). Si escribes un código y la pantalla no carga, puedes copiar tu código, pegarlo en el chatbot y decirle: 'Hay un error en mi código, búscalo y explícame por qué falló'. La IA encontrará que te faltó un punto y coma en la línea 15 y te explicará la regla matemática para que no te vuelva a suceder.</p>", 
  a1:{t:"Traductor de Lenguajes", d:"La programación es darle instrucciones a la máquina. Escribe un prompt pidiéndole a la IA que te genere el código HTML básico para poner la palabra 'HOLA' en color rojo."}, 
  a2:{t:"El Tutor de Errores", d:"Explica en un párrafo por qué es mejor pedirle a la IA que 'te explique tu error' en lugar de pedirle que 'haga el trabajo completo por ti'."}, 
  v:"programar con ayuda de inteligencia artificial"},
 {t:"Semana 7: Identidad Digital y Seguridad Bio", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Proteger nuestra huella digital y entender el riesgo de la ingeniería social y la clonación generativa.</p><p><strong>📖 Explicación detallada:</strong><br>A un nivel profesional, debemos estar conscientes de que las herramientas que usamos para hacer el bien, los cibercriminales las usan para hacer fraude. La clonación de voz y los videos hiperrealistas generados por IA (Deepfakes) se utilizan para suplantar identidades.<br><br>Si subes videos hablando a redes sociales públicas, tu voz puede ser extraída, clonada y utilizada para enviar mensajes falsos pidiendo dinero a tu familia a través de WhatsApp. Para el profesional moderno, la Ciberseguridad IA implica: tener cuentas privadas, no aceptar videollamadas de números desconocidos (pueden ser videos de IA en tiempo real) y establecer una 'Palabra de seguridad' o código secreto con tu familia para comprobar que realmente están hablando contigo y no con un robot clonador en caso de emergencia.</p>", 
  a1:{t:"El Protocolo de Emergencia", d:"Inventa una 'Palabra o Frase de Seguridad' que acordarías con tus padres. ¿Cómo ayudaría esta palabra si alguien los llama usando un clonador de voz de IA?"}, 
  a2:{t:"La Huella Digital", d:"Escribe en tu cuaderno por qué subir muchos videos de tu rostro y tu voz a internet público es considerado hoy un riesgo de seguridad."}, 
  v:"deepfakes fraudes clonacion de voz ia"},
 {t:"Semana 8: Consultoría IA (Proyecto Final)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Actuar como consultores tecnológicos integrando el ecosistema de IA para resolver problemas empresariales o académicos complejos.</p><p><strong>📖 Explicación detallada:</strong><br>El proyecto final de tu ciclo escolar te desafiará a pensar como un ingeniero moderno. En el mundo real, los problemas no se resuelven usando una sola aplicación, sino conectando varias de forma inteligente para optimizar procesos.<br><br>Se te dará un caso de estudio (por ejemplo, organizar la feria de ciencias de la escuela). Deberás diseñar un plan donde expliques qué IA utilizarás para la lluvia de ideas del evento, qué IA integrada en Hojas de cálculo usarás para automatizar el presupuesto, y qué comandos de IA Generativa de diseño utilizarás para la promoción, demostrando que dominas la orquestación tecnológica, la ingeniería de prompts y mantienes una postura altamente ética y responsable sobre el producto final que entregas.</p>", 
  a1:{t:"Orquestación de Herramientas", d:"Escribe un pequeño plan de 3 pasos indicando qué tipo de IA usarías para: 1. Investigar un tema, 2. Escribir un resumen, 3. Crear una presentación del tema."}, 
  a2:{t:"El Manifiesto Ético", d:"Redacta tu compromiso como Ciudadano Digital: Escribe 3 reglas que siempre cumplirás al usar la IA en la escuela y en tu vida futura para evitar el plagio y la desinformación."}, 
  v:"el impacto de la inteligencia artificial en el futuro"}
];
