const b1_bim1 = [
 {t:"Semana 1: El Estándar Internacional (Normas APA)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar el lienzo de trabajo bajo estándares internacionales antes de comenzar la redacción.</p><p><strong>📖 Explicación detallada:</strong><br>En la primaria, el objetivo de usar un procesador de texto era simplemente aprender a escribir. En el nivel Básico, el objetivo cambia: ahora debes aprender a presentar información como un profesional. En el mundo académico y laboral existen reglas universales, y la más importante de ellas son las Normas APA.<br><br>Las Normas APA estandarizan cómo se ve un documento para que cualquier persona pueda leerlo sin distraerse. La regla número uno de un profesional es preparar el 'Lienzo' antes de escribir. Ve a la pestaña 'Disposición' o 'Formato' y configura los márgenes exactamente a 2.54 cm en los cuatro lados. Luego, asegúrate de que todo el documento tenga una tipografía formal (Times New Roman 12 o Arial 11) y un interlineado de 2.0 (doble espacio). Además, la primera línea de cada párrafo nuevo debe tener una sangría de 1.27 cm, lo cual se logra presionando la tecla 'Tab'. Configurar esto al inicio te ahorrará horas de frustración al final del proyecto.</p>", 
  a1:{t:"El Lienzo Perfecto", d:"Abre un documento nuevo. Antes de escribir nada, configura los márgenes a 2.54 cm, elige la fuente Arial 11 y pon el interlineado en 2.0. Guarda este documento como 'Plantilla_APA'."}, 
  a2:{t:"Aplicación Crítica", d:"Escribe un párrafo de 5 líneas sobre tu pasatiempo favorito respetando la sangría inicial. Observa cómo el interlineado doble hace que el texto sea mucho más fácil de leer."}, 
  v:"configurar normas apa septima edicion word"},
 {t:"Semana 2: Estructura, Jerarquía e Índices", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar los metadatos de estilos para organizar el documento y generar tablas de contenido automáticas.</p><p><strong>📖 Explicación detallada:</strong><br>Hacer un índice a mano (escribiendo el tema y llenando de puntitos) es un error de novatos. Si agregas más texto y la página cambia, tu índice quedará arruinado. La ofimática profesional soluciona esto usando la Jerarquía de Estilos.<br><br>En la pestaña de 'Inicio' existe una galería llamada 'Estilos'. Estos le inyectan código invisible al texto, diciéndole a la computadora qué nivel de importancia tiene cada frase. 'Título 1' se usa para los temas principales, 'Título 2' para los subtemas, y 'Título 3' para detalles específicos.<br><br>Al estructurar tu documento marcando cada título con su estilo correspondiente, puedes ir a la pestaña 'Referencias' y hacer clic en 'Tabla de Contenido'. El procesador buscará todo lo que marcaste, organizará los niveles, detectará en qué página exacta están y creará un índice perfecto. Si tu documento cambia, solo debes hacer clic derecho sobre el índice y seleccionar 'Actualizar campos'.</p>", 
  a1:{t:"Marcado de Texto", d:"Copia y pega un artículo de Wikipedia sobre un país. Selecciona el nombre del país y aplícale 'Título 1'. Busca tres temas importantes y aplícales 'Título 2'."}, 
  a2:{t:"Generación Mágica", d:"Crea una página en blanco al principio de tu artículo. Ve a 'Referencias', inserta una Tabla de Contenido automática y verifica que los títulos y las páginas coincidan."}, 
  v:"indice automatico word estilos"},
 {t:"Semana 3: Secciones, Encabezados y Paginación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Dividir el documento en segmentos independientes para manipular la numeración y orientación de las páginas.</p><p><strong>📖 Explicación detallada:</strong><br>Un documento académico real no es igual desde la página 1 hasta la 100. La portada no debe llevar número, el índice suele llevar números romanos, y a veces necesitas que una sola página esté horizontal para meter un mapa. Para lograr esto, usamos los Saltos de Sección.<br><br>Una 'Sección' es como un compartimento sellado dentro de tu documento. Lo que le haces a la Sección 2 no afecta a la Sección 1. Para crearla, ve a 'Disposición' > 'Saltos' > 'Salto de Sección a la página siguiente'.<br><br>Al hacer doble clic en la parte más alta de la hoja, se abre el editor de encabezados, donde insertamos el Número de Página (esquina superior derecha en APA). Para evitar que el número aparezca en la portada, abres el encabezado de la página 2 y desmarcas el botón 'Vincular al anterior'. Esto independiza las páginas, permitiéndote borrar el número de la portada sin afectar al resto.</p>", 
  a1:{t:"El Salto de Sección", d:"Abre un documento de 3 páginas. Al final de la página 1, inserta un Salto de Sección (Página Siguiente). Ve a la página 2 y cambia su orientación a Horizontal. La página 1 debe quedarse vertical."}, 
  a2:{t:"Paginación Profesional", d:"Inserta números de página en la esquina superior derecha. Rompe el vínculo entre secciones para asegurarte de que la página 1 (tu portada) no muestre ningún número."}, 
  v:"saltos de seccion y numeracion word"},
 {t:"Semana 4: Evitando el Plagio (Citas y Bibliografía)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la ética digital y utilizar el gestor de fuentes para dar crédito a los autores originales.</p><p><strong>📖 Explicación detallada:</strong><br>Copiar y pegar el trabajo de otra persona haciéndolo pasar por tuyo es un delito académico llamado Plagio. Para evitarlo, siempre debemos 'Citar' nuestras fuentes, es decir, mencionar de dónde sacamos la información.<br><br>Word tiene un cerebro interno para manejar esto. En lugar de escribir la bibliografía a mano al final del trabajo, usamos el botón 'Insertar Cita' > 'Agregar nueva fuente' en la pestaña 'Referencias'. Aparecerá un formulario donde le indicas al programa los datos del libro o sitio web que consultaste. Word insertará una pequeña marca en tu texto (Ej: Pérez, 2023). Al final de tu trabajo, haces clic en el botón 'Bibliografía', y el programa genera automáticamente la lista completa de todos los libros que registraste, ordenados alfabéticamente.</p>", 
  a1:{t:"Registro de Fuentes", d:"Busca un libro que tengas en casa o un artículo de internet. Ve a Referencias > Insertar Cita > Agregar nueva fuente, llena los datos del formulario y guarda la fuente."}, 
  a2:{t:"La Bibliografía", d:"Escribe un pequeño resumen de lo que leíste en ese libro. Al final de la hoja, usa el botón 'Bibliografía' para insertar automáticamente la referencia completa del autor."}, 
  v:"citas y bibliografia normas apa word"},
 {t:"Semana 5: Tablas de Datos y Gráficos SmartArt", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Presentar datos numéricos y diagramas lógicos de forma limpia y estructurada sin saturar visualmente el documento.</p><p><strong>📖 Explicación detallada:</strong><br>Una tabla profesional se enfoca en la limpieza. La regla de oro en el nivel avanzado es evitar las líneas verticales. Una tabla formal solo debe tener 3 líneas horizontales gruesas: una arriba de los títulos de las columnas, una debajo de los títulos, y una al final de toda la tabla. Las líneas divisorias verticales distraen la vista de los datos importantes.<br><br>Por otro lado, si necesitas explicar los pasos de un proceso o un organigrama, no uses formas sueltas tratando de unirlas con flechas. Word incluye SmartArt en la pestaña Insertar. Son diagramas preprogramados. Solo eliges un diseño, escribes tu texto en el panel lateral, y el programa automáticamente acomoda los tamaños, las flechas y los colores para mantener un equilibrio visual perfecto.</p>", 
  a1:{t:"Tabla Minimalista", d:"Inserta una tabla de 3x3. Entra a 'Diseño de tabla' > 'Bordes' y quítale todos los bordes. Luego, ponle una línea horizontal solo arriba y abajo de la primera fila, y otra al final de la tabla."}, 
  a2:{t:"Diagrama de Procesos", d:"Ve a Insertar > SmartArt. Elige un gráfico de tipo 'Ciclo' y crea un diagrama que explique las 4 estaciones del año de forma visual y colorida."}, 
  v:"tablas apa y smartart word"},
 {t:"Semana 6: Trabajo Colaborativo y Control de Cambios", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Dominar las herramientas de edición y revisión para trabajar en equipo y recibir correcciones de los profesores.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando trabajas en grupo o envías tu proyecto a un profesor, se utiliza la pestaña de 'Revisar'. En lugar de escribir tus dudas directamente en el texto arruinando el trabajo, seleccionas una palabra y haces clic en 'Nuevo Comentario'. Esto abre un globo al margen donde puedes escribir notas.<br><br>La herramienta más poderosa es el 'Control de Cambios'. Al activarlo, la computadora graba todo lo que haces. Si borras una palabra, se tacha en color rojo. Si agregas una, aparece subrayada en rojo. Esto permite que la otra persona vea exactamente qué modificaste en su documento original. Luego, el dueño del documento puede ir por cada corrección presionando 'Aceptar' o 'Rechazar' cambio por cambio, manteniendo el control absoluto de su trabajo final.</p>", 
  a1:{t:"El Corrector Humano", d:"Escribe un párrafo y activa el botón 'Control de Cambios' (Pestaña Revisar). Borra dos palabras y agrega una nueva. Observa cómo Word marca tus acciones con líneas rojas."}, 
  a2:{t:"Aprobación de Ediciones", d:"Pídele a un compañero que revise tu documento. Usa los botones 'Aceptar' o 'Rechazar' en la pestaña Revisar para decidir si te quedas con los cambios sugeridos o no."}, 
  v:"control de cambios y comentarios word"},
 {t:"Semana 7: Automatización: Combinar Correspondencia", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conectar una base de datos externa al procesador de texto para generar documentos masivos automáticamente.</p><p><strong>📖 Explicación detallada:</strong><br>Imagina que necesitas imprimir 500 cartas de invitación, cada una con un nombre diferente. Escribirlas una por una tomaría días. La solución profesional se llama Combinar Correspondencia, una función que permite que Word se comunique con Excel (la base de datos).<br><br>Primero, creas una 'Carta Modelo' en Word, dejando un espacio vacío donde debería ir el nombre. Luego vas a la pestaña 'Correspondencia' > 'Seleccionar destinatarios' y vinculas un archivo de Excel que tenga los nombres. Insertarás un 'Campo Combinado' en ese espacio vacío. Al presionar el botón 'Finalizar y Combinar', la computadora cruzará los datos y generará un nuevo documento de 500 páginas, donde cada carta está perfectamente personalizada. ¡Ahorraste semanas de trabajo en segundos!</p>", 
  a1:{t:"La Base de Datos", d:"Abre Excel y haz una tabla muy simple con 3 columnas: Nombre, Apellido y Nota. Llena 3 filas con datos inventados y guárdalo."}, 
  a2:{t:"La Fusión Masiva", d:"Abre Word. Escribe 'Hola [Nombre], tu nota es [Nota]'. Ve a la pestaña Correspondencia, vincula tu Excel e inserta los 'Campos Combinados'. Finaliza la combinación para ver tus cartas listas."}, 
  v:"como combinar correspondencia en word"},
 {t:"Semana 8: Proyecto Final: Exportación y Seguridad", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Consolidar el documento, proteger su integridad (formato y datos) y exportarlo para su distribución digital.</p><p><strong>📖 Explicación detallada:</strong><br>Si envías un archivo original de Word (.docx) por correo, corres el riesgo de que al abrirlo en otro dispositivo los márgenes se muevan y tu trabajo se vea desastroso, o que alguien lo modifique sin tu permiso.<br><br>La solución es la Exportación a PDF. Un PDF es como tomarle una 'fotografía inamovible' a tu documento. Guarda las fuentes y márgenes de forma permanente y nadie podrá modificarlo fácilmente. Se hace yendo a Archivo > Guardar como > Tipo: PDF.<br><br>Por otro lado, si el documento contiene información altamente confidencial, puedes ponerle un candado de grado militar. Ve a Archivo > Información > Proteger Documento > Cifrar con Contraseña. Si alguien intercepta ese archivo, le será matemáticamente imposible abrir el texto sin conocer la clave exacta.</p>", 
  a1:{t:"El Sellado Inamovible", d:"Toma el mejor documento que hayas creado en esta unidad. Ve a 'Guardar como' y cambia el tipo de archivo a 'PDF'. Ábrelo y verifica que no se puede editar con un simple clic."}, 
  a2:{t:"Seguridad Militar", d:"Abre un documento de Word nuevo. Escribe un mensaje secreto. Ve a Archivo > Información > Proteger documento > Cifrar con contraseña. Pon una clave, ciérralo e intenta abrirlo de nuevo."}, 
  v:"guardar como pdf y poner contraseña word"}
];

const b1_bim2 = [
 {t:"Semana 1: Reglas de Diseño y la Ley 10/20/30", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Planificar el contenido visual de una exposición evitando la saturación de texto y respetando las reglas profesionales.</p><p><strong>📖 Explicación detallada:</strong><br>El error más grande al exponer es usar PowerPoint como un teleprompter para leer todo el texto frente a la clase. Una presentación es un apoyo visual para tu voz, no un documento de lectura. Para evitar aburrir a la audiencia, los profesionales utilizan la 'Regla 10/20/30'.<br><br>Esta regla dicta que una buena presentación debe tener un máximo de 10 diapositivas, durar no más de 20 minutos, y usar un tamaño de fuente de al menos 30 puntos. Si usas letra tamaño 30, te obligarás matemáticamente a escribir pocas palabras en la pantalla. Además, debemos aplicar la regla del contraste: si el fondo es oscuro, la letra debe ser clara.</p>", 
  a1:{t:"Auditoría de Texto", d:"Busca una presentación vieja que hayas hecho en primaria. Cuenta cuántas palabras hay en una de las diapositivas y trata de reducir ese texto a solo 5 palabras clave o viñetas."}, 
  a2:{t:"La Regla del 30", d:"Abre una presentación nueva. Escribe tu nombre y configura la fuente a tamaño 30. Aléjate un metro de la pantalla y comprueba lo fácil que es leerlo desde lejos."}, 
  v:"regla 10 20 30 presentaciones efectivas"},
 {t:"Semana 2: El Patrón de Diapositivas (Slide Master)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Modificar la plantilla maestra para aplicar cambios de diseño (logos, colores, fuentes) a todas las diapositivas simultáneamente.</p><p><strong>📖 Explicación detallada:</strong><br>Imagina que tienes una presentación de 50 diapositivas y el profesor te pide que pongas el logo del colegio en la esquina de cada una. Copiar y pegar el logo 50 veces es ineficiente y, si lo mueves un milímetro por error, se verá saltando al cambiar de hoja. La solución es el 'Patrón de Diapositivas'.<br><br>Ve a la pestaña 'Vista' y haz clic en 'Patrón de diapositivas'. Entrarás al 'cuarto de máquinas' de tu presentación. La primera diapositiva que aparece arriba es la 'Madre'. Cualquier cosa que pongas ahí (un logo, un fondo nuevo, un tipo de letra), se aplicará automáticamente e inamoviblemente a todas las demás diapositivas del proyecto. Al terminar, haces clic en 'Cerrar vista patrón' y regresas a tu área de trabajo normal, con todo el diseño estandarizado y bloqueado para que no lo borres por accidente.</p>", 
  a1:{t:"El Cuarto de Máquinas", d:"Ve a Vista > Patrón de diapositivas. Sube hasta la diapositiva principal número 1. Inserta una forma (un cuadrado) en la esquina superior derecha."}, 
  a2:{t:"Cambio Global", d:"Cierra la vista patrón y agrega 5 diapositivas nuevas a tu presentación. Observa cómo todas ya traen el cuadrado en la esquina y no puedes moverlo ni borrarlo accidentalmente."}, 
  v:"patron de diapositivas powerpoint"},
 {t:"Semana 3: Animaciones Avanzadas y Transición Transformación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar entre animaciones y transiciones, utilizando el efecto 'Morph' para crear dinamismo cinematográfico.</p><p><strong>📖 Explicación detallada:</strong><br>Es vital entender la diferencia técnica: las 'Transiciones' son cómo pasa de una hoja a otra, mientras que las 'Animaciones' son cómo se mueven los textos o imágenes dentro de una misma hoja. Llenar tu trabajo de animaciones de rebote, estrellas y ruidos mareará a la audiencia y restará seriedad a tu tema.<br><br>La herramienta más profesional y moderna de PowerPoint es la transición llamada 'Transformación' (Morph). Para usarla, duplicas una diapositiva. En la segunda copia, cambias el tamaño de una foto y mueves el texto de lugar. Al aplicarles la transición 'Transformación', la computadora calcula matemáticamente el viaje de esos elementos y crea una animación fluida (como si la foto flotara y creciera sola), dando un efecto de video profesional sin tener que programar complicadas trayectorias de animación.</p>", 
  a1:{t:"El Efecto Morph", d:"Inserta un círculo azul a la izquierda de la Diapositiva 1. Duplica la diapositiva. En la Diapositiva 2, mueve el círculo a la derecha y hazlo rojo. Aplica la transición 'Transformación' a la hoja 2."}, 
  a2:{t:"Visualización Cinematográfica", d:"Presiona F5 o el botón de 'Presentar'. Pasa de la diapositiva 1 a la 2 y observa cómo el círculo viaja y cambia de color automáticamente de forma fluida."}, 
  v:"transicion transformacion powerpoint morph"},
 {t:"Semana 4: Gráficos Vinculados y Multimedia", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Incrustar elementos multimedia y vincular gráficos dinámicos desde hojas de cálculo externas.</p><p><strong>📖 Explicación detallada:</strong><br>Una presentación corporativa necesita datos reales. Si copias un gráfico de Excel y lo pegas en PowerPoint como una simple imagen, cuando los datos de Excel cambien (por ejemplo, si suben las ventas), tu imagen quedará obsoleta. Al pegar el gráfico, debes usar la opción 'Mantener formato de origen y vincular datos'. Esto crea un puente invisible: si cambias el número en Excel, la barra del gráfico en PowerPoint crecerá sola automáticamente.<br><br>Además, insertar videos desde la computadora hace que el archivo quede muy pesado y difícil de enviar por correo. Lo ideal es ir a la pestaña 'Insertar' > 'Video' > 'Video en línea', y pegar el enlace de YouTube. El video se reproducirá directamente dentro de tu diapositiva usando el internet en tiempo real, manteniendo tu archivo liviano y optimizado.</p>", 
  a1:{t:"El Puente de Datos", d:"Crea un gráfico de pastel simple en Excel y cópialo. Pégalo en PowerPoint eligiendo la opción de pegado que tiene el símbolo de 'vínculo' (la pequeña cadena)."}, 
  a2:{t:"Incrustar YouTube", d:"Busca un video corto en YouTube y copia su enlace. En PowerPoint, ve a Insertar > Video en línea, pega el enlace y acomoda el recuadro como si fuera una foto en tu hoja."}, 
  v:"vincular excel con powerpoint y videos en linea"},
 {t:"Semana 5: Hipervínculos y Menús Interactivos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Romper la navegación lineal creando botones interactivos para saltar a secciones específicas de la presentación.</p><p><strong>📖 Explicación detallada:</strong><br>Por defecto, una presentación va de la hoja 1 a la 2, luego a la 3, como un libro. Pero, ¿qué pasa si el público te hace una pregunta y necesitas regresar rápidamente a la diapositiva 15? Para eso se usan los 'Hipervínculos' o 'Acciones'.<br><br>Puedes dibujar una forma (un botón) en la diapositiva 1, hacer clic derecho sobre ella y seleccionar 'Vínculo'. En el menú, eliges 'Lugar de este documento' y seleccionas la diapositiva a la que quieres que salte. Con esta técnica, puedes crear un Menú Principal interactivo al inicio de tu proyecto. Cuando expongas, no darás clics al azar, sino que presionarás los botones en la pantalla para navegar exactamente a la sección que deseas mostrar, haciendo que tu presentación funcione como una página web o una aplicación.</p>", 
  a1:{t:"Creación del Botón", d:"En tu diapositiva 1, dibuja un rectángulo que diga 'Ir al Final'. Haz clic derecho > Vínculo > Lugar de este documento, y selecciona la última diapositiva de tu proyecto."}, 
  a2:{t:"Navegación Táctil", d:"Pon la presentación en modo pantalla completa. Haz clic en el botón que creaste y comprueba cómo el sistema 'salta' todas las demás diapositivas y te lleva directo al final."}, 
  v:"como hacer menu interactivo en powerpoint"},
 {t:"Semana 6: Notas del Orador y Vista Moderador", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar pantallas duales para leer los apuntes de forma privada mientras el público solo ve la diapositiva gráfica.</p><p><strong>📖 Explicación detallada:</strong><br>El secreto mejor guardado de los grandes expositores es la 'Vista Moderador'. Si aplicaste bien la Regla del 10/20/30, tu diapositiva solo tendrá imágenes y 3 palabras. Entonces, ¿de dónde lees la información que tienes que decir? De las 'Notas del orador'.<br><br>En la parte inferior de PowerPoint hay un panel oculto llamado 'Notas'. Ahí puedes escribir todo el guion completo de lo que quieres decir. Cuando conectas tu computadora a un proyector o pantalla de TV, la computadora activa la Vista Moderador automáticamente. El público (en el proyector) solo verá la foto gigante. Pero tú (en la pantalla de tu laptop) verás un panel de control con un reloj, la diapositiva actual, la que sigue, y un cuadro gigante con todo tu guion para que lo leas disimuladamente, como si fuera un teleprompter de noticias.</p>", 
  a1:{t:"Escribir el Guion", d:"Ve a la parte inferior de la pantalla de edición, levanta la barra que dice 'Notas' y escribe un guion completo de 5 líneas sobre lo que explicarías en esa diapositiva."}, 
  a2:{t:"Simulacro de Teleprompter", d:"Ve a la pestaña 'Presentación con diapositivas' y marca la casilla 'Usar vista Moderador'. Presiona Alt+F5 para activar la vista en tu propia pantalla y ver cómo luce tu panel de control privado."}, 
  v:"vista moderador powerpoint como usar"},
 {t:"Semana 7: Ensayos, Intervalos y Grabación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Automatizar el avance de la presentación usando la herramienta de grabación para entregas asincrónicas.</p><p><strong>📖 Explicación detallada:</strong><br>A veces necesitas enviar tu presentación por correo y no estarás ahí para exponerla. O tal vez tienes un tiempo límite exacto de 5 minutos para hablar. Para esto se usan los 'Intervalos'.<br><br>En la pestaña 'Presentación con diapositivas', existe un botón llamado 'Ensayar intervalos'. Al pulsarlo, la presentación inicia y aparece un cronómetro. La computadora grabará exactamente cuántos segundos te tardaste hablando en la primera hoja, y cuándo hiciste clic para pasar a la siguiente. Al terminar, la presentación quedará automatizada. Si envías ese archivo, la persona solo le dará Play, y las diapositivas avanzarán solas respetando tu tiempo. Si además usas la opción 'Grabar presentación', el programa encenderá tu micrófono y cámara, grabando tu voz sobre cada diapositiva de forma permanente.</p>", 
  a1:{t:"Ensayo General", d:"Abre una presentación de 3 hojas. Presiona 'Ensayar intervalos'. Habla durante 5 segundos exactos en la primera hoja y pasa a la siguiente. Al final, dile que Sí deseas guardar los tiempos."}, 
  a2:{t:"Piloto Automático", d:"Presiona F5 para ver tu presentación y quita las manos del teclado. Observa cómo las diapositivas avanzan solas exactamente en el segundo que las programaste."}, 
  v:"ensayar intervalos y grabar powerpoint"},
 {t:"Semana 8: Proyecto Final: Exportación como Video", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Consolidar el proyecto con intervalos, voz y transiciones, para exportarlo (renderizarlo) en formato de video universal.</p><p><strong>📖 Explicación detallada:</strong><br>El examen de esta unidad consiste en crear un 'Pitch' (una presentación corta para vender una idea o proyecto). Deberás aplicar el Patrón de diapositivas para tu logo, crear hipervínculos de menú, ensayar los intervalos para que la presentación avance sola, y usar la vista moderador para tu guion.<br><br>Al final, no entregarás un archivo de PowerPoint (.pptx). La forma más segura de asegurarte de que tu presentación automatizada funcione en el celular o tablet del profesor sin errores, es convertirla en una película. Vas a 'Archivo' > 'Exportar' > 'Crear un video'. Al elegir la calidad (1080p Full HD), PowerPoint renderizará todas tus transiciones, animaciones y tiempos automatizados para crear un archivo universal MP4, demostrando tu dominio avanzado de la herramienta.</p>", 
  a1:{t:"El Pitch de Venta", d:"Arma una presentación de 4 diapositivas sobre un producto que te gustaría inventar. Asegúrate de incluir el diseño de la diapositiva madre (Patrón) y un botón de inicio."}, 
  a2:{t:"Renderizado MP4", d:"Graba tus intervalos. Luego ve a Archivo > Exportar > Crear un video, y guárdalo en formato MP4. Ábrelo en el reproductor de video de tu computadora para ver tu película final."}, 
  v:"guardar presentacion de powerpoint como video mp4"}
];

// === 1RO BÁSICO - BIMESTRE 3: Seguridad y Ciudadanía Digital ===
const b1_bim3 = [
 {t:"Semana 1: Tu Huella Digital Permanente", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender que cada acción en internet crea un rastro imborrable que forma nuestra reputación digital.</p><p><strong>📖 Explicación detallada:</strong><br>Imagina que caminas por cemento fresco; cada paso que das deja una marca que se endurecerá y quedará ahí para siempre. Eso es exactamente la 'Huella Digital'.<br><br>Cada vez que das un 'Like', subes una foto, haces un comentario enojado en un juego o buscas algo en Google, los servidores guardan esa información. Aunque borres la foto cinco minutos después, es muy probable que alguien ya le haya tomado una captura de pantalla o que los servidores de la aplicación guarden una copia de seguridad en sus archivos privados. En el futuro, cuando busques entrar a la universidad o aplicar a un trabajo, los directores buscarán tu nombre en internet. Tu huella digital hablará por ti: ¿mostrará a un profesional respetuoso o a alguien conflictivo? Piensa siempre dos veces antes de presionar 'Enviar'.</p>", 
  a1:{t:"Auditoría Personal", d:"Abre el navegador en modo incógnito. Escribe tu nombre completo entre comillas (Ej: \"Juan Pérez García\") y mira qué resultados o fotos tuyas aparecen públicamente."}, 
  a2:{t:"El Filtro de los 5 Minutos", d:"Escribe en tu cuaderno la regla de oro: 'Si no se lo dirías en persona a tu abuela, no lo escribas en internet'. Da un ejemplo de un comentario que rompería esta regla."}, 
  v:"que es la huella digital para jovenes"},
 {t:"Semana 2: Contraseñas Criptográficas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diseñar credenciales de acceso de nivel militar para proteger nuestra identidad en la red.</p><p><strong>📖 Explicación detallada:</strong><br>Usar tu nombre, fecha de nacimiento o la clásica '123456' como contraseña equivale a dejar la puerta de tu casa abierta de par en par. Los piratas informáticos usan programas automáticos (Ataques de Fuerza Bruta) que prueban millones de combinaciones de palabras de diccionario por segundo hasta adivinar tu clave.<br><br>Una contraseña profesional debe ser una 'Frase de Contraseña' larga, porque a la computadora le cuesta más descifrar la longitud que la complejidad. Usa una frase sin sentido pero fácil de recordar para ti, y combínala con caracteres especiales. Por ejemplo, en lugar de usar 'perrito123', usa 'MiPerroBailaEnMarte!#99'. Además, NUNCA uses la misma contraseña para tu correo del colegio que para tu cuenta de videojuegos; si hackean el juego, tendrán acceso a toda tu vida académica.</p>", 
  a1:{t:"El Creador de Frases", d:"Inventa una frase secreta combinando un color, un animal, una comida y un número (Ej: PinguinoAzulComePizza77!). Anótala solo en un papel seguro en tu casa."}, 
  a2:{t:"Medidor de Fuerza", d:"Busca en internet un 'Comprobador de contraseñas' (Password Strength Meter). Ingresa tu nueva frase y mira cuántos siglos le tomaría a un hacker adivinarla."}, 
  v:"como crear contraseñas seguras y fuertes"},
 {t:"Semana 3: Phishing y Estafas Digitales", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Detectar técnicas de ingeniería social que los ciberdelincuentes usan para robar datos personales.</p><p><strong>📖 Explicación detallada:</strong><br>El 'Phishing' (Suplantación de identidad) es el fraude más común en internet. El atacante te lanza un 'anzuelo' digital para pescar tu información. <br><br>Suele llegar como un correo, un SMS o un mensaje de WhatsApp urgente que dice algo como: '¡Tu cuenta de Netflix será bloqueada! Haz clic AQUÍ y pon tu contraseña para evitarlo' o '¡Ganaste el sorteo del iPhone!'. El mensaje se ve oficial, e incluso copian los logos de las empresas reales. Sin embargo, el enlace te lleva a una página falsa. La regla de oro de la ciberseguridad es: Ningún banco, escuela o empresa real te pedirá jamás tu contraseña por correo o mensaje. Si el mensaje te genera urgencia, miedo o demasiada emoción, respira, cierra el mensaje y entra a la página oficial escribiéndola tú mismo en el navegador.</p>", 
  a1:{t:"Cazador de Anzuelos", d:"Analiza la estructura de un correo falso. Escribe en tu cuaderno 3 'Banderas Rojas' (Red Flags) que delatan un intento de Phishing (Ej: Errores de ortografía, urgencia exagerada, enlaces extraños)."}, 
  a2:{t:"El Dominio Falso", d:"Observa estos dos enlaces: 'www.netflix.com' y 'www.netflix-login-gratis.com'. Explica por qué el segundo es un enlace peligroso diseñado para robar datos."}, 
  v:"que es el phishing y como evitarlo"},
 {t:"Semana 4: Privacidad en Redes Sociales", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar las barreras de seguridad de nuestras cuentas para controlar quién accede a nuestra vida personal.</p><p><strong>📖 Explicación detallada:</strong><br>Las redes sociales son diseñadas para compartir, pero no todo el mundo merece ver tu vida. Tener una cuenta 'Pública' significa que un desconocido en otro país puede ver dónde estudias, quiénes son tus amigos y a qué lugares vas los fines de semana.<br><br>Es vital entrar al menú de 'Configuración y Privacidad' de tus redes. Un ciudadano digital responsable cambia su cuenta a 'Privada', lo que obliga a que tú tengas que aprobar manualmente a cada persona que quiera seguirte. También debes apagar la configuración de 'Ubicación en tiempo real' (Geolocalización) de tus fotos. Si publicas una foto diciendo 'Comiendo en el parque central ahora mismo', estás dándole tu ubicación exacta a cualquier persona malintencionada en internet.</p>", 
  a1:{t:"Auditoría de Seguridad", d:"Entra a la red social que más utilices (o WhatsApp). Ve a Ajustes > Privacidad. Revisa si tu cuenta es pública y quién puede ver tu foto de perfil o tus estados."}, 
  a2:{t:"La Limpieza de Amigos", d:"Revisa tu lista de contactos o seguidores. Si hay cuentas sin foto, con nombres extraños o personas que nunca has visto en la vida real, elimínalos o bloquéalos de tu red."}, 
  v:"configuracion de privacidad en redes sociales"},
 {t:"Semana 5: Ciberacoso (Cyberbullying)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar conductas de acoso en línea y establecer protocolos de respuesta y reporte tecnológico.</p><p><strong>📖 Explicación detallada:</strong><br>El acoso no solo ocurre en los pasillos de la escuela. El 'Cyberbullying' es el uso de mensajes, fotos o grupos de chat para molestar, humillar o amenazar a otra persona repetidamente. Detrás de la pantalla, los acosadores se sienten valientes porque creen ser anónimos, pero sus acciones causan un dolor psicológico muy real.<br><br>Si tú o un amigo son víctimas, el protocolo de tecnología defensiva es: 1. NO RESPONDER (el acosador busca tu reacción). 2. GUARDAR EVIDENCIA (toma capturas de pantalla de los insultos antes de que los borren). 3. BLOQUEAR (usa el botón de 'Bloquear usuario' de la aplicación para cortar su acceso a ti). 4. REPORTAR (usa el botón de reporte de la plataforma y, lo más importante, muéstrale la evidencia a un adulto de confianza o al profesor). Ser cómplice silencioso también es parte del problema; si ves ciberacoso, no le des 'Like' ni lo compartas.</p>", 
  a1:{t:"El Protocolo de Acción", d:"Escribe en tu cuaderno los 4 pasos defensivos (No responder, Capturar, Bloquear, Reportar) y memorízalos como un escudo de emergencia."}, 
  a2:{t:"Botones de Bloqueo", d:"Abre una aplicación de chat. Toca el perfil de un contacto (no lo bloquees de verdad), pero asegúrate de encontrar exactamente dónde está escondido el botón rojo de 'Bloquear' y 'Reportar'."}, 
  v:"como detener el ciberacoso cyberbullying"},
 {t:"Semana 6: Fake News y Verificación de Hechos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar el pensamiento crítico y herramientas de validación para combatir la desinformación en internet.</p><p><strong>📖 Explicación detallada:</strong><br>Las 'Fake News' o Noticias Falsas son mentiras disfrazadas de noticias formales creadas para asustar a la gente, cambiar su opinión política o ganar dinero con clics. Se hacen virales porque la gente las comparte sin leer más allá del título exagerado.<br><br>Para no ser víctima ni esparcir mentiras, aplica el sistema de 'Verificación de Hechos' (Fact-Checking):<br>1. Duda de los títulos en MAYÚSCULAS o muy emocionales.<br>2. Verifica la fecha (muchas veces reciclan fotos de tragedias de hace 10 años).<br>3. Búsqueda Inversa de Imágenes: Si ves una foto sospechosa, haz clic derecho sobre ella y selecciona 'Buscar imagen en Google'. La IA de Google te dirá de dónde salió realmente esa foto y si fue editada o sacada de contexto.</p>", 
  a1:{t:"Búsqueda Inversa", d:"Ve a Google Imágenes. Haz clic en el ícono de la cámara fotográfica (Lens) en la barra de búsqueda y sube una foto de tu galería para ver en qué otras páginas web aparece esa misma imagen."}, 
  a2:{t:"Triangulación de Datos", d:"Si lees una noticia en TikTok o Facebook que te parece irreal, abre tu navegador y busca esa misma noticia en periódicos oficiales. Si ningún noticiero real está hablando de eso, probablemente sea una Fake News."}, 
  v:"como detectar noticias falsas fake news"},
 {t:"Semana 7: Malware y Dispositivos Seguros", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conocer las amenazas de software malicioso y las prácticas de mantenimiento preventivo de nuestros equipos.</p><p><strong>📖 Explicación detallada:</strong><br>El 'Malware' (Software Malicioso) incluye virus, troyanos y programas espía diseñados para entrar a tu dispositivo, ponerlo lento, mostrarte anuncios obligatorios o robar tus fotos y claves.<br><br>¿Cómo entra el virus a tu teléfono o computadora? Usualmente porque el usuario lo dejó entrar. Instalar juegos pirateados desde páginas extrañas, descargar archivos PDF desconocidos que te mandan por correo, o hacer clic en botones falsos de 'Descargar aquí' que parpadean en las páginas de películas, son las formas directas de infectar tu equipo. Para mantener tu dispositivo blindado: instala aplicaciones únicamente desde las tiendas oficiales (Google Play Store o App Store), mantén tu sistema operativo siempre actualizado, y jamás conectes memorias USB desconocidas a tu equipo sin antes pasarles el Antivirus.</p>", 
  a1:{t:"Análisis de Fuentes", d:"Dibuja dos íconos de tiendas en tu cuaderno: La 'Play Store/App Store' con un escudo de seguridad verde, y una 'Página web pirata' con una señal roja de advertencia."}, 
  a2:{t:"Actualización del Sistema", d:"Ve a los Ajustes (Configuración) de tu dispositivo. Busca el apartado 'Sistema' o 'Actualización de Software' y verifica si tu equipo está protegido con la última versión disponible."}, 
  v:"que es un virus informatico malware"},
 {t:"Semana 8: Proyecto: Campaña de Concientización", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Sintetizar los conocimientos de seguridad y diseñar un material gráfico educativo para la comunidad escolar.</p><p><strong>📖 Explicación detallada:</strong><br>Un buen ciudadano digital no solo se protege a sí mismo, sino que ayuda a proteger a su comunidad. En esta evaluación final, tomarás el rol de un Experto en Ciberseguridad.<br><br>Deberás utilizar tus conocimientos ofimáticos previos (Word o Canva) para diseñar una infografía o un afiche de concientización dirigido a niños más pequeños o a padres de familia. Deberás elegir uno de los temas que vimos (Ej: '3 Pasos para evitar el Phishing' o 'Cómo crear una contraseña irrompible'). Tu trabajo será evaluado por tu capacidad de resumir la información técnica en consejos prácticos, utilizando un diseño visual atractivo, limpio y fácil de leer para advertir a otros sobre los peligros de la red.</p>", 
  a1:{t:"Planificación del Tema", d:"Elige tu tema de especialidad (Huella Digital, Ciberacoso, Contraseñas o Malware). Escribe en tu cuaderno el título de tu afiche y los 3 consejos clave que vas a enseñar."}, 
  a2:{t:"Creación del Afiche", d:"Abre tu herramienta de diseño digital. Crea el afiche combinando textos grandes, colores de alerta (como amarillo o rojo para el peligro) e íconos relacionados a la tecnología y seguridad."}, 
  v:"como hacer una campaña de ciberseguridad"}
];

const b1_bim4 = [
 {t:"Semana 1: ¿Qué es un Modelo de Lenguaje (LLM)?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la diferencia técnica entre un buscador tradicional y una Inteligencia Artificial Generativa de texto.</p><p><strong>📖 Explicación detallada:</strong><br>Durante años, cuando necesitábamos información, usábamos Google. Google es un buscador: tú pides algo y él te entrega enlaces a páginas web que escribieron otras personas. Pero ahora existen los LLM (Grandes Modelos de Lenguaje), como ChatGPT, Gemini o Claude. Estas herramientas no buscan páginas web; ellas 'crean' texto nuevo frente a tus ojos.<br><br>Un LLM funciona como un autocorrector de celular, pero millones de veces más potente. Los científicos le hicieron leer casi todos los libros, artículos y enciclopedias de internet. Gracias a esto, la IA aprendió cómo se comunican los humanos. Cuando le haces una pregunta, la IA no busca la respuesta en un archivo, sino que utiliza matemáticas súper avanzadas para predecir cuál es la palabra que tiene más sentido escribir a continuación. Es una máquina de predecir texto, capaz de inventar cuentos, traducir idiomas o resumir historias, creando un texto que jamás había existido antes en internet.</p>", 
  a1:{t:"Buscador vs. Creador", d:"Abre Google y busca 'Un cuento sobre un perro en Marte'. Observa cómo te da enlaces a cuentos ya escritos. Luego, haz lo mismo en una IA generativa y mira cómo lo inventa desde cero."}, 
  a2:{t:"El Autocorrector Humano", d:"En tu cuaderno, escribe la frase 'Había una vez un...'. Pídele a 3 compañeros que te digan qué palabra sigue. Comprueba cómo los humanos también predecimos el texto basándonos en lo que hemos leído antes."}, 
  v:"que es un gran modelo de lenguaje llm"},
 {t:"Semana 2: La Anatomía de un Buen Prompt", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Formular instrucciones precisas estructurando el Rol, la Tarea y el Contexto para la Inteligencia Artificial.</p><p><strong>📖 Explicación detallada:</strong><br>La IA es como un genio de la lámpara increíblemente inteligente, pero muy literal. A la instrucción que le escribimos a la máquina se le llama 'Prompt'. Si le das un prompt pobre como 'Escribe sobre la célula', te dará una respuesta aburrida y genérica que parece sacada de un diccionario.<br><br>Para obtener resultados profesionales, debes convertirte en un 'Ingeniero de Prompts'. La fórmula secreta tiene 3 partes. 1) El Rol: Dile a la IA quién debe ser (Ej: 'Actúa como un profesor de biología divertido'). 2) La Tarea: Qué quieres exactamente (Ej: 'Explícame qué es la célula'). 3) El Contexto o Formato: Las reglas del juego (Ej: 'Usa analogías de un equipo de fútbol y escríbelo en solo dos párrafos'). Al darle esta estructura matemática, la IA ajustará su vocabulario y te entregará una obra maestra en el primer intento.</p>", 
  a1:{t:"Análisis de Prompts", d:"Compara estos dos prompts: A) 'Dame ideas de comida'. B) 'Actúa como un chef experto y dame 3 ideas de cenas saludables usando solo pollo y verduras'. Explica por qué el B es superior."}, 
  a2:{t:"El Director de Orquesta", d:"Redacta en tu cuaderno el Prompt perfecto para pedirle a la IA que te explique las Fracciones Matemáticas como si fueras un niño de 8 años al que le gusta la pizza."}, 
  v:"como hacer el prompt perfecto chatgpt"},
 {t:"Semana 3: Iteración y Memoria de Contexto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar el chat de IA como una conversación continua, refinando los resultados mediante instrucciones de seguimiento.</p><p><strong>📖 Explicación detallada:</strong><br>Un error común es tratar a la IA como a Google: le haces una pregunta, te da una respuesta, y cierras la página. Las IAs generativas están diseñadas para 'chatear'. Tienen Memoria de Contexto, lo que significa que recuerdan todo lo que han hablado en esa sesión específica.<br><br>Si la IA te escribe un resumen sobre la Revolución Industrial y te parece muy difícil de entender, no tienes que volver a escribir el prompt completo. Puedes simplemente responderle: 'Hazlo más corto', 'Usa palabras más sencillas' o 'Cámbialo a un tono más gracioso'. A este proceso de mejorar la respuesta paso a paso se le llama 'Iteración'. Eres como un director de cine pidiéndole a tu actor (la IA) que repita la escena, pero con más emoción, hasta que quede perfecta.</p>", 
  a1:{t:"El Diálogo Continuo", d:"Pídele a una IA que escriba 5 líneas sobre los dinosaurios. Luego, sin repetir el tema, dile: 'Ahora conviértelo en un poema'. Observa cómo recuerda de qué estaban hablando."}, 
  a2:{t:"Afinando el Tono", d:"Imagina que la IA te escribió un correo para tu profesor, pero suena muy agresivo. Escribe qué le dirías (tu iteración) para que lo reescriba de forma más educada y respetuosa."}, 
  v:"como iterar y mejorar prompts inteligencia artificial"},
 {t:"Semana 4: IA para Superar el Bloqueo Creativo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Emplear la Inteligencia Artificial como un compañero de lluvia de ideas (Brainstorming) sin incurrir en plagio.</p><p><strong>📖 Explicación detallada:</strong><br>El 'Síndrome de la página en blanco' ocurre cuando tienes que escribir un ensayo o una historia y no sabes por dónde empezar. Tu mente se bloquea. Usar la IA para que escriba tu tarea completa y tú solo la copies es trampa, y evita que tu cerebro se desarrolle. El uso ético y profesional de la IA es usarla como tu compañero de 'Lluvia de Ideas'.<br><br>Puedes darle un prompt como: 'Tengo que hacer un trabajo sobre el reciclaje. Dame 5 ideas de temas originales de los que podría hablar'. La IA te dará opciones brillantes. Tú lees esas opciones, tu cerebro se inspira, eliges la mejor idea, y luego apagas la IA y escribes el trabajo con tu propia mente y tus propias palabras. La tecnología te dio el empujón inicial, pero el esfuerzo y el talento final siguen siendo tuyos.</p>", 
  a1:{t:"El Desatascador de Ideas", d:"Piensa en un invento loco que te gustaría crear. Pídele a la IA: 'Dame 5 nombres atractivos y comerciales para un invento que hace [tu idea]'. Elige el mejor."}, 
  a2:{t:"El Esquema Base", d:"Pídele a la IA que genere el 'Esquema o Índice' para una presentación sobre el Sistema Solar. Revisa los puntos sugeridos y úsalos como mapa para investigar por tu cuenta."}, 
  v:"usar chatgpt para lluvia de ideas brainstorming"},
 {t:"Semana 5: Extracción y Resumen de Datos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Procesar textos extensos para extraer puntos clave y acelerar la comprensión de documentos complejos (Técnica TL;DR).</p><p><strong>📖 Explicación detallada:</strong><br>En la secundaria y universidad, tendrás que leer artículos, manuales y leyes muy extensas. Aprender a leer es vital, pero cuando necesitas encontrar información rápidamente, la IA es tu mejor asistente de lectura. Los profesionales usan la técnica de 'Resumen y Extracción'.<br><br>Puedes copiar un artículo gigante de Wikipedia, pegarlo en el chat de la IA y usar un prompt de procesamiento: 'Actúa como un analista. Lee el texto que te pegaré abajo y extráeme únicamente las 3 causas principales de la Primera Guerra Mundial en formato de viñetas cortas'. La IA escaneará miles de palabras en un milisegundo y te filtrará la información exacta que le pediste. También puedes usar el famoso prompt 'ELI5' (Explain Like I'm 5 / Explícame como si tuviera 5 años) para que la IA tome un texto de ciencias súper complicado y lo traduzca a palabras simples con analogías de la vida diaria.</p>", 
  a1:{t:"El Filtro de Viñetas", d:"Busca una noticia larga en internet. Cópiala, pégala en la IA y pídele: 'Resume esta noticia en exactamente 3 viñetas con los datos más importantes'."}, 
  a2:{t:"Técnica ELI5", d:"Busca en Google qué es la 'Física Cuántica' o 'La Gravedad'. Copia la definición aburrida, pégala en la IA y pídele: 'Explícame este texto como si yo tuviera 8 años y me gustaran los videojuegos'."}, 
  v:"como resumir textos largos con inteligencia artificial"},
 {t:"Semana 6: Alucinaciones y Verificación de Hechos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar las debilidades estructurales de los LLMs y desarrollar pensamiento crítico para auditar sus respuestas.</p><p><strong>📖 Explicación detallada:</strong><br>Llegamos a la regla de seguridad más importante de la inteligencia artificial: La IA no sabe qué es verdad y qué es mentira. Recuerda que es una máquina matemática que predice palabras; su objetivo principal es darte una respuesta que suene humana y convincente, no necesariamente verdadera.<br><br>Cuando le preguntas a la IA sobre un tema muy específico, fechas históricas o datos matemáticos que no tiene en su entrenamiento, la IA no te dirá 'No lo sé'. En lugar de eso, inventará una respuesta falsa pero la escribirá con tanta seguridad y palabras tan elegantes que creerás que es cierta. A esto se le llama 'Alucinación de la IA'. Es como un alumno que no estudió para el examen e inventa una respuesta gigante tratando de sonar inteligente. Por eso, nunca debes usar datos de una IA para una tarea oficial sin antes 'Auditar' la información, verificándola en Google, enciclopedias o libros reales.</p>", 
  a1:{t:"El Mentiroso Convincente", d:"Inventa el nombre de un científico falso y una ciudad falsa. Pídele a la IA: 'Escribe la biografía del famoso científico [Nombre Falso] de [Ciudad Falsa]'. Observa cómo alucina inventando una historia."}, 
  a2:{t:"Regla del Auditor", d:"Escribe en tu cuaderno la diferencia entre 'Generar' y 'Verificar'. ¿Por qué confiar ciegamente en un Chatbot podría hacer que repruebes un examen de historia?"}, 
  v:"alucinaciones chatgpt por que inventa datos"},
 {t:"Semana 7: Ética, Derechos de Autor y Plagio", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Establecer los límites morales del uso de la tecnología y comprender las implicaciones legales del contenido generado.</p><p><strong>📖 Explicación detallada:</strong><br>Con un gran poder tecnológico viene una gran responsabilidad humana. Si la IA puede escribir ensayos perfectos, componer canciones y pintar cuadros en segundos, surge una pregunta gigante: ¿De quién es ese trabajo? ¿Es tuyo por haber escrito el prompt, o es de la máquina?<br><br>A nivel académico, copiar un texto íntegro de la IA y ponerle tu nombre es fraude escolar. Los profesores hoy cuentan con escáneres tecnológicos que detectan si un texto fue escrito por un humano o por una máquina (ya que las IAs usan patrones de palabras muy robóticos y repetitivos). A nivel profesional, la ley aún debate si las imágenes de IA tienen derechos de autor, ya que las máquinas fueron entrenadas usando dibujos de artistas reales sin pagarles. El uso ético dicta que siempre debes declarar tu uso tecnológico: 'Este trabajo fue investigado y redactado por mí, utilizando IA únicamente para corrección ortográfica y organización de ideas'.</p>", 
  a1:{t:"El Debate del Artista", d:"Escribe un pequeño párrafo de opinión: Si tú le pides a una IA que dibuje a un superhéroe, y el dibujo se hace famoso y gana millones, ¿ese dinero debería ser tuyo, o de los ingenieros que crearon la IA?"}, 
  a2:{t:"El Patrón Robótico", d:"Pídele a la IA que escriba una carta formal. Léela detenidamente e identifica 3 palabras muy rebuscadas o repetitivas que tú, como adolescente, jamás usarías al hablar normalmente."}, 
  v:"etica en la inteligencia artificial plagio escolar"},
 {t:"Semana 8: Proyecto Final: El Copiloto Experto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar la ingeniería de prompts y la auditoría de datos en un flujo de trabajo para crear un documento original asistido por IA.</p><p><strong>📖 Explicación detallada:</strong><br>El examen final de este grado no medirá qué tan rápido puedes hacer trampa, sino qué tan bien puedes dirigir a tu Copiloto tecnológico. En el mundo laboral moderno, los jefes no quieren empleados que hagan el trabajo lento a mano, ni empleados que copien ciegamente de la IA. Quieren profesionales que sepan 'Orquestar' la tecnología.<br><br>Deberás crear un mini-ensayo o boletín informativo. Utilizarás la IA en tres fases autorizadas: 1) Brainstorming (pidiendo esquemas e ideas). 2) Explicación (pidiéndole que te resuma conceptos difíciles para que tú los entiendas). 3) Corrector (pegando tu texto final humano para que la IA te revise las tildes y las comas). Deberás entregar tu texto final y, al reverso de la página, el 'Registro de Prompts', demostrando exactamente qué instrucciones le diste a la máquina para llegar a ese resultado impecable.</p>", 
  a1:{t:"Documentación de Prompts", d:"Elige un tema científico. Escribe en un documento los 3 Prompts (Instrucciones) exactos que usarías para las fases de: Ideas, Explicación y Corrección Ortográfica."}, 
  a2:{t:"El Ensayo Humano-IA", d:"Aplica los prompts. Usa las ideas de la máquina para inspirarte, escribe un ensayo de 10 líneas con tu propio cerebro, y finalmente, pasa ese ensayo por la IA solo para que corrija tus faltas de ortografía."}, 
  v:"como usar inteligencia artificial para estudiar sin hacer trampa"}
];

async function validarCodigo() {
    const nombre = document.getElementById('nombreAlumno').value.trim();
    const codigo = document.getElementById('codigoAcceso').value.trim().toUpperCase();
    const btn = document.getElementById('btnIngresar');

    if(!nombre || !codigo) return alert("Por favor, llena tu nombre y el código.");
    btn.innerText = "Verificando..."; btn.disabled = true;

    try {
        const docRef = db.collection('codigos').doc(codigo);
        const doc = await docRef.get();

        if (doc.exists) {
            const datosCodigo = doc.data();
            if (datosCodigo.usadoPor && datosCodigo.usadoPor.toLowerCase() !== nombre.toLowerCase()) {
                alert("Este código ya está registrado a nombre de otro alumno.");
                btn.innerText = "Entrar a mis clases"; btn.disabled = false; return;
            }
            if (!datosCodigo.usadoPor) await docRef.update({ usadoPor: nombre });
            
            const sesion = { nombre: nombre, grado: datosCodigo.grado, bimestres: datosCodigo.bimestres };
            localStorage.setItem('sesionInformatica', JSON.stringify(sesion));
            cargarPlataforma(sesion);
        } else {
            alert("El código ingresado no existe o es incorrecto.");
            btn.innerText = "Entrar a mis clases"; btn.disabled = false;
        }
    } catch (error) {
        console.error("Error Firebase:", error); alert("Error de conexión.");
        btn.innerText = "Entrar a mis clases"; btn.disabled = false;
    }
}

function cargarPlataforma(datosUsuario) {
    st.userData = datosUsuario;
    loginScreen.style.display = "none";
    navbar.classList.remove("hid"); mainContent.classList.remove("hid");
    
    // Forzamos a minúsculas para que no haya errores de "B1" vs "b1"
    let idGrado = datosUsuario.grado.toLowerCase(); 

    // MAGIA DE COLOR: Cambio automático para Nivel Básico
    if(idGrado.startsWith('b')) {
        document.documentElement.style.setProperty('--p', '#059669'); // Verde Esmeralda
        document.documentElement.style.setProperty('--s', '#0f172a'); // Pizarra
    } else {
        document.documentElement.style.setProperty('--p', '#2563eb'); // Azul Primaria
        document.documentElement.style.setProperty('--s', '#db2777'); // Rosa Primaria
    }

    // Buscamos el grado ignorando mayúsculas/minúsculas
    st.g = appData.find(grado => grado.id.toLowerCase() === idGrado);
    
    if (st.g) {
        st.g.b.forEach((bim, index) => { bim.l = !datosUsuario.bimestres.includes(index); });
        rB();
    } else {
        // Si sigue fallando, la alerta te dirá EXACTAMENTE qué leyó en Firebase
        alert("Grado no encontrado. Firebase envió: '" + datosUsuario.grado + "'"); 
        cerrarSesion();
    }
}

function cerrarSesion() { localStorage.removeItem('sesionInformatica'); window.location.reload(); }
