const g2_b1 = [
 {t:"Semana 1: Iconos, Apps y Orden", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diferenciar aplicaciones y organizar nuestra pantalla de inicio.</p><p><strong>📖 Explicación:</strong><br>Tu pantalla es como tu pupitre. Si está desordenada, no encuentras nada.<br><b>Iconos:</b> Son los cuadritos pequeños (Apps).<br><b>Widgets:</b> Son los cuadros grandes que muestran información (como el reloj grande).<br>Podemos moverlos para tener todo ordenado.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Mantén el dedo presionado sobre un ícono hasta que vibre o se mueva.<br>2. Sin soltar el dedo, arrástralo a otro lugar.<br>3. Intenta juntar todas las apps de juegos en una esquina.</p>", 
  a1:{t:"El Organizador", d:"Mueve todos los juegos a una página y las apps de estudio a otra página distinta."}, 
  a2:{t:"Reto de Color", d:"Intenta agrupar 4 iconos que sean del mismo color (ej: WhatsApp, Teléfono y Mapas son verdes)."}, 
  v:"organizar pantalla inicio android"},
 {t:"Semana 2: La Captura (Screenshot)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Tomar una foto de lo que está pasando en nuestra pantalla.</p><p><strong>📖 Explicación:</strong><br>A veces ves algo en internet o una tarea y quieres guardarla rápido. Para eso sirve el 'Screenshot'. Es como si el celular se tomara una selfie a sí mismo.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Identifica los botones.<br>2. Presiona <b>Apagar + Bajar Volumen</b> al mismo tiempo (¡Clic!).<br>3. Verás un parpadeo en la pantalla. ¡Ya la capturaste!<br>4. Ve a tu Galería para verla.</p>", 
  a1:{t:"Reto Visual", d:"El profesor pondrá una imagen bonita en la pizarra digital. Tú debes capturarla con tu cámara y LUEGO hacerle captura de pantalla a esa foto."}, 
  a2:{t:"Recorte Rápido", d:"Toma una captura de una página web y usa la herramienta de edición inmediata para recortar solo el título."}, 
  v:"como hacer captura de pantalla"},
 {t:"Semana 3: Grabadora de Voz", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar el micrófono para grabar tareas, entrevistas o ideas.</p><p><strong>📖 Explicación:</strong><br>A veces es más rápido hablar que escribir. La grabadora de voz nos permite guardar sonidos. Los periodistas usan esto para entrevistar personas. Hoy seremos periodistas.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Busca la app 'Grabadora'.<br>2. Presiona el botón rojo 🔴 para empezar.<br>3. Habla cerca del micrófono (en la parte de abajo del cel).<br>4. Presiona el cuadrado ⏹️ para terminar y ponle nombre a tu audio.</p>", 
  a1:{t:"Locutor de Radio", d:"Graba un mensaje de bienvenida: 'Hola, estás escuchando la radio de 2do grado'. Escúchalo después."}, 
  a2:{t:"Adivina el Sonido", d:"Graba un sonido misterioso (golpear la mesa, cerrar un libro) y haz que tu amigo adivine qué es solo escuchando."}, 
  v:"usar grabadora voz celular"},
 {t:"Semana 4: Fotos con Temporizador", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Tomar fotos donde nosotros también salgamos sin tener el celular en la mano.</p><p><strong>📖 Explicación:</strong><br>¿Quieres salir en la foto familiar pero nadie puede tomar la foto? Usa el <b>Temporizador</b>. Es un reloj de cuenta atrás (3, 2, 1...) que te da tiempo de correr y ponerte en la foto.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre la cámara.<br>2. Busca el ícono de un relojito ⏱️. Elige '5 segundos'.<br>3. Apoya el celular en un lugar seguro (contra unos libros).<br>4. Presiona el botón y corre a posar.</p>", 
  a1:{t:"Selfie sin Manos", d:"Pon el temporizador, apoya el celular y posa saludando con ambas manos (demostrando que no tocas el cel)."}, 
  a2:{t:"Foto Grupal", d:"Júntate con 2 amigos. Pongan el cel lejos y traten de salir los 3 en la foto haciendo una mueca divertida."}, 
  v:"como usar temporizador camara celular"},
 {t:"Semana 5: El Reloj (Alarmas y Cronómetro)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar el celular para medir nuestro tiempo de estudio.</p><p><strong>📖 Explicación:</strong><br>El celular tiene un reloj muy poderoso.<br><b>Alarma:</b> Para despertar o recordar algo importante.<br><b>Cronómetro:</b> Para medir cuánto tardamos en correr o hacer la tarea.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre la app Reloj.<br>2. Ve a 'Cronómetro' y dale 'Iniciar'.<br>3. Escribe en tu cuaderno los números del 1 al 20.<br>4. Dale 'Pausar' cuando termines. ¿Cuánto tardaste?</p>", 
  a1:{t:"Carrera de Números", d:"Usa el cronómetro. Intenta escribir tu nombre completo en menos de 10 segundos."}, 
  a2:{t:"El Recordatorio", d:"Configura una alarma para dentro de 2 minutos. Sigue trabajando hasta que suene y te avise."}, 
  v:"app reloj android niños"},
 {t:"Semana 6: Calculadora Trucada", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar la calculadora para VERIFICAR (no para hacer trampa).</p><p><strong>📖 Explicación:</strong><br>La calculadora es una herramienta inteligente. No la usamos para que haga la tarea por nosotros, sino para <b>comprobar</b> si nuestra mente hizo bien la cuenta. Es como un juez.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Escribe en tu cuaderno: 15 + 15 = ?<br>2. Resuélvelo con tu mente.<br>3. Abre la Calculadora en el celular.<br>4. Escribe 15 + 15 y dale al igual (=). ¿Te salió lo mismo?</p>", 
  a1:{t:"Profe Digital", d:"El profesor pondrá 3 sumas. Resuélvelas y ponte un 'chequecito' ✅ o una 'X' usando la calculadora del celular para corregirte."}, 
  a2:{t:"Cifras Grandes", d:"Escribe tu año de nacimiento y súmale el año actual. ¿Qué número sale? (Curiosidad matemática)."}, 
  v:"trucos calculadora celular"},
 {t:"Semana 7: Dictado por Voz", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Dictarle al celular para que escriba por nosotros.</p><p><strong>📖 Explicación:</strong><br>¿Te cansaste de escribir con los dedos? El teclado tiene un micrófono pequeño. Si lo tocas y hablas claro y despacio, ¡el celular escribe lo que dices! Se llama <b>Dictado por voz</b>.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre la app de Notas.<br>2. Saca el teclado. Busca el micrófono chiquito 🎙️.<br>3. Tócalo y di: 'Hola, soy un estudiante inteligente'.<br>4. Mira cómo aparecen las letras mágicamente.</p>", 
  a1:{t:"Carta Hablada", d:"Dicta un mensaje corto para tu mejor amigo. Revisa si escribió bien su nombre."}, 
  a2:{t:"Trabalenguas", d:"Intenta dictarle un trabalenguas al celular (ej: 'Pablito clavó un clavito'). ¿Lo escribió bien o se equivocó?"}, 
  v:"dictado por voz google docs"},
 {t:"Semana 8: Proyecto Reportero", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar cámara, micrófono y postura para entrevistar.</p><p><strong>📖 Explicación:</strong><br>Un reportero usa su dispositivo para informar al mundo. Hoy serás uno. Tienes que grabar una mini-entrevista a un compañero usando todo lo que aprendiste (cámara estable y voz clara).</p><p><strong>🛠️ Manos a la obra (Instrucciones):</strong><br>1. Elige a un compañero.<br>2. Hazle una pregunta interesante (Ej: '¿Cuál es tu comida favorita y por qué?').<br>3. Sostén el celular firme con las dos manos.<br>4. Graba la respuesta en video.</p>", 
  a1:{t:"La Entrevista", d:"Graba el video y muéstralo. Debe escucharse bien la voz del entrevistado."}, 
  a2:{t:"Edición Simple", d:"Si te animas, usa el editor de la galería para recortar el principio y el final del video donde no hablan."}, 
  v:"periodismo para niños escolar"}
];

// === GRADO 2 - BIMESTRE 2: Escritura ===
const g2_b2 = [
 {t:"Semana 1: Conociendo el Teclado", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender la distribución QWERTY y la importancia de utilizar ambas manos al digitar.</p><p><strong>📖 Explicación detallada:</strong><br>Si observas el teclado de tu dispositivo, notarás que las letras no están ordenadas como en el alfabeto (A, B, C...). El teclado utiliza un diseño llamado 'QWERTY', nombrado así por las primeras seis letras de su fila superior.<br><br>Este diseño fue creado hace más de 100 años para las máquinas de escribir mecánicas, con el objetivo de separar las letras que más se usan en el idioma y evitar que las piezas se atascaran. Aunque hoy usamos pantallas táctiles, el diseño se mantuvo. Para escribir con agilidad y profesionalismo, es fundamental utilizar ambas manos, asignando el lado izquierdo del teclado a la mano izquierda y el lado derecho a la mano derecha. Escribir con un solo dedo retrasa enormemente el trabajo.</p>", 
  a1:{t:"Exploración Visual", d:"Observa tu teclado y localiza dónde están distribuidas las vocales (A, E, I, O, U). Abre un documento y escríbelas en orden."}, 
  a2:{t:"División de Manos", d:"Intenta escribir tu nombre utilizando únicamente la mano izquierda. Luego, presiona enter y escribe tu apellido utilizando exclusivamente la mano derecha."}, 
  v:"aprender a escribir en teclado niños"},
 {t:"Semana 2: Barra Espaciadora y Enter", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar las teclas de estructura básica para separar palabras y crear nuevos párrafos.</p><p><strong>📖 Explicación detallada:</strong><br>Escribir no consiste solo en poner letras juntas; la legibilidad depende de los espacios. La tecla más larga del teclado, situada en la parte inferior, se llama 'Barra Espaciadora'. Su única función es insertar un espacio en blanco para separar una palabra de la siguiente.<br><br>Por otro lado, la tecla 'Enter' (o Intro), que suele estar representada por una flecha curva o un botón de color en la esquina inferior derecha, funciona como un retorno de carro. Al presionarla, le indicas al procesador de texto que has terminado un párrafo y deseas mover el cursor al inicio del siguiente renglón hacia abajo. Estas dos teclas son las responsables de darle estructura y orden a cualquier documento escrito.</p>", 
  a1:{t:"Oraciones Claras", d:"Escribe la oración: 'El sistema funciona rápido'. Asegúrate de presionar la barra espaciadora una sola vez entre cada palabra para evitar espacios dobles."}, 
  a2:{t:"Lista en Columna", d:"Escribe los números del 1 al 5 en texto (Uno, Dos, Tres...). Presiona la tecla Enter después de cada palabra para que queden alineados verticalmente, uno debajo del otro."}, 
  v:"tecla enter y espacio celular"},
 {t:"Semana 3: Mayúsculas y Shift", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar correctamente el uso de letras mayúsculas mediante la tecla Shift.</p><p><strong>📖 Explicación detallada:</strong><br>Las reglas ortográficas exigen el uso de mayúsculas al inicio de cada oración y en todos los nombres propios (personas, ciudades, países). Para lograr esto en el teclado, utilizamos la tecla 'Shift', que normalmente se representa con una flecha apuntando hacia arriba (⬆️).<br><br>Al tocar la flecha una vez, el teclado cambiará visualmente todas las letras a mayúsculas. Solo la primera letra que presiones aparecerá en grande; luego, el teclado regresará automáticamente a minúsculas. Si necesitas escribir un título completo en mayúsculas sostenidas, debes tocar la flecha dos veces rápidamente para activar el 'Bloqueo de Mayúsculas' (Caps Lock). Sabrás que está activo porque la flecha se quedará subrayada o iluminada.</p>", 
  a1:{t:"Nombres Propios", d:"Escribe tu nombre completo, el de tu profesor y el nombre de tu ciudad. Aplica la tecla Shift correctamente para capitalizar la primera letra de cada palabra."}, 
  a2:{t:"Bloqueo Activado", d:"Activa el bloqueo de mayúsculas (doble toque en la flecha) y escribe la frase: 'PELIGRO: ALTO VOLTAJE'. Luego, desactiva el bloqueo."}, 
  v:"uso de mayusculas teclado android"},
 {t:"Semana 4: Borrar Errores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar la tecla de retroceso (Backspace) para corregir fallos tipográficos de manera eficiente.</p><p><strong>📖 Explicación detallada:</strong><br>Incluso los digitadores más experimentados cometen errores de tipeo. La ventaja del formato digital sobre el papel es que podemos corregir los fallos sin dejar tachones ni marcas sucias en el documento.<br><br>La herramienta para esto es la tecla de Retroceso, representada generalmente por una flecha que apunta hacia la izquierda con una equis en su interior (⌫). Al presionar esta tecla, el cursor elimina el carácter que se encuentra inmediatamente a su izquierda. Es crucial usar esta tecla con precisión; si la mantienes presionada continuamente, el sistema comenzará a borrar palabras completas y párrafos enteros a gran velocidad, lo que podría resultar en la pérdida de información importante.</p>", 
  a1:{t:"Corrección Puntual", d:"Escribe la palabra 'Computadoora' (con doble o). Posiciona el cursor al final de la palabra y usa la tecla de retroceso para eliminar únicamente la vocal sobrante."}, 
  a2:{t:"Reescribir", d:"Escribe una oración completa con faltas de ortografía a propósito. Luego, sitúa el cursor al final y borra la oración entera letra por letra para volver a escribirla correctamente."}, 
  v:"borrar texto en celular"},
 {t:"Semana 5: Los Números", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Alternar las vistas del teclado para acceder a los caracteres numéricos.</p><p><strong>📖 Explicación detallada:</strong><br>El teclado principal de un dispositivo móvil está optimizado para mostrar letras, ya que es lo que más utilizamos. Sin embargo, para redactar fechas, cantidades, edades o datos matemáticos, necesitamos acceder a los números.<br><br>Dado que la pantalla es pequeña y no caben todas las teclas al mismo tiempo, los sistemas operativos utilizan teclados secundarios. Para acceder a él, debes localizar y presionar la tecla de cambio de panel, usualmente marcada como '?123' o '123', ubicada en la esquina inferior izquierda. Al tocarla, el panel de letras será reemplazado por un panel numérico completo, similar al de una calculadora, permitiéndote ingresar datos exactos de forma rápida y profesional.</p>", 
  a1:{t:"Datos Personales", d:"Abre el teclado numérico y escribe con exactitud tu edad, el día de tu cumpleaños y el año en que naciste, separados por espacios."}, 
  a2:{t:"Operación Aritmética", d:"Mantente en el teclado numérico y redacta la ecuación matemática '5 + 5 = 10', localizando también los símbolos de suma e igual."}, 
  v:"teclado numerico celular niños"},
 {t:"Semana 6: Signos de Puntuación", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar e insertar los signos de interrogación y exclamación para dar entonación al texto.</p><p><strong>📖 Explicación detallada:</strong><br>El texto digital carece de tono de voz; el lector no puede saber si estás preguntando, afirmando o gritando a menos que utilices los signos de puntuación adecuados. Estos símbolos son esenciales para la claridad del mensaje escrito.<br><br>Al igual que los números, los signos de interrogación (¿?) y exclamación (¡!) se encuentran en los paneles secundarios del teclado. En el idioma español, es una regla ortográfica estricta utilizar tanto el signo de apertura al inicio de la oración como el de cierre al final. Omitir el signo de apertura es considerado un error ortográfico y resta profesionalismo a cualquier documento o comunicación formal.</p>", 
  a1:{t:"La Entrevista", d:"Redacta la pregunta: '¿A qué hora termina la clase de informática?' verificando que incluyes los signos de apertura y cierre correctamente."}, 
  a2:{t:"Alerta Visual", d:"Escribe la frase: '¡Atención, examen sorpresa!' utilizando los signos de exclamación para enfatizar la urgencia del mensaje."}, 
  v:"escribir simbolos teclado celular"},
 {t:"Semana 7: Dictado por Voz", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar la herramienta de reconocimiento de voz para convertir lenguaje hablado en texto digital.</p><p><strong>📖 Explicación detallada:</strong><br>La tecnología moderna cuenta con sistemas de Inteligencia Artificial capaces de escuchar tu voz, analizar los fonemas y transcribirlos automáticamente a texto escrito en tu documento. Esta función se conoce como 'Dictado por Voz' o 'Voice to Text'.<br><br>Para activarlo, debes buscar el ícono de un pequeño micrófono situado en el propio teclado (es importante no confundirlo con el botón de grabar notas de audio de las aplicaciones de mensajería). Al activarlo, el dispositivo comenzará a escuchar. Para que el sistema funcione con precisión, es necesario hablar con un volumen adecuado, vocalizar claramente cada palabra y evitar lugares con mucho ruido de fondo, ya que el micrófono podría confundir tus palabras con los sonidos del ambiente.</p>", 
  a1:{t:"Transcripción Básica", d:"Activa el micrófono del teclado y dicta la siguiente frase de forma clara y pausada: 'La tecnología facilita nuestro trabajo diario'. Revisa la pantalla para comprobar la exactitud del texto."}, 
  a2:{t:"Prueba de Ruido", d:"Intenta dictar un párrafo corto mientras simulas ruido de fondo (como golpear suavemente la mesa). Observa cómo el nivel de precisión del sistema disminuye cuando el audio no es claro."}, 
  v:"dictado por voz celular"},
 {t:"Semana 8: Mi Pequeño Cuento", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar todas las funciones del teclado en la redacción de un texto continuo y estructurado.</p><p><strong>📖 Explicación detallada:</strong><br>El objetivo final de dominar el teclado es poder transmitir ideas de manera fluida y sin que la tecnología suponga un obstáculo. Escribir un párrafo completo requiere aplicar simultáneamente todas las reglas aprendidas: el uso de la tecla Shift para las mayúsculas iniciales, la barra espaciadora para la separación correcta de palabras, los signos de puntuación para la entonación y la tecla Enter para la estructura del documento.<br><br>Este ejercicio de integración servirá para evaluar la agilidad de los dedos sobre la pantalla y la capacidad para corregir errores sobre la marcha utilizando la tecla de retroceso, garantizando un resultado final limpio y formal.</p>", 
  a1:{t:"Redacción Libre", d:"Escribe una historia breve de tres líneas sobre una aventura tecnológica. Asegúrate de iniciar con mayúscula y finalizar con un punto y aparte."}, 
  a2:{t:"Revisión Ortográfica", d:"Lee tu historia detenidamente de principio a fin. Si identificas una letra incorrecta o la ausencia de una tilde, posiciona el cursor en el lugar exacto y aplica la corrección requerida."}, 
  v:"escribir cuentos en digital niños"}
];
  
  // === GRADO 2 - BIMESTRE 3: Artista ===
const g2_b3 = [
 {t:"Semana 1: El Lienzo Digital", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Conocer las diferencias entre dibujar en papel y dibujar en una pantalla táctil.</p><p><strong>📖 Explicación detallada:</strong><br>Dibujar en una pantalla es muy diferente a dibujar en un papel. Cuando usas crayones reales, si te equivocas es difícil borrar sin dañar la hoja. En el arte digital, la pantalla se convierte en un 'Lienzo', que es un espacio de trabajo infinito e indestructible.<br><br>Al abrir una aplicación de dibujo digital (como Sketchbook, Paint o IbisPaint), lo primero que verás es una gran área blanca central y muchas herramientas a los lados. La pantalla registra el calor y el movimiento de tus dedos con muchísima precisión. Además, no necesitas presionar fuerte contra el vidrio; un toque suave es suficiente para que los sensores de la tablet o celular comiencen a dibujar píxeles de colores.</p>", 
  a1:{t:"Exploración Inicial", d:"Abre la aplicación de dibujo. Toca suavemente la pantalla blanca y desliza tu dedo de lado a lado para entender cuán rápido reacciona la línea a tu movimiento."}, 
  a2:{t:"Las Herramientas", d:"Busca el menú donde aparecen diferentes tipos de puntas (lápiz, marcador, crayón). Toca uno diferente cada vez y haz una línea para ver cómo cambian los trazos."}, 
  v:"aplicacion dibujo digital niños"},
 {t:"Semana 2: El Grosor del Pincel", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Configurar el tamaño y la opacidad de nuestras herramientas para lograr diferentes efectos artísticos.</p><p><strong>📖 Explicación detallada:</strong><br>En la vida real, si quieres hacer una línea más gruesa, necesitas cambiar de un lápiz a un marcador. En el mundo digital, el mismo pincel puede tener cien tamaños diferentes. <br><br>Todas las herramientas de arte tienen una barra de configuración de 'Tamaño' (o Grosor) y otra de 'Opacidad'. El tamaño indica cuántos píxeles pintará a la vez: si es bajo (ej. 2px) hará un hilo delgado; si es alto (ej. 50px) hará un trazo ancho ideal para rellenar. La Opacidad, por otro lado, significa qué tan transparente es la tinta. Una opacidad del 100% será un color sólido, mientras que una del 30% parecerá una acuarela suave por la que se puede ver el fondo blanco.</p>", 
  a1:{t:"Líneas Finas y Gruesas", d:"Selecciona la herramienta de marcador. Haz una línea con el tamaño al mínimo, luego súbelo a la mitad para otra línea, y finalmente súbelo al máximo para la última."}, 
  a2:{t:"Trazos Fantasma", d:"Baja la opacidad de tu herramienta al 20% y haz una línea. Fíjate cómo parece transparente o desvanecida en comparación con una normal."}, 
  v:"tamaño y opacidad dibujo digital"},
 {t:"Semana 3: Bote de Pintura (Relleno)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar herramientas de relleno inteligente para colorear grandes áreas en un segundo.</p><p><strong>📖 Explicación detallada:</strong><br>Colorear el cielo en una hoja de papel puede llevarte diez minutos usando un crayón azul. En el arte digital, existe una herramienta increíble llamada 'Bote de pintura' o Relleno. Su ícono siempre es un balde de pintura derramándose.<br><br>Esta herramienta usa inteligencia matemática. Cuando tocas un lugar de la pantalla, el programa detecta todos los píxeles blancos conectados y los pinta del color que elegiste en un milisegundo. ¡Pero hay una regla vital! La figura que quieres rellenar debe estar completamente 'cerrada' por una línea negra. Si el círculo o cuadrado que dibujaste tiene un agujero pequeñito, la pintura digital se 'escapará' por ese hueco e inundará todo tu lienzo.</p>", 
  a1:{t:"Figuras Cerradas", d:"Dibuja un círculo asegurándote de que la línea se cierre completamente. Selecciona el bote de pintura, elige color rojo y toca el centro del círculo."}, 
  a2:{t:"La Fuga de Pintura", d:"Dibuja un cuadrado, pero deja una esquina abierta a propósito. Usa el bote de pintura adentro y mira cómo el color inunda toda la pantalla (Luego usa la flecha de deshacer)."}, 
  v:"herramienta relleno dibujo digital"},
 {t:"Semana 4: El Botón de Deshacer", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar la flecha de retroceso histórico para corregir errores sin utilizar el borrador clásico.</p><p><strong>📖 Explicación detallada:</strong><br>La herramienta más poderosa de cualquier artista digital no es un pincel, es el botón 'Deshacer' (Undo). Es una flecha que apunta hacia la izquierda y curva hacia atrás. <br><br>A diferencia de un borrador tradicional (que borra tanto lo que hiciste mal como lo que estaba bien debajo de ello), el botón Deshacer hace que la computadora viaje en el tiempo exactamente un segundo antes de que hicieras el trazo incorrecto. Si haces una línea chueca que atraviesa un dibujo perfecto, no uses el borrador para arreglarlo, porque borrarás el dibujo perfecto. Simplemente presiona 'Deshacer' y la línea mala desaparecerá como si nunca hubiera existido, dejando lo demás intacto.</p>", 
  a1:{t:"Viaje en el Tiempo", d:"Haz un dibujo de una casa. Luego, tacha la casa con una línea fea a propósito. No uses el borrador; presiona la flecha 'Deshacer' para salvar tu casa."}, 
  a2:{t:"El Borrador", d:"Ahora usa la herramienta del Borrador y pásala por la casa. Nota la diferencia: el borrador hace un agujero blanco y borra todo, el deshacer solo quita tu última acción."}, 
  v:"boton deshacer dibujo"},
 {t:"Semana 5: Figuras Geométricas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Dibujar líneas y círculos perfectos utilizando las herramientas de ayuda del programa.</p><p><strong>📖 Explicación detallada:</strong><br>Hacer un círculo perfectamente redondo a mano alzada es casi imposible. Las aplicaciones de diseño incluyen una sección de 'Reglas' o 'Formas'. Esta herramienta le da asistencia matemática a tus dedos.<br><br>Al activar la regla de círculo o de línea recta, sin importar si tu dedo tiembla, el sistema forzará a los píxeles a dibujarse en una trayectoria perfecta. Esto es sumamente útil cuando estamos dibujando edificios, llantas de autos, soles o cualquier elemento que requiera una simetría exacta. Solo debes seleccionar la forma deseada, colocar tu dedo en la pantalla y arrastrarlo para decidir qué tan grande quieres que sea la figura.</p>", 
  a1:{t:"El Robot Perfecto", d:"Busca la herramienta de 'Formas' o 'Regla'. Selecciona la línea recta y dibuja un cuadrado sin levantar el dedo, comprobando que las líneas salgan sin temblar."}, 
  a2:{t:"Círculos de Tamaño", d:"Elige la forma de círculo y dibuja tres círculos: uno pequeño, uno mediano y uno muy grande."}, 
  v:"figuras geometricas dibujo digital"},
 {t:"Semana 6: La Paleta de Colores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Encontrar y mezclar colores precisos en la rueda cromática digital (Anillo de Color).</p><p><strong>📖 Explicación detallada:</strong><br>Un paquete de crayones reales tiene unos 24 colores. ¡La paleta digital tiene más de 16 millones de colores diferentes! Para no perdernos, los colores están organizados en un 'Anillo o Rueda Cromática'.<br><br>Funciona en dos pasos: El anillo exterior sirve para elegir la familia del color (ejemplo: si quieres que sea de la familia del Azul). El cuadrado o triángulo interior sirve para elegir la 'luminosidad y saturación' de ese color. Si tocas la parte alta, el azul será brillante como el cielo; si tocas la parte baja, será azul oscuro como el fondo del mar; y si te vas a los bordes, se volverá grisáceo o totalmente blanco. Con esto, nunca te faltará el color exacto para la piel o para las sombras.</p>", 
  a1:{t:"Giro de Color", d:"Toca el círculo de colores. Mueve el selector en el anillo exterior hacia el verde. Luego, en el cuadro interior, busca el verde más brillante posible para pintar."}, 
  a2:{t:"De Claro a Oscuro", d:"Elige el color Rojo. Haz un trazo con un rojo muy claro (casi rosado), otro con rojo normal y un tercer trazo con rojo muy oscuro (casi negro o vino)."}, 
  v:"rueda de colores dibujo digital"},
 {t:"Semana 7: Escribir en mi Dibujo", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Insertar letras mecanografiadas dentro del lienzo de arte.</p><p><strong>📖 Explicación detallada:</strong><br>A veces necesitamos ponerle un título a nuestro dibujo, escribir un mensaje si es una tarjeta, o firmar con nuestro nombre. Podemos intentar hacerlo con el pincel como si fuera un bolígrafo, pero las letras podrían salir torcidas.<br><br>Es mucho mejor usar la herramienta de 'Texto', que generalmente tiene el ícono de una letra 'T'. Al tocar la pantalla, aparecerá un teclado. Lo que escribamos se insertará en el lienzo como una caja de texto con letras perfectas, claras y fáciles de leer. A estas letras también podemos cambiarles el color y el tamaño para que combinen con la obra de arte que hemos dibujado debajo.</p>", 
  a1:{t:"Mi Firma", d:"Realiza un dibujo rápido. Busca la herramienta de Texto ('T'), toca una esquina y escribe tu nombre para firmar la obra como un artista real."}, 
  a2:{t:"El Título", d:"Escribe el nombre de tu dibujo en la parte de arriba, con un color que contraste (ej: si el cielo es azul oscuro, usa letras amarillas o blancas)."}, 
  v:"texto en app de dibujo"},
 {t:"Semana 8: Mi Obra de Arte", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar todas las técnicas combinadas y exportar el proyecto final a la galería del dispositivo.</p><p><strong>📖 Explicación detallada:</strong><br>El proceso artístico digital se consolida cuando combinamos el pincel libre, las formas geométricas, la paleta de colores avanzada y el relleno rápido. Esta semana es el examen práctico de la unidad.<br><br>Al finalizar una obra, es necesario guardarla en la galería del celular (exportarla). A diferencia del papel, el dibujo digital no existe físicamente, son solo datos en la memoria de la aplicación. Para que los demás puedan ver tu obra, debes ir al menú principal y seleccionar 'Guardar como imagen' o 'Guardar PNG'. Esto creará una copia permanente de tu pintura en la sección de Fotos de tu equipo, lista para ser compartida.</p>", 
  a1:{t:"Creación Final", d:"Dibuja un paisaje completo usando líneas rectas para casas, la herramienta de círculo para el sol y el bote de pintura para llenar el cielo y el pasto. ¡Usa deshacer si te equivocas!"}, 
  a2:{t:"Guardado y Envío", d:"Busca la opción de guardar en tu aplicación, exporta tu dibujo a la galería y ábrelo desde allí para asegurarte de que se guardó correctamente."}, 
  v:"guardar dibujo digital galeria"}
];
  
  // === GRADO 2 - BIMESTRE 4: IA Voz ===
const g2_b4 = [
 {t:"Semana 1: ¿Qué es un Asistente de Voz?", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Comprender el concepto de los asistentes virtuales integrados en los dispositivos modernos.</p><p><strong>📖 Explicación detallada:</strong><br>Hace años, la única forma de darle una instrucción a una computadora era escribiendo en un teclado o moviendo un ratón. Hoy en día, gracias a la Inteligencia Artificial, las máquinas tienen 'oídos digitales'.<br><br>Un Asistente de Voz es un programa de IA diseñado para escuchar el lenguaje humano, entender lo que pedimos y respondernos con una voz sintética (robótica pero que suena natural). Los más famosos son Siri (de Apple), Google Assistant y Alexa (de Amazon). Estos asistentes están dormidos hasta que escuchan su 'Palabra de activación' (como 'Hey Google'). Al decir esas palabras mágicas, el micrófono se enciende, graba tu voz, la envía a la nube, la procesa y te devuelve una respuesta en segundos.</p>", 
  a1:{t:"Palabras Mágicas", d:"Haz una lista en tu cuaderno de las 3 'palabras de activación' más famosas para despertar a los asistentes virtuales."}, 
  a2:{t:"Prueba de Despertar", d:"Toma un celular o tablet e intenta despertarlo diciendo claramente 'Hey Google' u 'Oye Siri' sin tocar la pantalla."}, 
  v:"que es alexa o siri explicacion niños"},
 {t:"Semana 2: Hablarle a la Máquina", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Pronunciar claramente y formular oraciones precisas para que el sistema de reconocimiento de voz (NLP) funcione.</p><p><strong>📖 Explicación detallada:</strong><br>El cerebro humano es increíble: si tú hablas muy rápido, con la boca medio cerrada o con mucho ruido alrededor, tu profesor igual puede entenderte. Pero la IA no es tan lista. Utiliza un sistema llamado Procesamiento de Lenguaje Natural (NLP por sus siglas en inglés).<br><br>El NLP convierte el sonido de tu voz en letras escritas dentro de su memoria. Si balbuceas, la máquina escribirá letras al azar y te dirá: 'No te he entendido'. Para usar un asistente de voz correctamente, debemos hablar como locutores de radio: con un volumen fuerte, pronunciando cada palabra claramente y dejando un pequeño espacio de silencio entre una palabra y otra. La máquina necesita claridad total.</p>", 
  a1:{t:"Dicción Clara", d:"Lee una oración de tu libro de texto en voz alta frente a tus compañeros, asegurándote de pronunciar fuertemente cada consonante."}, 
  a2:{t:"Dictado Exacto", d:"Abre una app de notas, activa el micrófono del teclado y dicta una frase. Revisa si la máquina escribió exactamente lo que dijiste o si se confundió."}, 
  v:"procesamiento de lenguaje natural facil"},
 {t:"Semana 3: Preguntas Inteligentes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Formular consultas de búsqueda cerradas y directas para obtener la información deseada rápidamente.</p><p><strong>📖 Explicación detallada:</strong><br>Los asistentes de voz están conectados a todo el internet, pero no son buenos para mantener una charla larga o filosófica. Si le preguntas: '¿Crees que lloverá algún día?', la IA se confundirá. Tienes que ser directo y específico.<br><br>Las mejores preguntas son las que tienen respuestas exactas: '¿Cuál es la capital de Francia?', '¿Cuánto es 15 por 4?', '¿Qué clima hará hoy a las 3 de la tarde?'. La IA tomará las palabras clave (Capital, Francia, Clima, Hoy), buscará en bases de datos confiables y te leerá en voz alta el resultado exacto, ahorrándote el tiempo de abrir el navegador y leer páginas web.</p>", 
  a1:{t:"El Cuestionario", d:"Escribe en tu cuaderno 3 preguntas muy claras y directas que podrías hacerle a la Inteligencia Artificial sobre animales o historia."}, 
  a2:{t:"La Prueba", d:"Usa el asistente de voz de tu dispositivo, hazle una de tus preguntas en voz alta y escucha atentamente su respuesta automática."}, 
  v:"como hacerle preguntas a google assistant"},
 {t:"Semana 4: Recordatorios y Temporizadores", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Utilizar comandos de voz para programar herramientas de productividad y gestión del tiempo.</p><p><strong>📖 Explicación detallada:</strong><br>El uso más práctico de los asistentes virtuales en la vida diaria no es responder trivias, sino organizarnos. Como están conectados al reloj interno del dispositivo, podemos pedirles que manipulen el tiempo por nosotros sin tener que tocar la pantalla.<br><br>Podemos usar el comando 'Pon un temporizador de 5 minutos', lo cual es perfecto para medir tiempos de estudio o de un juego. También podemos usar 'Recuérdame hacer la tarea a las 4 de la tarde'. La IA guardará esta instrucción en la memoria RAM del celular y, exactamente a esa hora, encenderá una alarma y enviará una notificación con el texto de tu recordatorio. Es como tener un secretario robótico personal.</p>", 
  a1:{t:"Carrera contra el Reloj", d:"Despierta al asistente de tu tablet o celular y dile de forma clara: 'Pon un temporizador de 1 minuto'. Observa cómo el reloj empieza a contar en la pantalla."}, 
  a2:{t:"El Secretario", d:"Atrévete a programar el futuro: Dile a la IA 'Recuérdame guardar mis libros a las [hora en la que termina la clase]'. ¡Espera a que suene!"}, 
  v:"temporizadores y alarmas con asistente de voz"},
 {t:"Semana 5: Traducción Simultánea", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Romper barreras de idioma utilizando la capacidad de traducción instantánea de la IA.</p><p><strong>📖 Explicación detallada:</strong><br>Hace años, para entender a una persona de otro país necesitabas un diccionario pesado y buscar palabra por palabra. Hoy, la IA puede escuchar un idioma y hablar en otro casi al mismo tiempo.<br><br>Los servidores de Google o Apple contienen diccionarios completos de todos los idiomas del mundo. Si activas tu asistente de voz y le dices el comando '¿Cómo se dice [Palabra] en [Idioma]?', la IA conectará el sistema de reconocimiento de voz con su base de datos de traducción y el sintetizador de voz para leerte la respuesta. Incluso tienen un 'Modo Intérprete', donde el celular escucha una conversación y la va traduciendo en vivo para que dos personas de países diferentes puedan charlar fluidamente.</p>", 
  a1:{t:"El Traductor Robótico", d:"Pídele a tu asistente de voz: '¿Cómo se dice Buenas Noches en Francés?'. Repite la frase que la máquina te enseñe."}, 
  a2:{t:"Idiomas Raros", d:"Busca un idioma que no conozcas (como Japonés, Ruso o Alemán) y pregúntale a la IA cómo se dice tu animal favorito en ese idioma."}, 
  v:"traduccion en tiempo real google assistant"},
 {t:"Semana 6: Los Límites de la IA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Identificar que la tecnología no es infalible y reconocer cuándo la IA se equivoca o no sabe qué hacer.</p><p><strong>📖 Explicación detallada:</strong><br>Aunque pareciera que los asistentes lo saben todo, tienen grandes límites. Están diseñados por humanos y, por lo tanto, no son perfectos. Cuando le haces una pregunta muy complicada, un chiste difícil de entender o usas una palabra que no está en su diccionario, la IA sufrirá un 'error de procesamiento'.<br><br>Cuando esto pasa, el asistente suele decir frases de escape como 'No he entendido eso' o 'Aquí tienes un resultado de la web' (mostrándote un link de internet porque no supo leer la respuesta). Es importante saber que la IA no razona, solo asocia palabras. Si no encuentra la asociación correcta en su base de datos, simplemente se rinde. La mente humana sigue siendo muy superior en creatividad e imaginación.</p>", 
  a1:{t:"Confundir a la Máquina", d:"Inventa una palabra que no exista (ej: Papirusca) y pregúntale al asistente '¿Qué significa Papirusca?'. Mira cómo reacciona al no encontrarla."}, 
  a2:{t:"El Chiste", d:"Cuéntale una adivinanza inventada a la IA o hazle una pregunta ilógica (ej: '¿De qué color es el número 4?'). Anota su respuesta."}, 
  v:"errores de la inteligencia artificial graciosos"},
 {t:"Semana 7: Modales con las Máquinas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Reflexionar sobre la interacción humano-máquina y la importancia de mantener nuestros hábitos de cortesía.</p><p><strong>📖 Explicación detallada:</strong><br>Sabemos que la Inteligencia Artificial no tiene sentimientos, no se cansa, y no le importa si le gritas o si le dices 'Por favor' y 'Gracias'. Sin embargo, interactuar con asistentes de voz afecta nuestros hábitos psicológicos diarios.<br><br>Si nos acostumbramos a darle órdenes agresivas y directas a un aparato ('¡Pon música ya!', '¡Apaga la luz!'), nuestro cerebro se acostumbra a ese tono autoritario, y podríamos terminar hablándoles igual de mal a las personas reales que nos rodean. Los psicólogos y desarrolladores de IA recomiendan usar las palabras mágicas (por favor y gracias) incluso con las máquinas, no por respeto al robot, sino para mantener intacta nuestra propia educación y empatía humana.</p>", 
  a1:{t:"Análisis de Tono", d:"Di una instrucción con voz muy enojada y luego con voz amable. ¿La máquina respondió diferente? (Nota: no cambia, pero se siente diferente para ti)."}, 
  a2:{t:"Rutina de Cortesía", d:"Pídele a la IA de manera muy educada que te cuente un cuento. Al terminar, dile 'Muchas gracias'. Los asistentes modernos están programados para responder a los agradecimientos."}, 
  v:"hablar con educacion a los asistentes virtuales"},
 {t:"Semana 8: Proyecto: Entrevista a la IA", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Diseñar un cuestionario estructurado para interactuar fluidamente con un sistema de reconocimiento de voz.</p><p><strong>📖 Explicación detallada:</strong><br>Como evaluación final de esta unidad, pondrás a prueba tu capacidad de interactuar con el NLP (Procesamiento de Lenguaje Natural). Para que un periodista haga una buena entrevista, debe preparar sus preguntas; tú harás lo mismo con tu entrevistado digital.<br><br>Estructurarás una serie de comandos y preguntas combinando matemáticas, geografía, traducciones y temporizadores. Se evaluará tu dicción (qué tan claro hablas), tu rapidez mental para seguirle la charla a la IA si te responde con otra pregunta, y el uso correcto de las palabras de activación para encender el micrófono sin tocar el dispositivo táctil.</p>", 
  a1:{t:"El Guion de Entrevista", d:"Escribe en papel 5 preguntas de diferentes temas (una suma, un idioma, el clima, un chiste y la hora). Repásalas para decirlas sin tartamudear."}, 
  a2:{t:"La Entrevista Final", d:"Activa tu asistente virtual y hazle las 5 preguntas una tras otra. Evalúa si la IA aprobó tu examen respondiendo bien a todo o si falló en alguna."}, 
  v:"entrevista a inteligencia artificial niños"}
];

const g3_b1 = [
 {t:"Semana 1: Carpetas y Álbumes", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Organizar nuestra galería para no tener un desorden de fotos y encontrar las tareas rápido.</p><p><strong>📖 Explicación:</strong><br>Imagina que tiras todos tus cuadernos, juguetes y ropa en una sola pila gigante en el suelo. ¡Sería imposible encontrar algo! Lo mismo pasa en tu celular. La 'Galería' es como tu cuarto, y los <b>Álbumes</b> son los cajones donde guardamos cada cosa en su lugar.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Entra a la Galería.<br>2. Busca la pestaña 'Álbumes'.<br>3. Toca el signo de más (+).<br>4. Escribe el nombre: 'ESCUELA'.<br>5. Selecciona las fotos de tareas y muévelas ahí.</p>", 
  a1:{t:"El Clasificador", d:"Tienes 2 minutos para crear el álbum 'ESCUELA' y mover al menos 5 fotos de tareas antiguas ahí."}, 
  a2:{t:"Vida Personal", d:"Crea un álbum llamado 'FAMILIA' y mueve ahí las fotos de tus papás, hermanos o mascotas."}, 
  v:"organizar galeria android"},
 {t:"Semana 2: Edición I (Recortar)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Arreglar fotos que salieron chuecas o donde sobra espacio.</p><p><strong>📖 Explicación:</strong><br>A veces tomamos la foto y sale la mesa, el zapato del compañero o la hoja sale torcida. No podemos enviar eso al profesor; se ve desordenado. Usaremos la herramienta <b>Recortar</b> para quitar lo que sobra, como si usáramos tijeras digitales.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre una foto cualquiera.<br>2. Toca el botón 'Editar' ✏️.<br>3. Busca el ícono de Recortar.<br>4. Mueve las esquinas hacia adentro para quitar lo que sobra.<br>5. Usa la ruedita de abajo para enderezar.</p>", 
  a1:{t:"Cirugía de Foto", d:"Toma una foto de tu libro 'a propósito' muy chueca y donde salga tu pie. Luego edítala hasta que solo se vea el texto del libro, recto y perfecto."}, 
  a2:{t:"Formato Cuadrado", d:"Recorta una foto tuya en formato '1:1' (Cuadrado perfecto) como las que se usan en las fotos de perfil."}, 
  v:"como recortar fotos en celular"},
 {t:"Semana 3: Edición II (Brillo)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aclarar fotos oscuras para que se lean bien.</p><p><strong>📖 Explicación:</strong><br>Si tomas una foto en la tarde o lejos de la ventana, sale oscura. El profesor no tiene ojos de gato, así que necesitamos 'encender la luz' de la foto <i>después</i> de haberla tomado.<br><b>Brillo:</b> Sube la luz general.<br><b>Contraste:</b> Hace que las letras negras se vean más negras y el papel más blanco.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Ve a Editar ✏️ > Ajustes (ícono de un sol).<br>2. Sube el Brillo hasta que se vea clara.<br>3. Sube un poco el Contraste.<br>4. ¡Mira la diferencia!</p>", 
  a1:{t:"Rescate Fotográfico", d:"Toma una foto debajo de tu escritorio (donde está oscuro). Usa las herramientas para que parezca que la tomaste con la luz encendida."}, 
  a2:{t:"Filtros Mágicos", d:"Prueba poner la foto en 'Blanco y Negro' usando los filtros del editor para darle un toque artístico."}, 
  v:"editar brillo fotos celular"},
 {t:"Semana 4: Marcado en Fotos", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Escribir o dibujar sobre una foto para señalar algo importante.</p><p><strong>📖 Explicación:</strong><br>A veces necesitas rodear una respuesta en una foto o poner una flecha para que el profesor vea algo específico. No necesitas imprimir la foto para rayarla con marcador, ¡puedes hacerlo digitalmente!</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Ve a Editar ✏️ > Garabato / Lápiz / Marcado.<br>2. Elige un color llamativo (Rojo es el mejor para corregir).<br>3. Dibuja con tu dedo sobre la foto.</p>", 
  a1:{t:"El Maestro", d:"Toma una foto a un dibujo de tu libro. Usa la herramienta de marcado para rodear con un círculo rojo la parte más importante."}, 
  a2:{t:"Firma Digital", d:"Toma una foto a tu tarea y escribe tu nombre encima de la hoja usando el lápiz digital de colores."}, 
  v:"dibujar sobre fotos android"},
 {t:"Semana 5: Google Lens", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Usar la cámara para investigar cosas que no sabemos cómo se llaman.</p><p><strong>📖 Explicación:</strong><br>Google Lens es como un ojo inteligente o una lupa mágica. Tú le muestras algo (una flor, un perro, un zapato) y él busca en internet qué es. ¡Ya no necesitas escribir para buscar!</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Busca el ícono de <b>Lens</b> (una camarita de colores) en la barra de Google o en tu cámara.<br>2. Apunta a un objeto desconocido.<br>3. Toca la lupa 🔍 para buscar.<br>4. Lee los resultados.</p>", 
  a1:{t:"Investigador Natural", d:"Sal al patio, escanea una planta u hoja con Lens. ¿Cómo se llama según Google?"}, 
  a2:{t:"Traductor Visual", d:"Escanea un texto en inglés de un libro y usa el botón 'Traducir' de Lens para leerlo en español."}, 
  v:"trucos google lens estudiantes"},
 {t:"Semana 6: Checklists (Listas)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Hacer listas de tareas que podemos ir marcando.</p><p><strong>📖 Explicación:</strong><br>¿Olvidas tus tareas o lo que tienes que llevar a la escuela? Las <b>Listas de Verificación</b> son listas inteligentes con una cajita al lado. Cuando terminas algo, tocas la cajita y se marca. ¡Es muy satisfactorio!</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre Google Keep o Notas.<br>2. Busca el ícono de 'Casillas de verificación' ☑️.<br>3. Escribe 3 cosas que debes hacer hoy.<br>4. Toca la casilla cuando lo cumplas.</p>", 
  a1:{t:"La Mochila", d:"Haz una lista de lo que llevas hoy en la mochila (lápiz, cuaderno, agua). Revisa tu mochila real y ve marcando en el celular si lo tienes."}, 
  a2:{t:"Lista de Compras", d:"Haz una lista de 5 cosas que te gustaría comprar en la tienda. Ordénalas por prioridad."}, 
  v:"google keep listas verificacion"},
 {t:"Semana 7: Compartir (Bluetooth)", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Pasar archivos a compañeros cercanos sin usar internet.</p><p><strong>📖 Explicación:</strong><br>¿Qué pasa si no hay WiFi y necesitas pasarle la tarea a tu amigo? Podemos usar <b>Bluetooth</b> o <b>QuickShare</b>. Es como lanzar el archivo por el aire al celular de al lado. Es magia invisible.</p><p><strong>🛠️ Manos a la obra:</strong><br>1. Abre una foto.<br>2. Toca el ícono 'Compartir'.<br>3. Elige 'Bluetooth'.<br>4. Tu compañero debe tenerlo activado también. Toca su nombre para enviar.</p>", 
  a1:{t:"Pasar la Bola", d:"En parejas, pásense la mejor foto que hayan editado esta semana usando solo Bluetooth."}, 
  a2:{t:"Recepción", d:"Aprende a 'Aceptar' un archivo cuando alguien te lo envía. Revisa dónde se guardó en tu celular."}, 
  v:"compartir archivos bluetooth android"},
 {t:"Semana 8: Proyecto Tutorial", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Demostrar nuestras habilidades de edición transformando una foto mala en una buena.</p><p><strong>📖 Explicación:</strong><br>Vas a enseñar cómo convertir una foto 'fea' en una foto 'profesional'. Eres el experto en edición.</p><p><strong>🛠️ Manos a la obra (Instrucciones):</strong><br>1. Toma una foto 'mala' a propósito (chueca, oscura y lejana).<br>2. Duplica la foto para tener el 'Antes'.<br>3. Edita la copia: Recorta lo que sobra, enderezala, sube el brillo y fírmala con marcado. Esa es el 'Después'.</p>", 
  a1:{t:"Antes y Después", d:"Muestra las dos fotos en tu celular al profesor y explica el cambio."}, 
  a2:{t:"Explicación Oral", d:"Pasa al frente y explica a la clase qué herramientas usaste (Ej: 'Usé recorte para quitar el zapato y brillo para la luz')."}, 
  v:"tutorial edicion fotos basica"}
];

const g3_b2 = [
 {t:"Semana 1: Negrita, Cursiva y Subrayado", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Aplicar formato básico a la tipografía para resaltar información clave en un documento.</p><p><strong>📖 Explicación detallada:</strong><br>Cuando leemos un texto extenso, el cerebro necesita ayudas visuales para identificar rápidamente cuáles son los conceptos más importantes. Los procesadores de texto ofrecen tres herramientas de estilo universales para lograr este propósito.<br><br>La <b>Negrita</b> (representada por una 'B' de Bold) engrosa el trazo de la letra, haciéndola más oscura y pesada, ideal para destacar palabras clave o conceptos principales. La <i>Cursiva</i> (representada por una 'I' de Italic) inclina ligeramente las letras hacia la derecha y se utiliza formalmente para citas, términos en otro idioma o títulos de obras. El <u>Subrayado</u> (representado por una 'U' de Underline) traza una línea continua debajo de la palabra y suele emplearse para hacer énfasis o denotar enlaces web. Dominar estos tres estilos es el primer paso para una edición profesional.</p>", 
  a1:{t:"Aplicación de Estilos", d:"Escribe la palabra 'Informática' tres veces en distintos renglones. Selecciona la primera y aplícale Negrita; la segunda, Cursiva; y la tercera, Subrayado."}, 
  a2:{t:"Combinación Formato", d:"Escribe el título 'Sistemas Operativos'. Selecciona ambas palabras y activa simultáneamente los botones de Negrita y Subrayado para un énfasis total."}, 
  v:"negrita cursiva google docs"},
 {t:"Semana 2: Alinear el Texto", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Modificar la distribución horizontal del texto para cumplir con normas de presentación formal.</p><p><strong>📖 Explicación detallada:</strong><br>La alineación determina cómo se acomodan los párrafos en relación con los márgenes de la página. Por defecto, todo documento inicia con una 'Alineación a la Izquierda', que es el formato estándar para la lectura en los idiomas occidentales.<br><br>Sin embargo, la estructura formal de un trabajo requiere variaciones. Los títulos principales deben estar siempre con 'Alineación Centrada' para brindar equilibrio visual en la página. Elementos como la fecha de entrega de un trabajo o la firma en una carta formal suelen llevar 'Alineación a la Derecha'. Utilizar los botones de alineación (que se muestran como bloques de líneas horizontales) es la manera correcta de estructurar el documento, siendo un error grave intentar centrar un título presionando la barra espaciadora múltiples veces.</p>", 
  a1:{t:"Centrado de Título", d:"Escribe el nombre de tu escuela en la parte superior del documento. Localiza el botón de alineación y selecciona 'Centrar' para que el texto se ubique en el medio exacto de la pantalla."}, 
  a2:{t:"Fecha Derecha", d:"Presiona Enter para cambiar de renglón. Escribe la fecha actual y utiliza la herramienta de alineación para enviar todo el bloque de texto hacia el margen derecho."}, 
  v:"alinear texto google docs celular"},
 {t:"Semana 3: Listas con Viñetas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Estructurar información mediante listas no ordenadas para facilitar la lectura de puntos independientes.</p><p><strong>📖 Explicación detallada:</strong><br>Los párrafos densos pueden ser difíciles de leer cuando se están enumerando varios elementos, características o requisitos. Para solucionar esto, utilizamos las listas con viñetas ('Bullet points' en inglés).<br><br>Las viñetas son símbolos, generalmente puntos circulares oscuros, que marcan el inicio de un nuevo elemento en una lista. Se utilizan cuando el orden de los elementos no tiene importancia, como al listar los ingredientes de una receta, las partes de una computadora o los materiales para la escuela. Al activar esta herramienta, el procesador de texto se encarga automáticamente de insertar el símbolo y generar la sangría (el espacio desde el margen) adecuada. Cada vez que presiones la tecla Enter, el sistema creará mágicamente una nueva viñeta para el siguiente ítem.</p>", 
  a1:{t:"Lista de Hardware", d:"Activa la herramienta de listas con viñetas. Escribe 4 componentes físicos de una computadora (Ej: Teclado, Ratón, Monitor, CPU), presionando Enter después de cada uno."}, 
  a2:{t:"Desactivación", d:"Después de escribir tu último ítem, presiona la tecla Enter dos veces seguidas. Observa cómo el sistema entiende que has terminado la lista y elimina la viñeta para volver al formato normal."}, 
  v:"hacer listas google docs"},
 {t:"Semana 4: Listas Numeradas", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Generar listas secuenciales automáticas para describir procesos o establecer prioridades.</p><p><strong>📖 Explicación detallada:</strong><br>A diferencia de las viñetas, las listas numeradas se emplean cuando el orden temporal, jerárquico o lógico de los elementos es estrictamente necesario. Esto aplica perfectamente para redactar manuales de instrucciones, pasos de un experimento científico o rankings de posiciones.<br><br>La gran ventaja tecnológica de utilizar la herramienta de 'Lista Numerada' de Google Docs, en lugar de escribir los números manualmente en el teclado (1., 2., 3...), es la automatización. Si el día de mañana decides agregar un nuevo paso en medio de tu lista o borrar el paso número dos, el procesador de texto recalculará y actualizará instantáneamente toda la numeración posterior de manera automática, ahorrándote el trabajo de reescribir cada número uno por uno.</p>", 
  a1:{t:"Pasos Lógicos", d:"Activa la herramienta de lista numerada. Escribe ordenadamente los 3 pasos necesarios para apagar correctamente una computadora, comenzando por el menú de inicio."}, 
  a2:{t:"Prueba de Automatización", d:"Coloca tu cursor al final del paso número 1 y presiona Enter para crear un nuevo espacio intermedio. Observa cómo los números siguientes se actualizan de forma automática."}, 
  v:"listas numeradas docs celular"},
 {t:"Semana 5: Copiar y Pegar", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Optimizar el tiempo de redacción mediante la duplicación digital de bloques de texto (Copy/Paste).</p><p><strong>📖 Explicación detallada:</strong><br>El portapapeles es una de las invenciones más revolucionarias de la informática moderna. Esta función actúa como una memoria temporal invisible dentro del dispositivo, capaz de retener información para reutilizarla. <br><br>El proceso consta de dos fases: Primero, debes seleccionar el texto deseado manteniéndolo presionado y ajustando los selectores. Al elegir la opción 'Copiar', el dispositivo guarda una réplica exacta de ese texto en el portapapeles sin borrar el original. Segundo, te desplazas a cualquier otra sección del documento (o incluso a otra aplicación distinta) y utilizas el comando 'Pegar'. El dispositivo tomará la información almacenada en el portapapeles y la imprimirá inmediatamente en la pantalla. Esta técnica es fundamental para evitar reescribir textos repetitivos y aumentar la eficiencia.</p>", 
  a1:{t:"Clonación de Texto", d:"Escribe una frase descriptiva larga, como: 'La memoria RAM es un componente vital'. Selecciónala completamente y utiliza la función de copiar. Luego, presiona Enter y pégala tres veces consecutivas."}, 
  a2:{t:"Reubicación", d:"Selecciona únicamente la última oración que pegaste. Esta vez utiliza la función 'Cortar' (que copia y borra el original al mismo tiempo) y pégala al inicio del documento como un título."}, 
  v:"copiar y pegar celular"},
 {t:"Semana 6: Resaltador", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Emplear la herramienta de resaltado para aplicar técnicas de estudio sobre documentos digitales.</p><p><strong>📖 Explicación detallada:</strong><br>En el entorno académico tradicional, los estudiantes utilizan marcadores fluorescentes para sombrear conceptos clave en sus libros de texto y facilitar el repaso posterior para los exámenes. Los procesadores de texto incluyen exactamente esta misma funcionalidad, conocida como 'Color de resaltado' o color de fondo del texto.<br><br>A diferencia de la herramienta que cambia el color de las letras, el resaltador aplica un color vibrante y translúcido en el bloque o 'caja' que se encuentra detrás del texto seleccionado, manteniendo la letra en su color negro original para preservar el contraste y la legibilidad. Es una técnica analítica excelente para revisar textos extensos, marcar definiciones importantes o señalar errores que requieren revisión por parte de otro compañero en trabajos colaborativos.</p>", 
  a1:{t:"Análisis Visual", d:"Escribe un párrafo de tres líneas sobre el cuidado del medio ambiente. Selecciona únicamente los dos conceptos más importantes y aplícales un color de resaltado amarillo fluorescente."}, 
  a2:{t:"Código de Colores", d:"Utiliza el resaltador para implementar un código: resalta una palabra en verde (que significa 'aprobado') y otra palabra distinta en rojo (que significa 'requiere corrección')."}, 
  v:"resaltar texto google docs"},
 {t:"Semana 7: Corrector Ortográfico", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Interpretar las alertas del sistema y utilizar la herramienta de corrección automática para garantizar la calidad del texto.</p><p><strong>📖 Explicación detallada:</strong><br>Google Docs cuenta con un diccionario interno inteligente que escanea cada palabra que escribes en tiempo real. Si detecta una palabra que no existe en su base de datos, que tiene errores de tipeo o a la que le falta una tilde, la subrayará inmediatamente con una línea roja ondulada o punteada.<br><br>Si el error detectado es gramatical (como un problema de concordancia o doble espacio), la línea será azul. Esta herramienta no funciona para hacer la tarea por ti, sino como un asistente de calidad. Al tocar la palabra subrayada, la inteligencia de la aplicación desplegará un menú sugerente con las posibles opciones correctas. Es responsabilidad del autor leer la sugerencia y determinar si es apropiada para el contexto antes de aceptar la corrección automática.</p>", 
  a1:{t:"Detección de Errores", d:"Escribe intencionalmente la siguiente frase con faltas: 'El sistma operativo de la conputadora es muy rapido'. Observa cómo el sistema reacciona subrayando los fallos."}, 
  a2:{t:"Asistencia de Corrección", d:"Toca cada una de las palabras subrayadas en rojo de la actividad anterior y utiliza el menú emergente de sugerencias para reparar la ortografía y las tildes faltantes sin usar el teclado."}, 
  v:"corrector ortografico celular"},
 {t:"Semana 8: Mi Primer Afiche", 
  c:"<p><strong>🎓 Lo que aprenderemos:</strong> Integrar herramientas de edición de fuente, párrafo y formato para diseñar un producto de comunicación visual efectivo.</p><p><strong>📖 Explicación detallada:</strong><br>El diseño de un afiche publicitario o informativo requiere una planificación estética. No se trata de escribir un bloque continuo de texto, sino de jugar con las proporciones y los espacios en blanco para captar el interés visual del espectador en cuestión de segundos.<br><br>Este proyecto final servirá como una auditoría de tus habilidades de edición. Deberás aplicar la alineación centrada para un título principal que destaque por su tamaño y peso (negrita). Deberás utilizar alineación izquierda combinada con viñetas para listar los detalles o beneficios, y aplicar colores de fuente y resaltadores estratégicamente para enfatizar datos cruciales, como una fecha, un precio o un lugar, demostrando dominio total de la barra de formato de Google Docs.</p>", 
  a1:{t:"Estructura del Afiche", d:"Diseña un afiche para una 'Feria de Ciencias'. Configura un título central en tamaño grande. Abajo, inserta una lista con viñetas detallando los 3 mejores proyectos que se exhibirán."}, 
  a2:{t:"Énfasis Publicitario", d:"En la parte inferior de tu afiche, añade la fecha y el lugar del evento. Utiliza negrita y un color de resaltado llamativo exclusivamente en la hora de inicio para que resalte."}, 
  v:"hacer afiche en word celular"}
];
